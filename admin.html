<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة | Delta Optics</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0E7490; --secondary: #164E63; --bg: #F8FAFC; --danger: #EF4444; --success: #10B981; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 260px; background: var(--secondary); color: white; display: none; flex-direction: column; padding: 20px 0; }
        #sidebar.active { display: flex; }
        .nav-item { padding: 15px 25px; cursor: pointer; display: flex; align-items: center; gap: 15px; font-weight: bold; color: #CBD5E1; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); color: white; border-right: 4px solid var(--primary); }

        #main-content { flex: 1; padding: 30px; overflow-y: auto; display: none; }
        #main-content.active { display: block; }
        .section-card { background: white; padding: 25px; border-radius: 15px; margin-bottom: 25px; border: 1px solid #E2E8F0; display: none; }
        .section-card.show { display: block !important; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #E2E8F0; }
        th { background: #F1F5F9; color: var(--primary); }
        .btn-action { padding: 5px 10px; border-radius: 5px; border: none; cursor: pointer; color: white; margin-left: 5px; }
        .btn-delete { background: var(--danger); }
        .btn-edit { background: var(--primary); }
        
        .product-img { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; }
        .login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100%; background: var(--bg); }
    </style>
</head>
<body>

    <div id="login-screen" class="login-screen">
        <div class="card" style="background:white; padding:40px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.1); text-align:center;">
            <h2 style="color:var(--primary);">Delta Admin</h2>
            <input type="text" id="adminUser" placeholder="اسم المستخدم" style="width:250px; padding:10px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd;"><br>
            <input type="password" id="adminPass" placeholder="كلمة المرور" style="width:250px; padding:10px; margin-bottom:20px; border-radius:10px; border:1px solid #ddd;"><br>
            <button onclick="attemptLogin()" style="padding:10px 30px; background:var(--primary); color:white; border:none; border-radius:10px; cursor:pointer;">دخول</button>
        </div>
    </div>

    <div id="sidebar">
        <div class="nav-item active" onclick="switchTab('manage', event)"><i class="fas fa-boxes"></i> إدارة التشكيلة</div>
        <div class="nav-item" onclick="switchTab('upload', event)"><i class="fas fa-plus-circle"></i> إضافة نظارة</div>
        <div class="nav-item" onclick="switchTab('reports', event)"><i class="fas fa-file-medical"></i> التقارير</div>
    </div>

    <div id="main-content">
        <div id="sec-manage" class="section-card show">
            <h2><i class="fas fa-glasses"></i> إدارة المنتجات (نظارات الأطفال والكبار)</h2>
            <table>
                <thead>
                    <tr><th>الصورة</th><th>الاسم</th><th>النوع</th><th>الإجراءات</th></tr>
                </thead>
                <tbody id="products-list"></tbody>
            </table>
        </div>

        <div id="sec-upload" class="section-card">
            <h2>إضافة قطعة جديدة</h2>
            <input type="text" id="glassName" placeholder="اسم الموديل"><br><br>
            <select id="glassCategory">
                <option value="أطفال">نظارات أطفال</option>
                <option value="طبية">نظارات طبية</option>
                <option value="شمسية">نظارات شمسية</option>
            </select><br><br>
            <input type="file" id="glassFile" accept="image/*"><br><br>
            <button onclick="uploadNewGlass()" id="uploadBtn" style="padding:10px 20px; background:var(--success); color:white; border:none; border-radius:10px; cursor:pointer;">نشر المنتج</button>
        </div>

        <div id="sec-reports" class="section-card">
            <h2>تقارير المراجعين</h2>
            <table id="reports-table"><thead><tr><th>المراجع</th><th>التفاصيل</th></tr></thead><tbody id="reports-body"></tbody></table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, deleteDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB11C4GGgAyqeThs8a9cvDNN7frvAA1nqQ",
            authDomain: "delta-optics-system.firebaseapp.com",
            projectId: "delta-optics-system",
            storageBucket: "delta-optics-system.firebasestorage.app",
            messagingSenderId: "111176219224",
            appId: "1:111176219224:web:e0d8a5f26b84d57249a82d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // 🔐 تسجيل الدخول
        window.attemptLogin = function() {
            const u = document.getElementById('adminUser').value;
            const p = document.getElementById('adminPass').value;
            if(u === "adel" && p === "123123") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('sidebar').classList.add('active');
                document.getElementById('main-content').classList.add('active');
                loadInventory(); loadReports();
            } else { alert("بيانات خاطئة"); }
        }

        // 🔄 تبديل الأقسام
        window.switchTab = function(tabId, e) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            e.currentTarget.classList.add('active');
            document.querySelectorAll('.section-card').forEach(s => s.classList.remove('show'));
            document.getElementById('sec-' + tabId).classList.add('show');
        }

        // 📋 جلب وإدارة التشكيلة
        function loadInventory() {
            onSnapshot(collection(db, "products"), (snap) => {
                const list = document.getElementById('products-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    list.innerHTML += `
                        <tr>
                            <td><img src="${p.imageUrl}" class="product-img"></td>
                            <td>${p.name}</td>
                            <td>${p.category}</td>
                            <td>
                                <button class="btn-action btn-edit" onclick="editProduct('${d.id}', '${p.name}')">تعديل</button>
                                <button class="btn-action btn-delete" onclick="deleteProduct('${d.id}')">حذف</button>
                            </td>
                        </tr>`;
                });
            });
        }

        // 🗑️ حذف منتج
        window.deleteProduct = async function(id) {
            if(confirm("هل أنت متأكد من حذف هذه النظارة؟")) {
                await deleteDoc(doc(db, "products", id));
                alert("تم الحذف بنجاح");
            }
        }

        // ✏️ تعديل اسم منتج
        window.editProduct = async function(id, oldName) {
            const newName = prompt("أدخل الاسم الجديد للنظارة:", oldName);
            if(newName) {
                await updateDoc(doc(db, "products", id), { name: newName });
            }
        }

        // 🚀 رفع منتج جديد
        window.uploadNewGlass = async function() {
            const name = document.getElementById('glassName').value;
            const cat = document.getElementById('glassCategory').value;
            const file = document.getElementById('glassFile').files[0];
            if(!name || !file) return alert("أكمل البيانات");

            const storageRef = ref(storage, 'glasses/' + Date.now() + "_" + file.name);
            await uploadBytes(storageRef, file);
            const url = await getDownloadURL(storageRef);

            await addDoc(collection(db, "products"), {
                name: name,
                category: cat,
                imageUrl: url,
                createdAt: serverTimestamp()
            });
            alert("تمت الإضافة!");
            document.getElementById('glassName').value = "";
        }

        function loadReports() {
            onSnapshot(query(collection(db, "tests"), orderBy("timestamp", "desc")), (snap) => {
                const b = document.getElementById('reports-body'); b.innerHTML = "";
                snap.forEach(d => {
                    b.innerHTML += `<tr><td>${d.data().name}</td><td><pre>${d.data().details}</pre></td></tr>`;
                });
            });
        }
    </script>
</body>
</html>
