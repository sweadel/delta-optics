<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Delta AR - مضمون 100%</title>
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-face-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        
        /* شاشة البداية - ضرورية جداً لتفعيل الكاميرا */
        #overlay {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95);
            z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: white; text-align: center;
        }
        .start-btn {
            background: #0ea5e9; color: white; border: none; padding: 20px 50px;
            border-radius: 50px; font-size: 1.5rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 10px 25px rgba(14, 165, 233, 0.5); transition: 0.3s;
        }
        .start-btn:active { transform: scale(0.95); }
        
        /* واجهة التحكم */
        .ui-controls {
            position: absolute; top: 20px; width: 100%; display: flex;
            justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 100;
        }
        .back-link { background: rgba(255,255,255,0.2); color: white; padding: 10px 20px; border-radius: 10px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="overlay">
        <h2 style="margin-bottom: 10px;">Delta Optics AR</h2>
        <p style="margin-bottom: 30px; opacity: 0.8;">اضغط للبدء بالسماح للكاميرا</p>
        <button class="start-btn" id="startButton">ابدأ التجربة الآن</button>
    </div>

    <div class="ui-controls">
        <a href="index.html" class="back-link">رجوع</a>
        <div style="background: #0e7490; color: white; padding: 10px 20px; border-radius: 50px; font-weight: bold;">Delta 3D LIVE</div>
    </div>

    <a-scene mindar-face="uiLoading:no; uiError:no" embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="glassesModel" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.5/examples/face-tracking/assets/glasses/scene.gltf"></a-asset-item>
        </a-assets>
        
        <a-camera active="false" position="0 0 0"></a-camera>

        <a-entity mindar-face-target="anchorIndex: 168">
            <a-gltf-model rotation="0 0 0" position="0 -0.1 0" scale="0.01 0.01 0.01" src="#glassesModel"></a-gltf-model>
        </a-entity>
        
        <a-entity light="type: ambient; intensity: 1"></a-entity>
    </a-scene>

    <script>
        const startButton = document.querySelector("#startButton");
        const overlay = document.querySelector("#overlay");
        const sceneEl = document.querySelector('a-scene');

        startButton.addEventListener('click', () => {
            // إخفاء الشاشة والبدء الحقيقي
            overlay.style.display = "none";
            
            // تفعيل المحرك يدوياً
            if (sceneEl.systems["mindar-face-system"]) {
                sceneEl.systems["mindar-face-system"].start(); 
            }
        });

        // رسالة تنبيه إذا تأخر التحميل
        sceneEl.addEventListener("render-target-loaded", () => {
            console.log("Scene loaded");
        });
    </script>
</body>
</html>
