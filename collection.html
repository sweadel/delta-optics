<script>
    // --- 1. القاموس والترجمة ---
    const i18n = {
        ar: {
            title: "تشكيلات دلتا للبصريات المميزة",
            tabAll: "الكل", tabMed: "طبّي", tabSun: "شمسي", tabFav: "المفضلة",
            badgeMed: "طبي", badgeSun: "شمسي",
            cardDesc: "اضغط للمعاينة",
            waBtn: "استفسار عن هذا الموديل",
            modelMedPrefix: "موديل طبي #", modelSunPrefix: "موديل شمسي #",
            waMsgPrefix: "مرحباً دلتا، أود الاستفسار عن ",
            faceTitle: "مساعد اختيار النظارة: ما هو شكل وجهك؟",
            faceAll: "الكل", faceRound: "دائري", faceSquare: "مربع", faceOval: "بيضوي"
        },
        en: {
            title: "Delta Optics Premium Collections",
            tabAll: "All", tabMed: "Medical", tabSun: "Sunglasses", tabFav: "Favorites",
            badgeMed: "Medical", badgeSun: "Sun",
            cardDesc: "Tap to view",
            waBtn: "Inquire about this model",
            modelMedPrefix: "Medical Model #", modelSunPrefix: "Sun Model #",
            waMsgPrefix: "Hi Delta, I would like to inquire about ",
            faceTitle: "Glasses Assistant: What is your face shape?",
            faceAll: "All", faceRound: "Round", faceSquare: "Square", faceOval: "Oval"
        }
    };

    let curLang = 'ar';

    function toggleLang() {
        curLang = curLang === 'ar' ? 'en' : 'ar';
        document.documentElement.dir = curLang === 'ar' ? 'rtl' : 'ltr';
        document.documentElement.lang = curLang;
        document.getElementById('lang-toggle').innerText = curLang === 'ar' ? 'EN' : 'عربي';
        
        document.getElementById('txt-main-title').innerText = i18n[curLang].title;
        document.getElementById('tab-all').innerHTML = `<i class="fas fa-border-all"></i>${i18n[curLang].tabAll}`;
        document.getElementById('tab-med').innerHTML = `<i class="fas fa-glasses"></i>${i18n[curLang].tabMed}`;
        document.getElementById('tab-sun').innerHTML = `<i class="fas fa-sun"></i>${i18n[curLang].tabSun}`;
        document.getElementById('tab-fav').innerHTML = `<i class="fas fa-heart"></i>${i18n[curLang].tabFav}`;
        document.getElementById('txt-wa-btn').innerText = i18n[curLang].waBtn;
        
        document.getElementById('txt-face-title').innerText = i18n[curLang].faceTitle;
        document.getElementById('face-all').innerText = i18n[curLang].faceAll;
        document.getElementById('face-round').innerText = i18n[curLang].faceRound;
        document.getElementById('face-square').innerText = i18n[curLang].faceSquare;
        document.getElementById('face-oval').innerText = i18n[curLang].faceOval;

        document.getElementById('gallery').innerHTML = "";
        buildGallery();
        applyCurrentFilter();
    }

    // --- 2. إعدادات الصور الفعلية ---
    const config = {
        medicalImages: 58,      // الطبي الجديد
        oldMedicalImages: 10,   // الطبي القديم (تقدر تعدل الرقم حسب اللي عندك)
        sunImages: 6,           // الشمسي الجديد
        oldSunImages: 10,       // الشمسي القديم (تقدر تعدل الرقم حسب اللي عندك)
        faceShapes: ['round', 'square', 'oval'] 
    };

    function getRandomFaceShape() {
        return config.faceShapes[Math.floor(Math.random() * config.faceShapes.length)];
    }

    const gallery = document.getElementById('gallery');
    
    // نظام المفضلة 
    let favorites = JSON.parse(localStorage.getItem('deltaFavs')) || [];

    function toggleFavorite(id, filename, title) {
        const index = favorites.findIndex(fav => fav.id === id);
        if (index === -1) {
            favorites.push({ id, filename, title });
            document.querySelector(`.fav-btn[data-id="${id}"]`).classList.add('active');
        } else {
            favorites.splice(index, 1);
            document.querySelector(`.fav-btn[data-id="${id}"]`).classList.remove('active');
            
            const activeTab = document.querySelector('.tab-btn.active').getAttribute('data-filter');
            if (activeTab === 'fav') {
                const cardToRemove = document.querySelector(`.card[data-id="${id}"]`);
                if(cardToRemove) cardToRemove.remove();
            }
        }
        localStorage.setItem('deltaFavs', JSON.stringify(favorites));
    }

    // --- 3. بناء المعرض ---
    function buildGallery() {
        const fragment = document.createDocumentFragment();
        let delayCount = 0;
        const activeFilter = document.querySelector('.tab-btn.active').getAttribute('data-filter');

        if (activeFilter === 'fav') {
            favorites.forEach(fav => {
                delayCount++;
                const type = fav.filename.includes('m') ? 'medical' : 'sun';
                const badgeTxt = type === 'medical' ? i18n[curLang].badgeMed : i18n[curLang].badgeSun;
                const faceShape = getRandomFaceShape(); 
                fragment.appendChild(createCardHTML(type, fav.filename, fav.title, badgeTxt, delayCount * 0.02, fav.id, faceShape));
            });
        } else {
            // 1. بناء الطبي القديم m1.jpg.jpg
            for (let i = 1; i <= config.oldMedicalImages; i++) {
                delayCount++;
                const id = `old_m${i}`; // تمييز الـ ID عشان المفضلة
                const tName = `${i18n[curLang].modelMedPrefix}${i} (كلاسيك)`;
                const faceShape = getRandomFaceShape();
                fragment.appendChild(createCardHTML('medical', `m${i}.jpg.jpg`, tName, i18n[curLang].badgeMed, Math.min(delayCount * 0.02, 0.5), id, faceShape));
            }

            // 2. بناء الطبي الجديد m1.jpg
            for (let i = 1; i <= config.medicalImages; i++) {
                delayCount++;
                const id = `m${i}`;
                const tName = `${i18n[curLang].modelMedPrefix}${i}`;
                const faceShape = getRandomFaceShape();
                fragment.appendChild(createCardHTML('medical', `m${i}.jpg`, tName, i18n[curLang].badgeMed, Math.min(delayCount * 0.02, 0.5), id, faceShape));
            }

            // 3. بناء الشمسي القديم s1.jpg.jpg
            for (let i = 1; i <= config.oldSunImages; i++) {
                delayCount++;
                const id = `old_s${i}`;
                const tName = `${i18n[curLang].modelSunPrefix}${i} (كلاسيك)`;
                const faceShape = getRandomFaceShape();
                fragment.appendChild(createCardHTML('sun', `s${i}.jpg.jpg`, tName, i18n[curLang].badgeSun, Math.min(delayCount * 0.02, 0.5), id, faceShape));
            }

            // 4. بناء الشمسي الجديد s1.jpg
            for (let i = 1; i <= config.sunImages; i++) {
                delayCount++;
                const id = `s${i}`;
                const tName = `${i18n[curLang].modelSunPrefix}${i}`;
                const faceShape = getRandomFaceShape();
                fragment.appendChild(createCardHTML('sun', `s${i}.jpg`, tName, i18n[curLang].badgeSun, Math.min(delayCount * 0.02, 0.5), id, faceShape));
            }
        }

        gallery.appendChild(fragment);
        init3DTilt(); 
    }

    function createCardHTML(type, filename, title, badgeTxt, delay, id, faceShape) {
        const card = document.createElement('div');
        card.className = `card item-${type} face-${faceShape}`;
        card.style.animationDelay = `${delay}s`;
        card.setAttribute('data-id', id);
        
        const isFav = favorites.some(fav => fav.id === id);
        
        card.innerHTML = `
            <button class="fav-btn ${isFav ? 'active' : ''}" data-id="${id}" onclick="toggleFavorite('${id}', '${filename}', '${title}')" aria-label="أضف للمفضلة">
                <i class="fas fa-heart"></i>
            </button>
            <div class="badge">${badgeTxt}</div>
            <div class="img-wrap loading"> 
                <img src="${filename}" alt="${title}" loading="lazy" 
                     onload="this.classList.add('loaded'); this.parentElement.classList.remove('loading')" 
                     onerror="this.closest('.card').style.display='none'"> 
            </div>
            <div class="card-info" onclick="openLightbox('${filename}', '${title}')">
                <h3>${title}</h3>
                <p>${i18n[curLang].cardDesc}</p>
            </div>
        `;
        return card;
    }

    function init3DTilt() {
        if (window.innerWidth < 768) return; 
        
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const xc = rect.width / 2;
                const yc = rect.height / 2;
                const dx = x - xc;
                const dy = y - yc;
                
                const tiltX = (dy / yc) * -10; 
                const tiltY = (dx / xc) * 10;
                
                card.style.transform = `perspective(1000px) rotateX(${tiltX}deg) rotateY(${tiltY}deg) scale3d(1.05, 1.05, 1.05)`;
            });
            
            card.addEventListener('mouseleave', () => {
                card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
            });
        });
    }

    function applyCurrentFilter() {
        const activeType = document.querySelector('.tab-btn.active').getAttribute('data-filter');
        const activeFace = document.querySelector('.face-btn.active').getAttribute('data-face');
        const allCards = document.querySelectorAll('.card');

        allCards.forEach(card => {
            let isTypeMatch = (activeType === 'all') || card.classList.contains(`item-${activeType}`);
            let isFaceMatch = (activeFace === 'all') || card.classList.contains(`face-${activeFace}`);
            
            if (activeType === 'fav') isTypeMatch = true;

            if (isTypeMatch && isFaceMatch) {
                card.style.display = 'block';
            } else {
                card.style.display = 'none';
            }
        });
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            e.currentTarget.classList.add('active'); 
            
            const filterValue = e.currentTarget.getAttribute('data-filter');
            
            if (filterValue === 'fav' || document.getElementById('gallery').innerHTML === "") {
                document.getElementById('gallery').innerHTML = "";
                buildGallery();
            }
            applyCurrentFilter();
        });
    });
    
    document.querySelectorAll('.face-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            document.querySelectorAll('.face-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            applyCurrentFilter();
        });
    });

    function openLightbox(src, title) {
        const lightbox = document.getElementById('lightbox');
        const lbImg = document.getElementById('lb-img');
        const lbTitle = document.getElementById('lb-title');
        const lbWa = document.getElementById('lb-wa');

        lbImg.src = src;
        lbTitle.innerText = title;
        
        const fullImageUrl = new URL(src, window.location.href).href;
        let waMsg = `${i18n[curLang].waMsgPrefix}${title}.\nرابط الموديل: ${fullImageUrl}`;
        lbWa.href = `https://wa.me/962775549700?text=${encodeURIComponent(waMsg)}`;
        
        lightbox.classList.add('active');
    }

    function closeLightbox() {
        const lightbox = document.getElementById('lightbox');
        lightbox.classList.remove('active');
        setTimeout(() => document.getElementById('lb-img').src = "", 300);
    }

    document.getElementById('lightbox').addEventListener('click', (e) => {
        if (e.target.id === 'lightbox') closeLightbox();
    });
    
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeLightbox();
    });

    document.addEventListener('DOMContentLoaded', () => {
        buildGallery();
    });

</script>
