<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Optics | Smart ERP</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Tajawal', 'sans-serif'] },
                    colors: {
                        primary: '#0ea5e9',
                        darkBg: '#0f172a',
                        darkCard: '#1e293b'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .view-section { display: none; animation: fadeIn 0.3s ease-in-out; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-darkBg dark:text-slate-200 h-screen flex overflow-hidden transition-colors duration-300">

    <aside class="w-64 bg-slate-900 text-white flex flex-col transition-all duration-300 shadow-xl z-20">
        <div class="p-6 border-b border-slate-700/50 text-center">
            <h2 class="text-3xl font-black text-primary tracking-wider">DELTA</h2>
            <p class="text-xs text-slate-400 font-bold mt-1 tracking-widest uppercase">Smart ERP v7</p>
        </div>
        
        <nav class="flex-1 overflow-y-auto p-4 space-y-2">
            <p class="text-xs font-bold text-slate-500 mb-2 mt-4 px-2">العمليات الأساسية</p>
            <button onclick="showView('dashboard')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-primary text-white font-bold transition-all">
                <i class="fas fa-chart-pie w-5 text-center"></i> لوحة القيادة
            </button>
            <button onclick="showView('pos')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white font-bold transition-all">
                <i class="fas fa-cash-register w-5 text-center"></i> نقاط البيع الذكية
            </button>
            <button onclick="showView('inventory')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white font-bold transition-all">
                <i class="fas fa-boxes w-5 text-center"></i> المخزون والتنبؤات
            </button>
        </nav>

        <div class="p-4 border-t border-slate-700/50">
            <button onclick="handleLogout()" class="w-full flex items-center justify-center gap-2 px-4 py-3 rounded-xl bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white font-bold transition-all">
                <i class="fas fa-power-off"></i> تسجيل الخروج
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative overflow-hidden">
        <header class="h-20 bg-white dark:bg-darkCard border-b border-slate-200 dark:border-slate-700/50 flex items-center justify-between px-8 shadow-sm z-10">
            <div class="relative w-96">
                <i class="fas fa-search absolute right-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="smart-search" placeholder="بحث ذكي (مرضى، فواتير، منتجات)..." class="w-full bg-slate-100 dark:bg-slate-800 border-none rounded-full py-2.5 pr-12 pl-4 focus:ring-2 focus:ring-primary outline-none transition-all dark:text-white">
            </div>
            
            <div class="flex items-center gap-4">
                <button onclick="toggleTheme()" class="w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-300 hover:text-primary transition-colors">
                    <i class="fas fa-moon" id="theme-icon"></i>
                </button>
                <div class="flex items-center gap-3 bg-primary/10 px-4 py-2 rounded-full border border-primary/20">
                    <i class="fas fa-user-circle text-primary text-xl"></i>
                    <span id="user-name-display" class="font-bold text-primary">المدير العام</span>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8">
            
            <section id="dashboard" class="view-section active">
                <div class="mb-8">
                    <h2 class="text-2xl font-black text-slate-800 dark:text-white mb-2">مرحباً بك في النظام الذكي ⚡</h2>
                    <p class="text-slate-500 dark:text-slate-400 font-medium">نظرة عامة على أداء اليوم وتحليلات المبيعات.</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="bg-white dark:bg-darkCard p-6 rounded-2xl border border-slate-200 dark:border-slate-700/50 shadow-sm border-t-4 border-t-primary">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-slate-500 font-bold mb-1">مبيعات اليوم</p>
                                <h3 class="text-3xl font-black text-slate-800 dark:text-white" id="today-sales">0 JOD</h3>
                            </div>
                            <div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center text-primary text-xl">
                                <i class="fas fa-wallet"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="pos" class="view-section">
                <h2 class="text-2xl font-black mb-6">نقاط البيع (POS)</h2>
                </section>

            <section id="inventory" class="view-section">
                <h2 class="text-2xl font-black mb-6">المخزون والتنبؤات</h2>
                </section>

        </div>
    </main>

    <script src="app.js" type="module"></script>
    <script>
        // UI Helpers
        function showView(id) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            // Update sidebar buttons
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-primary', 'text-white');
                btn.classList.add('text-slate-400', 'hover:bg-slate-800', 'hover:text-white');
            });
            event.currentTarget.classList.remove('text-slate-400', 'hover:bg-slate-800');
            event.currentTarget.classList.add('bg-primary', 'text-white');
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const icon = document.getElementById('theme-icon');
            if (document.documentElement.classList.contains('dark')) {
                icon.classList.replace('fa-moon', 'fa-sun');
            } else {
                icon.classList.replace('fa-sun', 'fa-moon');
            }
        }
    </script>
</body>
</html>
