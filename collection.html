<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تشكيلات دلتا | Delta Optics</title>
    
    <link rel="icon" href="logo.jpg" type="image/jpeg">
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --brand: #0E7490; 
            --brand-light: #ECFEFF;
            --bg: #F8FAFC; 
            --text-dark: #1E293B;
            --text-gray: #64748B;
            --white: #FFFFFF;
            --shadow: 0 4px 20px rgba(0,0,0,0.05);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); margin: 0; padding-bottom: 50px; color: var(--text-dark); transition: var(--transition); }

        /* --- الهيدر --- */
        header { 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            padding: 15px 20px;
            box-shadow: 0 2px 15px rgba(14, 116, 144, 0.08); 
            position: sticky; top: 0; z-index: 100; 
            display: flex; flex-direction: column; gap: 12px;
        }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .header-right { display: flex; align-items: center; gap: 12px; }
        
        .back-btn { 
            width: 40px; height: 40px; border-radius: 50%; background: #F1F5F9; 
            color: var(--text-dark); display: flex; align-items: center; justify-content: center; 
            text-decoration: none; font-size: 1.2rem; transition: var(--transition);
        }
        .back-btn:active { background: #E2E8F0; transform: scale(0.9); }
        
        .header-logo { width: 42px; height: 42px; object-fit: contain; border-radius: 8px; }
        
        .lang-btn { 
            background: #F1F5F9; border: 1px solid #E2E8F0; border-radius: 8px; 
            padding: 6px 12px; font-weight: 700; color: var(--brand); 
            cursor: pointer; font-size: 0.9rem; transition: 0.2s;
        }

        .header-title { 
            font-size: 1.2rem; font-weight: 800; color: var(--brand); 
            margin: 0; text-align: center; width: 100%;
        }

        /* --- شريط التصفية --- */
        .tabs-container { background: var(--white); padding: 15px 0; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .tabs { display: flex; justify-content: center; gap: 10px; }
        .tab-btn { 
            padding: 8px 24px; border-radius: 20px; border: 2px solid var(--brand-light); 
            background: var(--white); color: var(--text-gray); font-weight: 700; 
            cursor: pointer; transition: var(--transition); font-size: 0.95rem;
        }
        .tab-btn.active { background: var(--brand); color: var(--white); border-color: var(--brand); box-shadow: 0 4px 10px rgba(14, 116, 144, 0.2); }

        /* --- شبكة المعرض --- */
        .gallery-container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }

        /* --- كرت النظارة --- */
        .card { 
            background: var(--white); border-radius: 16px; overflow: hidden; 
            box-shadow: var(--shadow); border: 1px solid #E2E8F0; 
            transition: var(--transition); position: relative; cursor: pointer;
            opacity: 0; transform: translateY(20px); animation: fadeInUp 0.4s forwards;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(14, 116, 144, 0.15); border-color: var(--brand-light); }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        .img-wrap { width: 100%; height: 160px; background: #E2E8F0; position: relative; overflow: hidden; }
        .img-wrap::after { 
            content: ""; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: skeletonLoading 1.5s infinite;
        }
        @keyframes skeletonLoading { 100% { left: 100%; } }

        .card img { 
            width: 100%; height: 100%; object-fit: cover; display: block; 
            position: absolute; top: 0; left: 0; z-index: 1; opacity: 0; transition: opacity 0.3s;
        }
        .card img.loaded { opacity: 1; }

        .card-info { padding: 12px; text-align: center; background: var(--white); position: relative; z-index: 2;}
        .card-info h3 { margin: 0 0 4px; font-size: 0.95rem; font-weight: 800; color: var(--text-dark); }
        .card-info p { margin: 0; font-size: 0.75rem; color: var(--text-gray); }

        .badge { 
            position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.95); 
            padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; 
            color: var(--brand); z-index: 3; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        html[dir="ltr"] .badge { right: auto; left: 10px; }
        html[dir="ltr"] #arrow-icon { transform: rotate(180deg); }

        /* --- عارض الصور (Lightbox) --- */
        .lightbox { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(8px); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 1000; opacity: 0; pointer-events: none; transition: var(--transition);
        }
        .lightbox.active { opacity: 1; pointer-events: all; }
        
        .lightbox-img-container { position: relative; max-width: 90%; max-height: 60vh; }
        .lightbox img { width: 100%; height: auto; max-height: 60vh; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); transform: scale(0.9); transition: var(--transition); object-fit: contain;}
        .lightbox.active img { transform: scale(1); }
        
        .lightbox-close { 
            position: absolute; top: 25px; right: 25px; background: rgba(255,255,255,0.2); 
            color: var(--white); width: 45px; height: 45px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem; 
            cursor: pointer; border: 1px solid rgba(255,255,255,0.3); transition: 0.2s;
        }
        .lightbox-close:active { background: rgba(255,255,255,0.4); transform: scale(0.9); }
        
        .lightbox-info { text-align: center; margin-top: 25px; width: 90%; }
        .lightbox-title { color: var(--white); font-size: 1.4rem; font-weight: 800; margin-bottom: 15px; }
        
        .wa-order-btn {
            background: var(--success); color: var(--white);
            padding: 14px 30px; border-radius: 30px; font-weight: 800; font-size: 1.1rem;
            text-decoration: none; display: inline-flex; align-items: center; gap: 10px;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4); transition: 0.2s;
        }
        .wa-order-btn:active { transform: scale(0.95); }

    </style>
</head>
<body>

<header>
    <div class="header-top">
        <div class="header-right">
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-right" id="arrow-icon"></i></a>
            <img src="logo.jpg" alt="Delta Logo" class="header-logo" onerror="this.src='https://via.placeholder.com/42?text=Delta'">
        </div>
        <button class="lang-btn" id="lang-toggle" onclick="toggleLang()">EN</button>
    </div>
    <h1 class="header-title" id="txt-main-title">تشكيلات دلتا للبصريات المميزة</h1>
</header>

<div class="tabs-container">
    <div class="tabs" id="filter-tabs">
        <button class="tab-btn active" data-filter="all" id="tab-all">الكل</button>
        <button class="tab-btn" data-filter="medical" id="tab-med">طبّي</button>
        <button class="tab-btn" data-filter="sun" id="tab-sun">شمسي</button>
    </div>
</div>

<div class="gallery-container">
    <div class="grid" id="gallery">
        </div>
</div>

<div class="lightbox" id="lightbox">
    <button class="lightbox-close" onclick="closeLightbox()"><i class="fas fa-times"></i></button>
    
    <div class="lightbox-img-container">
        <img id="lb-img" src="" alt="View">
    </div>
    
    <div class="lightbox-info">
        <div class="lightbox-title" id="lb-title"></div>
        <a id="lb-wa" href="#" class="wa-order-btn" target="_blank">
            <i class="fab fa-whatsapp"></i> <span id="txt-wa-btn">استفسار عن هذا الموديل</span>
        </a>
    </div>
</div>

<script>
    // --- 1. القاموس والترجمة ---
    const i18n = {
        ar: {
            title: "تشكيلات دلتا للبصريات المميزة",
            tabAll: "الكل", tabMed: "طبّي", tabSun: "شمسي",
            badgeMed: "طبي", badgeSun: "شمسي",
            cardDesc: "اضغط للمعاينة",
            waBtn: "استفسار عن هذا الموديل",
            modelMedPrefix: "موديل طبي #", modelSunPrefix: "موديل شمسي #",
            waMsgPrefix: "مرحباً دلتا، أود الاستفسار عن "
        },
        en: {
            title: "Delta Optics Premium Collections",
            tabAll: "All", tabMed: "Medical", tabSun: "Sunglasses",
            badgeMed: "Medical", badgeSun: "Sun",
            cardDesc: "Tap to view",
            waBtn: "Inquire about this model",
            modelMedPrefix: "Medical Model #", modelSunPrefix: "Sun Model #",
            waMsgPrefix: "Hi Delta, I would like to inquire about "
        }
    };

    let curLang = 'ar';

    function toggleLang() {
        curLang = curLang === 'ar' ? 'en' : 'ar';
        document.documentElement.dir = curLang === 'ar' ? 'rtl' : 'ltr';
        document.documentElement.lang = curLang;
        document.getElementById('lang-toggle').innerText = curLang === 'ar' ? 'EN' : 'عربي';
        
        document.getElementById('txt-main-title').innerText = i18n[curLang].title;
        document.getElementById('tab-all').innerText = i18n[curLang].tabAll;
        document.getElementById('tab-med').innerText = i18n[curLang].tabMed;
        document.getElementById('tab-sun').innerText = i18n[curLang].tabSun;
        document.getElementById('txt-wa-btn').innerText = i18n[curLang].waBtn;

        document.getElementById('gallery').innerHTML = "";
        buildGallery();
    }

    // --- 2. إعدادات الصور (تشمل القديم والجديد) ---
    const config = {
        medicalImages: 60,      // الطبي الجديد (m1.jpg)
        oldMedicalImages: 40,   // الطبي القديم (m1.jpg.jpg)
        sunImages: 20,          // الشمسي الجديد (s1.jpg)
        oldSunImages: 30        // الشمسي القديم (s1.jpg.jpg)
    };

    const gallery = document.getElementById('gallery');
    
    // --- 3. بناء المعرض ---
    function buildGallery() {
        const fragment = document.createDocumentFragment();
        let delayCount = 0; // لضبط الأنيميشن بشكل متتالي

        // 1. إضافة الطبي القديم (.jpg.jpg)
        for (let i = 1; i <= config.oldMedicalImages; i++) {
            delayCount++;
            let tName = `${i18n[curLang].modelMedPrefix}${i} (كلاسيك)`;
            // لاحظ امتداد الصورة القديمة
            fragment.appendChild(createCardHTML('medical', `m${i}.jpg.jpg`, tName, i18n[curLang].badgeMed, delayCount * 0.02));
        }

        // 2. إضافة الطبي الجديد (.jpg)
        for (let i = 1; i <= config.medicalImages; i++) {
            delayCount++;
            let tName = `${i18n[curLang].modelMedPrefix}${i}`;
            fragment.appendChild(createCardHTML('medical', `m${i}.jpg`, tName, i18n[curLang].badgeMed, delayCount * 0.02));
        }

        // 3. إضافة الشمسي القديم (.jpg.jpg)
        for (let i = 1; i <= config.oldSunImages; i++) {
            delayCount++;
            let tName = `${i18n[curLang].modelSunPrefix}${i} (كلاسيك)`;
            fragment.appendChild(createCardHTML('sun', `s${i}.jpg.jpg`, tName, i18n[curLang].badgeSun, delayCount * 0.02));
        }

        // 4. إضافة الشمسي الجديد (.jpg)
        for (let i = 1; i <= config.sunImages; i++) {
            delayCount++;
            let tName = `${i18n[curLang].modelSunPrefix}${i}`;
            fragment.appendChild(createCardHTML('sun', `s${i}.jpg`, tName, i18n[curLang].badgeSun, delayCount * 0.02));
        }

        gallery.appendChild(fragment);
    }

    function createCardHTML(type, filename, title, badgeTxt, delay) {
        const card = document.createElement('div');
        card.className = `card item-${type}`;
        card.style.animationDelay = `${delay}s`;
        
        card.innerHTML = `
            <div class="badge">${badgeTxt}</div>
            <div class="img-wrap">
                <img src="${filename}" alt="${title}" loading="lazy" 
                     onload="this.classList.add('loaded')" 
                     onerror="this.parentElement.parentElement.remove()">
            </div>
            <div class="card-info">
                <h3>${title}</h3>
                <p>${i18n[curLang].cardDesc}</p>
            </div>
        `;

        card.addEventListener('click', () => openLightbox(filename, title));
        return card;
    }

    // --- 4. نظام التصفية ---
    const filterBtns = document.querySelectorAll('.tab-btn');
    filterBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
            filterBtns.forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');

            const filterValue = e.target.getAttribute('data-filter');
            const allCards = document.querySelectorAll('.card');

            allCards.forEach(card => {
                if (filterValue === 'all') {
                    card.style.display = 'block';
                } else {
                    card.style.display = card.classList.contains(`item-${filterValue}`) ? 'block' : 'none';
                }
            });
        });
    });

    // --- 5. نظام التكبير (Lightbox) والواتساب الذكي ---
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lb-img');
    const lbTitle = document.getElementById('lb-title');
    const lbWa = document.getElementById('lb-wa');

    function openLightbox(src, title) {
        lbImg.src = src;
        lbTitle.innerText = title;
        
        let pageUrl = window.location.href.split('?')[0].split('#')[0];
        let baseUrl = pageUrl.substring(0, pageUrl.lastIndexOf('/'));
        let fullImageUrl = `${baseUrl}/${src}`;
        
        let waMsg = `${i18n[curLang].waMsgPrefix}${title} (الرمز: ${src}).\nرابط الصورة: ${fullImageUrl}`;
        lbWa.href = `https://wa.me/962775549700?text=${encodeURIComponent(waMsg)}`;
        
        lightbox.classList.add('active');
    }

    function closeLightbox() {
        lightbox.classList.remove('active');
        setTimeout(() => lbImg.src = "", 300);
    }

    lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) closeLightbox();
    });

    // تشغيل البناء فور تحميل الصفحة
    document.addEventListener('DOMContentLoaded', buildGallery);

</script>
</body>
</html>
