<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Medical Test | Delta Optics</title>
    
    <link rel="icon" href="logo.jpg" type="image/jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --brand-color: #0E7490; --gold: #D4AF37; --bg-body: #F8FAFC; 
            --white: #FFFFFF; --text-main: #1E293B; --text-light: #64748B;
            --success: #10B981; --error: #EF4444; --warning: #F59E0B;
        }

        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background: var(--bg-body); color: var(--text-main); margin: 0; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

        header { 
            background: var(--white); height: 60px; padding: 0 20px;
            box-shadow: 0 2px 15px rgba(14, 116, 144, 0.08); 
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .header-title { font-weight: 800; font-size: 1.1rem; color: var(--brand-color); margin: 0; }
        .back-btn { width: 38px; height: 38px; border-radius: 50%; background: #F1F5F9; color: var(--text-main); display: flex; align-items: center; justify-content: center; text-decoration: none; }

        .container { flex: 1; padding: 20px; max-width: 500px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .screen { display: none; width: 100%; animation: fadeIn 0.4s ease-out; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .login-box { background: var(--white); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; width: 100%; border: 1px solid #E2E8F0; }
        .login-input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #E2E8F0; font-size: 1.1rem; margin-bottom: 20px; text-align: center; outline: none; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .test-card { background: var(--white); padding: 15px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); cursor: pointer; display: flex; flex-direction: column; align-items: center; text-align: center; border: 1px solid #E2E8F0; transition: 0.2s; }
        .test-card:active { transform: scale(0.96); }
        .icon-wrap { width: 45px; height: 45px; background: #ECFEFF; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--brand-color); font-size: 1.3rem; margin-bottom: 8px; }

        .progress-container { width: 100%; background: #E2E8F0; border-radius: 10px; height: 6px; margin-bottom: 15px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--success); width: 0%; transition: width 0.3s ease; }
        .eye-indicator { background: var(--brand-color); color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; margin-bottom: 10px; display: inline-block; }

        .test-area { background: var(--white); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 20px; min-height: 240px; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 1px solid #E2E8F0; position: relative; }
        .e-char { font-weight: 900; line-height: 1; transition: transform 0.2s; }
        
        .d-pad-container { direction: ltr; display: grid; grid-template-columns: 60px 60px 60px; gap: 10px; justify-content: center; }
        .pad-btn { width: 60px; height: 60px; border-radius: 50%; border: none; background: var(--white); color: var(--brand-color); font-size: 1.5rem; box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; }

        .color-canvas { border-radius: 50%; width: 220px; height: 220px; background: #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .numpad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 250px; margin: 0 auto; direction: ltr; }
        .num-key { width: 60px; height: 60px; border-radius: 50%; border: none; background: #F8FAFC; font-weight: 800; font-size: 1.2rem; cursor: pointer; }

        .duo-split { display: flex; width: 100%; height: 180px; border-radius: 15px; overflow: hidden; }
        .duo-red { flex: 1; background: #EF4444; display: flex; align-items: center; justify-content: center; }
        .duo-green { flex: 1; background: #10B981; display: flex; align-items: center; justify-content: center; }
        .duo-circle { width: 50px; height: 50px; border: 6px solid black; border-radius: 50%; }

        .timer-circle { width: 140px; height: 140px; border-radius: 50%; border: 8px solid #E2E8F0; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 900; color: var(--brand-color); margin: 15px auto; }

        .action-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 800; font-size: 1rem; cursor: pointer; margin-bottom: 10px; display: flex; justify-content: center; gap: 8px; align-items: center; text-decoration: none; }
        .btn-primary { background: var(--brand-color); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-outline { background: transparent; border: 2px solid #E2E8F0; color: var(--text-main); }

        .report-card { background: var(--white); padding: 20px; border-radius: 20px; border: 1px solid #E2E8F0; width: 100%; }
        .res-item { background: #F8FAFC; padding: 12px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #E2E8F0; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal-box { background: white; padding: 30px; border-radius: 24px; width: 90%; max-width: 350px; text-align: center; }

        #firebase-loader { display: none; text-align: center; color: var(--brand-color); font-weight: 800; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i></a>
        <h1 class="header-title">العيادة الذكية | دلتا</h1>
        <button class="lang-btn" onclick="location.reload()">AR</button>
    </header>

    <div class="container">

        <div id="screen-login" class="screen active">
            <div class="login-box">
                <img src="logo.jpg" onerror="this.src='https://via.placeholder.com/80?text=Delta'">
                <h2>تسجيل المراجع</h2>
                <input type="text" id="patientNameInput" class="login-input" placeholder="اسم المراجع الثلاثي">
                <button class="action-btn btn-primary" onclick="startSession()">بدء الفحوصات</button>
            </div>
        </div>

        <div id="menu" class="screen">
            <div class="welcome-box"><div class="patient-badge"><i class="fas fa-user"></i> المراجع: <span id="display-patient-name"></span></div></div>
            <div class="menu-grid">
                <div class="test-card" onclick="startTest('vision')"><div class="icon-wrap"><i class="fas fa-eye"></i></div><h3>حدة النظر</h3></div>
                <div class="test-card" onclick="startTest('duochrome')"><div class="icon-wrap" style="color:#EF4444;"><i class="fas fa-adjust"></i></div><h3>أحمر وأخضر</h3></div>
                <div class="test-card" onclick="startTest('contrast')"><div class="icon-wrap" style="color:#1E293B;"><i class="fas fa-moon"></i></div><h3>رؤية ليلية</h3></div>
                <div class="test-card" onclick="startTest('dryeye')"><div class="icon-wrap" style="color:#F59E0B;"><i class="fas fa-tint"></i></div><h3>جفاف العين</h3></div>
                <div class="test-card" onclick="startTest('astigmatism')"><div class="icon-wrap"><i class="fas fa-certificate"></i></div><h3>انحراف النظر</h3></div>
                <div class="test-card" onclick="startTest('color')"><div class="icon-wrap"><i class="fas fa-palette"></i></div><h3>عمى الألوان</h3></div>
            </div>
            <button class="action-btn btn-success" style="margin-top:20px;" id="btn-finish" onclick="submitToFirebase()">إنهاء وحفظ النتائج</button>
            <div id="firebase-loader"><i class="fas fa-spinner fa-spin"></i> جاري مزامنة البيانات...</div>
        </div>

        <div id="test-vision" class="screen">
            <div class="progress-container"><div class="progress-bar" id="prog-vision"></div></div>
            <div class="eye-indicator" id="eye-ind-vision">العين اليمنى</div>
            <div class="test-area"><div id="e-char" class="e-char" style="font-size:100px;">E</div></div>
            <div class="d-pad-container">
                <button class="pad-btn" style="grid-column:2" onclick="checkVision(270)"><i class="fas fa-chevron-up"></i></button>
                <button class="pad-btn" style="grid-column:1" onclick="checkVision(180)"><i class="fas fa-chevron-left"></i></button>
                <button class="pad-btn" style="grid-column:2" onclick="checkVision(90)"><i class="fas fa-chevron-down"></i></button>
                <button class="pad-btn" style="grid-column:3" onclick="checkVision(0)"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>

        <div id="test-contrast" class="screen">
            <div class="progress-container"><div class="progress-bar" id="prog-contrast"></div></div>
            <div class="eye-indicator" id="eye-ind-contrast">العين اليمنى</div>
            <div class="test-area" style="background:#0F172A;"><div id="c-char" class="e-char" style="color:rgba(255,255,255,0.5);">E</div></div>
            <div class="d-pad-container">
                <button class="pad-btn" style="grid-column:2" onclick="checkContrast(270)"><i class="fas fa-chevron-up"></i></button>
                <button class="pad-btn" style="grid-column:1" onclick="checkContrast(180)"><i class="fas fa-chevron-left"></i></button>
                <button class="pad-btn" style="grid-column:2" onclick="checkContrast(90)"><i class="fas fa-chevron-down"></i></button>
                <button class="pad-btn" style="grid-column:3" onclick="checkContrast(0)"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>

        <div id="test-duochrome" class="screen">
            <div class="eye-indicator" id="eye-ind-duo">العين اليمنى</div>
            <div class="test-area">
                <h4 style="margin-bottom:15px;">أين ترى الدائرة أوضح؟</h4>
                <div class="duo-split">
                    <div class="duo-green" onclick="saveDuochrome('green')"><div class="duo-circle"></div></div>
                    <div class="duo-red" onclick="saveDuochrome('red')"><div class="duo-circle"></div></div>
                </div>
            </div>
            <button class="action-btn btn-outline" onclick="saveDuochrome('equal')">نفس الوضوح</button>
        </div>

        <div id="test-dryeye" class="screen">
            <div class="eye-indicator">العينين معاً</div>
            <div class="test-area">
                <div class="timer-circle" id="dry-timer">0.0</div>
                <button class="action-btn btn-primary" id="btn-dry-start" onclick="startDryTimer()">ابدأ المؤقت</button>
                <button class="action-btn btn-danger" id="btn-dry-stop" style="display:none;" onclick="stopDryTimer()">رمشت!</button>
            </div>
        </div>

        <div id="test-astigmatism" class="screen">
            <div class="eye-indicator" id="eye-ind-ast">العين اليمنى</div>
            <div class="test-area">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Astigmatism_chart.svg/240px-Astigmatism_chart.svg.png" style="width:180px;">
            </div>
            <button class="action-btn btn-danger" onclick="finishAstigmatism(true)">أرى خطوطاً أغمق</button>
            <button class="action-btn btn-outline" onclick="finishAstigmatism(false)">الكل متساوي</button>
        </div>

        <div id="test-color" class="screen">
            <div class="progress-container"><div class="progress-bar" id="prog-color"></div></div>
            <div style="text-align:center;"><canvas id="ishiharaCanvas" class="color-canvas"></canvas></div>
            <div id="color-display" style="text-align:center; height:40px; font-size:2rem; font-weight:900; margin:10px 0;"></div>
            <div class="numpad-grid">
                <button class="num-key" onclick="typeColor(1)">1</button><button class="num-key" onclick="typeColor(2)">2</button><button class="num-key" onclick="typeColor(3)">3</button>
                <button class="num-key" onclick="typeColor(4)">4</button><button class="num-key" onclick="typeColor(5)">5</button><button class="num-key" onclick="typeColor(6)">6</button>
                <button class="num-key" style="color:var(--error);" onclick="clearColor()">C</button><button class="num-key" onclick="typeColor(0)">0</button><button class="num-key" style="color:var(--success);" onclick="checkColor()">OK</button>
            </div>
        </div>

        <div id="screen-report" class="screen">
            <div class="report-card">
                <h2 style="color:var(--brand-color); text-align:center;">التقرير الطبي المبدئي</h2>
                <h4 style="text-align:center;" id="report-patient-name"></h4>
                <div id="report-details"></div>
            </div>
            <a id="wa-btn" href="#" class="action-btn btn-success" target="_blank"><i class="fab fa-whatsapp"></i> حجز موعد</a>
            <button class="action-btn btn-outline" onclick="location.reload()">فحص مراجع جديد</button>
        </div>
    </div>

    <div id="instructionModal" class="modal-overlay">
        <div class="modal-box">
            <h2 id="modalTitle">تعليمات</h2>
            <p id="modalText" style="line-height:1.6; color:var(--text-light);"></p>
            <button class="action-btn btn-primary" onclick="closeModal()">حسناً، ابدأ الفحص</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB11C4GGgAyqeThs8a9cvDNN7frvAA1nqQ",
            authDomain: "delta-optics-system.firebaseapp.com",
            projectId: "delta-optics-system",
            storageBucket: "delta-optics-system.firebasestorage.app",
            messagingSenderId: "111176219224",
            appId: "1:111176219224:web:e0d8a5f26b84d57249a82d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.sendToAdminPanel = async (pName, details) => {
            try { 
                await addDoc(collection(db, "tests"), { name: pName, details: details, timestamp: serverTimestamp() }); 
                return true; 
            } catch (e) { console.error(e); return false; }
        };
    </script>

    <script>
        let currentPatient = ""; let currentResults = {}; let activeTest = ""; let currentEye = "rightEye"; 
        const i18n = { ar: { rightEye: "العين اليمنى", leftEye: "العين اليسرى", bothEyes: "العينين معاً" } };

        function startSession() {
            const name = document.getElementById('patientNameInput').value.trim();
            if(!name) return alert("يرجى كتابة اسم المراجع");
            currentPatient = name; document.getElementById('display-patient-name').innerText = name;
            show('menu');
        }

        async function submitToFirebase() {
            if(Object.keys(currentResults).length === 0) return alert("يرجى إكمال فحص واحد على الأقل");
            document.getElementById('btn-finish').style.display='none';
            document.getElementById('firebase-loader').style.display='block';

            let reportText = "";
            for (const [test, eyes] of Object.entries(currentResults)) {
                reportText += `\n[ ${test} ]\n`;
                for (const [eye, score] of Object.entries(eyes)) reportText += `- ${i18n.ar[eye] || eye}: ${score}\n`;
            }

            if(window.sendToAdminPanel) await window.sendToAdminPanel(currentPatient, reportText.trim());
            renderFinalReport(); show('screen-report');
            document.getElementById('firebase-loader').style.display='none';
        }

        function startTest(type) {
            activeTest = type; currentEye = (type === 'color' || type === 'dryeye') ? 'bothEyes' : 'rightEye';
            const msgs = {
                vision: "المسافة: 40 سم. غطِ العين اليسرى أولاً، واتبع فتحة حرف E.",
                duochrome: "انظر للدوائر، أيهما أوضح على الخلفية الحمراء أم الخضراء؟",
                contrast: "فحص الرؤية في الظلام. اتبع الحروف الباهتة.",
                dryeye: "افتح عينيك جيداً واصمد لأطول فترة ممكنة دون أن ترمش.",
                astigmatism: "انظر للمروحة، هل جميع الخطوط بنفس الوضوح واللون؟",
                color: "اكتب الأرقام التي تراها داخل الدوائر الملونة."
            };
            openModal("تعليمات الفحص", msgs[type]);
        }

        function closeModal() { document.getElementById('instructionModal').classList.remove('active'); runLogic(); }
        function openModal(t, txt) { document.getElementById('modalTitle').innerText = t; document.getElementById('modalText').innerText = txt; document.getElementById('instructionModal').classList.add('active'); }

        function runLogic() {
            if(activeTest === 'vision') startVision();
            else if(activeTest === 'contrast') startContrast();
            else if(activeTest === 'color') startColor();
            else if(activeTest === 'dryeye') { document.getElementById('btn-dry-start').style.display='block'; show('test-dryeye'); }
            else if(activeTest === 'astigmatism') { document.getElementById('eye-ind-ast').innerText = i18n.ar[currentEye]; show('test-astigmatism'); }
            else if(activeTest === 'duochrome') { document.getElementById('eye-ind-duo').innerText = i18n.ar[currentEye]; show('test-duochrome'); }
        }

        // --- فحص النظر ---
        let vStep = 0, vRot = 0, vErrors = 0; const vLabels = ["6/60", "6/36", "6/24", "6/18", "6/12", "6/6"];
        function startVision() { vStep = 0; vErrors = 0; document.getElementById('eye-ind-vision').innerText = i18n.ar[currentEye]; updateV(); show('test-vision'); }
        function updateV() {
            if(vStep >= 6) { saveResult("6/6"); return; }
            vRot = [0, 90, 180, 270][Math.floor(Math.random()*4)];
            document.getElementById('e-char').style.cssText = `font-size:${130 - vStep*18}px; transform:rotate(${vRot}deg);`;
            document.getElementById('prog-vision').style.width = (vStep/6*100) + "%";
        }
        function checkVision(dir) { if(dir === vRot) { vStep++; updateV(); } else { vErrors++; if(vErrors > 1) saveResult(vStep > 0 ? vLabels[vStep-1] : "< 6/60"); else updateV(); } }

        // --- فحص التباين ---
        let cStep = 0, cRot = 0, cErrors = 0; const cOpacities = [0.6, 0.4, 0.2, 0.1, 0.05];
        function startContrast() { cStep = 0; cErrors = 0; document.getElementById('eye-ind-contrast').innerText = i18n.ar[currentEye]; updateC(); show('test-contrast'); }
        function updateC() {
            if(cStep >= 5) { saveResult("ممتاز"); return; }
            cRot = [0, 90, 180, 270][Math.floor(Math.random()*4)];
            document.getElementById('c-char').style.cssText = `font-size:80px; transform:rotate(${cRot}deg); color:rgba(255,255,255,${cOpacities[cStep]});`;
            document.getElementById('prog-contrast').style.width = (cStep/5*100) + "%";
        }
        function checkContrast(dir) { if(dir === cRot) { cStep++; updateC(); } else { cErrors++; if(cErrors > 1) saveResult(cStep > 2 ? "طبيعي" : "ضعيف"); else updateC(); } }

        // --- فحص الألوان ---
        let colRound = 0, colScore = 0, colInput = ""; const colTests = [12, 5, 29, 74, 8];
        function startColor() { colRound=0; colScore=0; nextCol(); show('test-color'); }
        function nextCol() {
            if(colRound >= 5) { saveResult(`${colScore}/5`); return; }
            colInput = ""; document.getElementById('color-display').innerText = ""; drawCol(colTests[colRound]);
            document.getElementById('prog-color').style.width = (colRound/5*100) + "%";
        }
        function drawCol(num) {
            const ctx = document.getElementById('ishiharaCanvas').getContext('2d'); ctx.clearRect(0,0,220,220); ctx.font="bold 120px Arial"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(num, 110, 110);
            const data = ctx.getImageData(0,0,220,220).data; ctx.clearRect(0,0,220,220);
            for(let i=0; i<1000; i++){
                let x = Math.random()*220, y=Math.random()*220, r=Math.random()*4+1;
                if(Math.sqrt((x-110)**2 + (y-110)**2) > 100) continue;
                let isNum = data[(Math.floor(y)*220 + Math.floor(x))*4 + 3] > 100;
                ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fillStyle = isNum ? `rgb(${200+Math.random()*55}, 60, 60)` : `rgb(60, ${150+Math.random()*80}, 60)`; ctx.fill();
            }
        }
        function typeColor(n) { if(colInput.length<2) colInput+=n; document.getElementById('color-display').innerText = colInput; }
        function clearColor() { colInput=""; document.getElementById('color-display').innerText = ""; }
        function checkColor() { if(parseInt(colInput) === colTests[colRound]) colScore++; colRound++; nextCol(); }

        // --- جفاف العين ---
        let dTimer, dTime = 0;
        function startDryTimer() { dTime=0; document.getElementById('btn-dry-start').style.display='none'; document.getElementById('btn-dry-stop').style.display='block'; dTimer = setInterval(() => { dTime+=0.1; document.getElementById('dry-timer').innerText = dTime.toFixed(1); }, 100); }
        function stopDryTimer() { clearInterval(dTimer); saveResult(dTime > 10 ? "طبيعي" : "جفاف محتمل"); }

        function saveResult(score) {
            if(!currentResults[activeTest]) currentResults[activeTest] = {};
            currentResults[activeTest][currentEye] = score;
            if(currentEye === 'rightEye' && activeTest !== 'color' && activeTest !== 'dryeye') {
                currentEye = 'leftEye'; openModal("تبديل العين", "الآن غطِ العين اليمنى لنفحص اليسرى.");
            } else { show('menu'); }
        }

        function saveDuochrome(res) { saveResult(res === 'equal' ? "توازن طبيعي" : "اشتباه طول/قصر"); }
        function finishAstigmatism(val) { saveResult(val ? "اشتباه انحراف" : "طبيعي"); }

        function renderFinalReport() {
            document.getElementById('report-patient-name').innerText = currentPatient;
            let h = ""; for (const [t, r] of Object.entries(currentResults)) {
                h += `<div class="res-item"><b>${t}</b>`;
                for (const [e, s] of Object.entries(r)) h += `<div>${i18n.ar[e] || e}: ${s}</div>`;
                h += `</div>`;
            }
            document.getElementById('report-details').innerHTML = h;
            document.getElementById('wa-btn').href = `https://wa.me/962775549700?text=تقرير فحص المراجع: ${currentPatient}`;
        }

        function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    </script>
