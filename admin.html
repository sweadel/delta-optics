<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Optics | لوحة التحكم المركزية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #2563eb; --primary-hover: #1d4ed8; --primary-light: #dbeafe;
            --bg: #f8fafc; --surface: #ffffff;
            --sidebar: #0f172a; --sidebar-hover: #1e293b; --sidebar-text: #94a3b8;
            --text-main: #0f172a; --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; outline: none; }
        body { background-color: var(--bg); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* سكرول بار أنيق */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* 📱 الشريط الجانبي */
        .sidebar { width: 260px; background: var(--sidebar); display: flex; flex-direction: column; color: white; z-index: 100; transition: 0.3s; }
        .sidebar-brand { padding: 30px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sidebar-brand i { font-size: 2rem; color: #3b82f6; }
        .sidebar-brand h2 { font-size: 1.4rem; font-weight: 900; letter-spacing: 1px; }
        
        .nav-menu { padding: 20px 10px; flex: 1; overflow-y: auto; }
        .nav-item { padding: 14px 20px; display: flex; align-items: center; gap: 15px; color: var(--sidebar-text); font-weight: 600; cursor: pointer; border-radius: 8px; margin-bottom: 5px; transition: 0.2s; font-size: 0.95rem; }
        .nav-item:hover { background: var(--sidebar-hover); color: white; }
        .nav-item.active { background: var(--primary); color: white; }

        /* 💻 المحتوى الرئيسي */
        .main-layout { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { background: var(--surface); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .content-area { flex: 1; padding: 30px; overflow-y: auto; }

        .page-title { font-size: 1.5rem; font-weight: 900; margin-bottom: 5px; color: var(--text-main); }
        .page-subtitle { color: var(--text-muted); font-size: 0.9rem; }

        /* 🗂️ الكروت والأقسام */
        .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 25px; box-shadow: var(--shadow); margin-bottom: 30px; display: none; animation: fadeIn 0.3s ease; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .panel-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; }
        .panel-header h3 { font-weight: 800; display: flex; align-items: center; gap: 10px; }

        /* 📊 الجداول الاحترافية */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: right; }
        th { padding: 15px 20px; color: var(--text-muted); font-size: 0.85rem; border-bottom: 1px solid var(--border); background: #f8fafc; font-weight: 700; white-space: nowrap; }
        td { padding: 15px 20px; border-bottom: 1px solid var(--border); font-weight: 500; font-size: 0.95rem; vertical-align: middle; }
        tr:hover td { background: #f8fafc; }

        /* 🎛️ النماذج والأزرار */
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .input-box { width: 100%; padding: 12px 15px; border: 1px solid var(--border); border-radius: 8px; font-family: 'Tajawal', sans-serif; font-size: 0.95rem; transition: 0.2s; background: #f8fafc; }
        .input-box:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 3px var(--primary-light); }
        
        .btn { padding: 10px 20px; border-radius: 8px; font-weight: 700; font-family: 'Tajawal', sans-serif; border: none; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; font-size: 0.9rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-danger { background: #fee2e2; color: var(--danger); }
        .btn-success { background: #dcfce7; color: var(--success); }
        .btn-outline { border: 1px solid var(--border); background: white; color: var(--text-main); }
        .btn:active { transform: scale(0.96); }

        .badge { padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; display: inline-block; }
        .thumb-img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border); }

        /* الشات */
        .chat-box { height: 400px; display: flex; flex-direction: column; background: #f8fafc; border-radius: var(--radius); border: 1px solid var(--border); }
        .chat-msgs { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 75%; padding: 12px 15px; border-radius: 12px; font-size: 0.9rem; line-height: 1.5; }
        .msg-me { align-self: flex-end; background: var(--primary); color: white; border-bottom-left-radius: 2px; }
        .msg-them { align-self: flex-start; background: white; border: 1px solid var(--border); border-bottom-right-radius: 2px; }

    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-brand">
            <i class="fas fa-gem"></i>
            <h2>DELTA PRO</h2>
        </div>
        <div class="nav-menu">
            <div class="nav-item active" onclick="switchTab(event, 'products')"><i class="fas fa-glasses"></i> إدارة التشكيلات</div>
            <div class="nav-item" onclick="switchTab(event, 'reports')"><i class="fas fa-clipboard-list"></i> الفحوصات الطبية</div>
            <div class="nav-item" onclick="switchTab(event, 'chat')"><i class="fas fa-comments"></i> دردشة الطاقم</div>
        </div>
    </aside>

    <main class="main-layout">
        <header class="topbar">
            <div>
                <h1 class="page-title">لوحة التحكم</h1>
                <p class="page-subtitle">إدارة الموقع وعرض المنتجات</p>
            </div>
            <button class="btn btn-outline" style="color:var(--danger); border-color:#fee2e2;" onclick="location.reload()"><i class="fas fa-power-off"></i> خروج</button>
        </header>

        <div class="content-area">
            
            <div id="sec-products" class="panel active">
                <div class="panel-header">
                    <h3><i class="fas fa-plus-circle" style="color:var(--primary);"></i> إضافة وتعديل منتج (طبي / شمسي)</h3>
                    <button id="save-prod-btn" class="btn btn-primary" onclick="saveProduct()"><i class="fas fa-save"></i> حفظ المنتج</button>
                </div>
                
                <div style="background: #f8fafc; padding: 20px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 25px;">
                    <input type="hidden" id="p-id">
                    <div style="display:flex; gap:20px; flex-wrap: wrap;">
                        <div style="text-align: center; width: 120px;">
                            <img id="p-img-preview" src="https://via.placeholder.com/120" style="width:120px; height:120px; border-radius:8px; object-fit:cover; border:1px solid var(--border); margin-bottom:10px; cursor:pointer;" onclick="document.getElementById('p-img-file').click()">
                            <input type="file" id="p-img-file" accept="image/*" style="display:none;" onchange="compressAndPreview(event)">
                            <input type="hidden" id="p-img-base64">
                            <small style="color:var(--text-muted); font-size:0.75rem;">اضغط لتغيير الصورة</small>
                        </div>
                        
                        <div style="flex: 1;">
                            <div class="form-row">
                                <input type="text" id="p-name" class="input-box" placeholder="اسم الموديل (مثال: Aviator Classic)">
                                <input type="text" id="p-brand" class="input-box" placeholder="الماركة (مثال: Ray-Ban)">
                            </div>
                            <div class="form-row">
                                <select id="p-type" class="input-box">
                                    <option value="طبي">نظارة طبية</option>
                                    <option value="شمسي">نظارة شمسية</option>
                                </select>
                                <input type="number" id="p-price" class="input-box" placeholder="السعر بالدينار (مثال: 45)">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="panel-header">
                    <h3><i class="fas fa-boxes" style="color:var(--primary);"></i> المنتجات المعروضة في الموقع</h3>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>الصورة</th><th>المنتج</th><th>النوع</th><th>السعر</th><th>إجراء</th></tr></thead>
                        <tbody id="products-body">
                            </tbody>
                    </table>
                </div>
            </div>

            <div id="sec-reports" class="panel">
                <div class="panel-header">
                    <h3><i class="fas fa-file-medical-alt" style="color:var(--primary);"></i> سجل مراجعين العيادة</h3>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>الاسم</th><th>الملاحظات الطبية</th><th>تاريخ الفحص</th></tr></thead>
                        <tbody id="reports-body"></tbody>
                    </table>
                </div>
            </div>

            <div id="sec-chat" class="panel">
                <div class="panel-header">
                    <h3><i class="fas fa-comments" style="color:var(--primary);"></i> تواصل الطاقم</h3>
                </div>
                <div class="chat-box">
                    <div class="chat-msgs" id="chat-body"></div>
                    <div style="padding: 15px; border-top: 1px solid var(--border); display: flex; gap: 10px;">
                        <input type="text" id="chat-input" class="input-box" style="margin:0;" placeholder="اكتب رسالتك..." onkeypress="if(event.key === 'Enter') sendChat()">
                        <button class="btn btn-primary" onclick="sendChat()"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyB11C4GGgAyqeThs8a9cvDNN7frvAA1nqQ", authDomain: "delta-optics-system.firebaseapp.com", projectId: "delta-optics-system", storageBucket: "delta-optics-system.firebasestorage.app", messagingSenderId: "111176219224", appId: "1:111176219224:web:e0d8a5f26b84d57249a82d" };
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);

        // التبديل بين الأقسام
        window.switchTab = (e, tab) => {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            e.currentTarget.classList.add('active');
            document.querySelectorAll('.panel').forEach(s => s.classList.remove('active'));
            document.getElementById('sec-' + tab).classList.add('active');
        };

        // 🖼️ دالة ضغط الصورة (مهمة جداً لمنع خطأ الفايربيس واختفاء البيانات)
        window.compressAndPreview = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 600; // تصغير العرض لتخفيف الحجم
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    // ضغط الجودة لـ 70%
                    const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('p-img-preview').src = compressedDataUrl;
                    document.getElementById('p-img-base64').value = compressedDataUrl;
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        }

        // 💾 إضافة أو تعديل منتج (طبي أو شمسي)
        window.saveProduct = async () => {
            const btn = document.getElementById('save-prod-btn');
            const id = document.getElementById('p-id').value;
            const name = document.getElementById('p-name').value;
            const brand = document.getElementById('p-brand').value;
            const type = document.getElementById('p-type').value;
            const price = document.getElementById('p-price').value;
            const img = document.getElementById('p-img-base64').value;

            if(!name || !brand || !price) return alert("يرجى تعبئة الاسم والماركة والسعر كحد أدنى.");
            if(!img && !id) return alert("يرجى إضافة صورة للمنتج.");

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحفظ...';
            btn.disabled = true;

            const data = { name, brand, type, price, image: img, timestamp: serverTimestamp() };

            try {
                if(id) {
                    // إذا كان في ID يعني تعديل
                    await setDoc(doc(db, "products", id), data);
                } else {
                    // إضافة جديد
                    await addDoc(collection(db, "products"), data);
                }
                
                // تصفير الخانات بعد النجاح
                document.getElementById('p-id').value = "";
                document.getElementById('p-name').value = "";
                document.getElementById('p-brand').value = "";
                document.getElementById('p-price').value = "";
                document.getElementById('p-img-preview').src = "https://via.placeholder.com/120";
                document.getElementById('p-img-base64').value = "";
                alert("تم الحفظ بنجاح!");
            } catch (err) {
                alert("حدث خطأ! تأكد من اتصال الإنترنت أو صلاحيات قاعدة البيانات.");
                console.error(err);
            }

            btn.innerHTML = '<i class="fas fa-save"></i> حفظ المنتج';
            btn.disabled = false;
        }

        // ✏️ جلب بيانات المنتج للتعديل
        window.editProduct = (id, name, brand, type, price, img) => {
            document.getElementById('p-id').value = id;
            document.getElementById('p-name').value = name;
            document.getElementById('p-brand').value = brand;
            document.getElementById('p-type').value = type;
            document.getElementById('p-price').value = price;
            document.getElementById('p-img-preview').src = img || "https://via.placeholder.com/120";
            document.getElementById('p-img-base64').value = img;
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        // 🗑️ حذف المنتج
        window.delProduct = async (id) => {
            if(confirm("هل أنت متأكد من حذف هذا المنتج من الموقع نهائياً؟")) {
                await deleteDoc(doc(db, "products", id));
            }
        }

        // 📡 جلب البيانات تلقائياً (Real-time Listener)
        function initData() {
            // 1. التشكيلات (المنتجات)
            onSnapshot(query(collection(db, "products"), orderBy("timestamp", "desc")), (snap) => {
                const tb = document.getElementById('products-body'); tb.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    const badgeColor = p.type === 'طبي' ? '#dcfce7' : '#fef3c7';
                    const textColor = p.type === 'طبي' ? '#10b981' : '#f59e0b';
                    tb.innerHTML += `<tr>
                        <td><img src="${p.image}" class="thumb-img"></td>
                        <td><strong>${p.name}</strong><br><small style="color:var(--text-muted);">${p.brand}</small></td>
                        <td><span class="badge" style="background:${badgeColor}; color:${textColor};">${p.type}</span></td>
                        <td><strong>${p.price}</strong> JOD</td>
                        <td>
                            <button class="btn btn-outline" style="padding:6px 10px; color:var(--primary);" onclick="editProduct('${d.id}', '${p.name}', '${p.brand}', '${p.type}', '${p.price}', '${p.image}')"><i class="fas fa-pen"></i></button>
                            <button class="btn btn-danger" style="padding:6px 10px;" onclick="delProduct('${d.id}')"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
                });
            });

            // 2. الفحوصات الطبية
            onSnapshot(query(collection(db, "tests"), orderBy("timestamp", "desc")), (snap) => {
                const tb = document.getElementById('reports-body'); tb.innerHTML = "";
                snap.forEach(d => {
                    const r = d.data(); const date = r.timestamp ? r.timestamp.toDate().toLocaleDateString('ar-EG') : "الآن";
                    tb.innerHTML += `<tr><td><strong>${r.name}</strong></td><td><div style="font-size:0.85rem; color:var(--text-muted);">${r.details}</div></td><td>${date}</td></tr>`;
                });
            });

            // 3. الشات
            onSnapshot(query(collection(db, "internal_chat"), orderBy("timestamp", "asc")), (snap) => {
                const box = document.getElementById('chat-body'); box.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data(); const css = m.sender === "المدير" ? "msg-me" : "msg-them";
                    box.innerHTML += `<div class="msg ${css}"><strong>${m.sender}</strong><br>${m.text}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        window.sendChat = async () => {
            const input = document.getElementById('chat-input');
            if(input.value.trim()) {
                await addDoc(collection(db, "internal_chat"), { sender: "المدير", text: input.value.trim(), timestamp: serverTimestamp() });
                input.value = "";
            }
        }

        // تشغيل جلب البيانات أول ما تفتح اللوحة
        initData();
    </script>
</body>
</html>
