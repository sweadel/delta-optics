<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المخزون | Delta Optics</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="main">
        <header class="header" id="main-header"></header>
        <div class="content" style="padding: 40px;">
            <div class="clean-card">
                <div class="clean-card-header"><i class="fas fa-boxes"></i> إضافة للمستودع</div>
                <div class="clean-card-body">
                    <div class="grid-2">
                        <div class="input-group"><input type="text" id="p-name" class="clean-input" placeholder="اسم المنتج"></div>
                        <div class="input-group"><input type="number" id="p-price" class="clean-input en-num" placeholder="السعر"></div>
                        <div class="input-group"><input type="number" id="p-qty" class="clean-input en-num" placeholder="الكمية"></div>
                    </div>
                    <button class="btn-massive" onclick="saveInv()">حفظ في المستودع</button>
                </div>
            </div>
            <div class="clean-card"><div class="clean-card-header">المستودع</div><table class="data-table"><thead><tr><th>المنتج</th><th>الكمية</th><th>السعر</th></tr></thead><tbody id="tb-inv"></tbody></table></div>
        </div>
    </div>
    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { loadLayout } from './layout.js';

        loadLayout('المخزون', 'inv');

        window.saveInv = async () => {
            const name = document.getElementById('p-name').value;
            if(!name) return Swal.fire('خطأ', 'أدخل الاسم', 'error');
            await addDoc(collection(db, "products"), {
                name, price: Number(document.getElementById('p-price').value),
                qty: Number(document.getElementById('p-qty').value), time: serverTimestamp()
            });
            Swal.fire('تم', '', 'success');
        };

        onSnapshot(collection(db, "products"), (s) => {
            let html = "";
            s.forEach(d => html += `<tr><td>${d.data().name}</td><td class="en-num">${d.data().qty}</td><td class="en-num">${d.data().price}</td></tr>`);
            document.getElementById('tb-inv').innerHTML = html;
        });
    </script>
</body>
</html>
