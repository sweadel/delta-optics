<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Delta Optics | النظام المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">
            <h2 style="margin:0; color:var(--primary);">DELTA OPTICS</h2>
            <small>نظام الإدارة</small>
        </div>
        <button class="nav-link active" onclick="show('dash')"><i class="fas fa-home"></i> الرئيسية</button>
        <button class="nav-link" onclick="show('rx')"><i class="fas fa-eye"></i> فحص النظر (Rx)</button>
        <button class="nav-link" onclick="show('inv')"><i class="fas fa-box"></i> المخزون</button>
        
        <div class="admin-only" style="margin-top:20px; border-top:1px solid #334155; padding-top:10px;">
            <small style="color:var(--accent)">أدوات الإدارة</small>
            <button class="nav-link" onclick="show('staff')"><i class="fas fa-users-cog"></i> الموظفين</button>
        </div>
        <button class="nav-link" style="margin-top:auto; color:var(--danger)" id="btn-logout"><i class="fas fa-sign-out-alt"></i> خروج</button>
    </aside>

    <div class="main">
        <section id="dash" class="view active-view">
            <div class="card">
                <h3>مرحباً <span id="user-name-display"></span></h3>
                <p>حدد القسم من القائمة الجانبية للبدء.</p>
            </div>
        </section>

        <section id="rx" class="view">
            <div class="card">
                <h3>فحص مراجع جديد (Rx)</h3>
                <input type="text" id="p-name" placeholder="اسم المراجع" style="margin-bottom: 10px;">
                <button id="btn-save-rx" class="btn btn-primary">حفظ الفحص</button>
            </div>
        </section>

        <section id="inv" class="view">
            <div class="card">
                <h3>المخزون</h3>
                <table>
                    <thead><tr><th>الكود</th><th>الماركة</th><th>النوع</th><th>الكمية</th><th>السعر</th></tr></thead>
                    <tbody id="inv-table"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script type="module">
        import { AuthSystem } from './auth.js';
        import { AppLogic } from './app.js';

        // التبديل بين الشاشات
        window.show = (id) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active-view');
            event.currentTarget.classList.add('active');
        };

        // التحقق من الجلسة عند تحميل الصفحة
        document.addEventListener('DOMContentLoaded', async () => {
            if(!AuthSystem.checkSession()) {
                // محاكاة تسجيل الدخول السريع للاختبار (يمكنك ربطها بشاشة لوجن منفصلة لاحقاً)
                await AuthSystem.login('adel', '123123'); 
            }
            document.getElementById('user-name-display').innerText = AuthSystem.currentUser.name;
            AppLogic.init();
        });

        // ربط الأزرار بالوظائف
        document.getElementById('btn-logout').onclick = () => AuthSystem.logout();
        
        document.getElementById('btn-save-rx').onclick = async () => {
            const name = document.getElementById('p-name').value;
            if(!name) return Swal.fire('خطأ', 'أدخل اسم المراجع', 'error');
            await AppLogic.saveRx({ patient: name });
            Swal.fire('تم', 'تم حفظ الفحص بنجاح', 'success');
        };
    </script>
</body>
</html>
