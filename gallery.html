<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المعرض | Delta Optics</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="main">
        <header class="header" id="main-header"></header>
        <div class="content" style="padding: 40px;">
            <div class="clean-card">
                <div class="clean-card-header"><i class="fas fa-images"></i> إضافة موديل للمعرض</div>
                <div class="clean-card-body">
                    <div class="input-group"><input type="text" id="g-name" class="clean-input" placeholder="اسم الموديل"></div>
                    <div class="input-group"><input type="file" class="clean-input" onchange="handleImg(event)"></div>
                    <input type="hidden" id="g-b64">
                    <img id="img-prv" style="display:none; width:100px; border-radius:12px; margin-bottom:15px;">
                    <button class="btn-massive" onclick="saveGallery()">نشر الموديل</button>
                </div>
            </div>
            <div class="clean-card"><div class="clean-card-header">المعرض الحالي</div><table class="data-table"><thead><tr><th>الصورة</th><th>الاسم</th><th>إجراء</th></tr></thead><tbody id="tb-gallery"></tbody></table></div>
        </div>
    </div>
    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc, deleteDoc, doc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { loadLayout } from './layout.js';

        loadLayout('المعرض', 'gallery');

        window.handleImg = (e) => {
            const r = new FileReader();
            r.onload = (ev) => { document.getElementById('g-b64').value = ev.target.result; document.getElementById('img-prv').src = ev.target.result; document.getElementById('img-prv').style.display='block'; };
            r.readAsDataURL(e.target.files[0]);
        };

        window.saveGallery = async () => {
            const name = document.getElementById('g-name').value; const img = document.getElementById('g-b64').value;
            if(!name || !img) return Swal.fire('خطأ', 'أدخل الاسم والصورة', 'error');
            await addDoc(collection(db, "brands"), { name, imageUrl: img, timestamp: serverTimestamp() });
            Swal.fire('تم', '', 'success');
        };

        window.delGal = async (id) => { if(confirm("حذف؟")) await deleteDoc(doc(db, "brands", id)); };

        onSnapshot(collection(db, "brands"), (s) => {
            let html = "";
            s.forEach(d => html += `<tr><td><img src="${d.data().imageUrl}" style="width:60px; border-radius:8px;"></td><td>${d.data().name}</td><td><button class="btn-massive" style="background:#ef4444; width:auto; padding:10px;" onclick="delGal('${d.id}')">حذف</button></td></tr>`);
            document.getElementById('tb-gallery').innerHTML = html;
        });
    </script>
</body>
</html>
