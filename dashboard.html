<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المراقبة | Delta Optics</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="main">
        <header class="header" id="main-header"></header>
        <div class="content" style="padding: 40px;">
            <div class="kpi-grid">
                <div class="kpi-card"><div class="kpi-title">المبيعات الإجمالية</div><div id="kpi-sales" class="kpi-val en-num">0.00</div></div>
                <div class="kpi-card"><div class="kpi-title">المقبوضات</div><div id="kpi-profits" class="kpi-val en-num text-primary">0.00</div></div>
                <div class="kpi-card"><div class="kpi-title">المصروفات</div><div id="kpi-expenses" class="kpi-val en-num text-danger">0.00</div></div>
                <div class="kpi-card"><div class="kpi-title">الديون</div><div id="kpi-dues" class="kpi-val en-num">0.00</div></div>
            </div>
            <div class="grid-2">
                <div class="clean-card">
                    <div class="clean-card-header"><i class="fas fa-wallet"></i> مصروف جديد</div>
                    <div class="clean-card-body">
                        <div class="input-group"><input type="number" id="exp-amount" class="clean-input en-num" placeholder="المبلغ (JOD)"></div>
                        <div class="input-group"><input type="text" id="exp-desc" class="clean-input" placeholder="البيان"></div>
                        <button class="btn-massive" onclick="saveExpense()">تسجيل</button>
                    </div>
                </div>
                <div class="clean-card">
                    <div class="clean-card-header"><i class="fas fa-list"></i> حركة اليوم</div>
                    <table class="data-table"><thead><tr><th>الوقت</th><th>البيان</th><th>المبلغ</th></tr></thead><tbody id="tb-ledger"></tbody></table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, onSnapshot, query, orderBy, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { loadLayout } from './layout.js';

        loadLayout('لوحة المراقبة', 'dash');

        window.saveExpense = async () => {
            const amount = parseFloat(document.getElementById('exp-amount').value);
            const desc = document.getElementById('exp-desc').value.trim();
            if(!amount || !desc) return Swal.fire('خطأ', 'أكمل البيانات', 'error');
            await addDoc(collection(db, "expenses"), { amount, desc, time: serverTimestamp() });
            Swal.fire('تم', '', 'success');
        };

        const todayStr = new Date().toDateString();
        onSnapshot(query(collection(db, "invoices"), orderBy("time", "desc")), (s) => {
            let total = 0, due = 0, paid = 0; let html = '';
            s.docs.map(d=>d.data()).filter(i => i.time?.toDate().toDateString() === todayStr).forEach(i => {
                total += Number(i.total); paid += Number(i.paid); due += Number(i.due);
                html += `<tr><td class="en-num">${i.time?.toDate().toLocaleTimeString()}</td><td>مبيعات: ${i.pName}</td><td class="en-num">+${i.paid}</td></tr>`;
            });
            document.getElementById('kpi-sales').innerText = total.toFixed(2);
            document.getElementById('kpi-profits').innerText = paid.toFixed(2);
            document.getElementById('kpi-dues').innerText = due.toFixed(2);
            document.getElementById('tb-ledger').innerHTML = html;
        });
    </script>
</body>
</html>
