<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>القياس الافتراضي البريميوم | Delta Optics</title>
    
    <script src="https://appstatic.jeeliz.com/glassesVTO/jeelizFaceFilter.js"></script>
    <script src="https://appstatic.jeeliz.com/glassesVTO/jeelizGlassesVTOWidget.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Tajawal', sans-serif; }
        
        /* طبقة الكاميرا - Jeeliz بفتحها تلقائياً خلف الستايل */
        #jeeFaceFilterCanvas { position: fixed; top: 0; left: 0; width: 100% !important; height: 100% !important; object-fit: cover; z-index: 1; }

        /* طبقة واجهة المستخدم فوق الكاميرا */
        .ui-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px; box-sizing: border-box; }
        
        .header { display: flex; justify-content: space-between; align-items: center; pointer-events: auto; }
        .back-btn { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(15px); color: white; width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 1.3rem; border: 1px solid rgba(255,255,255,0.3); transition: 0.2s; }
        .back-btn:active { transform: scale(0.9); }
        .title-box { background: rgba(14, 116, 144, 0.7); backdrop-filter: blur(15px); color: white; padding: 12px 25px; border-radius: 50px; font-weight: 800; font-size: 0.9rem; }

        .footer { text-align: center; pointer-events: auto; background: rgba(255, 255, 255, 0.15); border-radius: 20px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 15px; width: 100%; max-width: 350px; margin: 0 auto env(safe-area-inset-bottom); border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .controls-row { display: flex; gap: 10px; justify-content: center; align-items: center; }
        
        .selector-btn { background: rgba(255, 255, 255, 0.2); color: white; border: none; width: 45px; height: 45px; border-radius: 10px; font-size: 1.1rem; cursor: pointer; }
        .capture-btn { background: linear-gradient(135deg, #0f172a 0%, #0ea5e9 100%); color: white; border: none; padding: 15px 30px; border-radius: 15px; font-size: 1.1rem; font-weight: 900; box-shadow: 0 10px 20px rgba(14, 165, 233, 0.4); cursor: pointer; flex: 1; margin: 0 10px; }

        /* شاشة التحميل الملكية لدلتا */
        #delta-loader { position: fixed; inset: 0; background: #0f172a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; color: white; transition: opacity 0.5s; }
        .spinner { width: 60px; height: 60px; border: 6px solid rgba(255,255,255,0.1); border-top-color: #0ea5e9; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .logo-load { width: 80px; margin-bottom: 20px; border-radius: 20px; animation: pulse 2s infinite alternate; }
        @keyframes pulse { from { opacity: 0.6; transform: scale(1); } to { opacity: 1; transform: scale(1.05); } }

    </style>
</head>
<body>

    <div id="delta-loader">
        <img src="logo.jpg" class="logo-load" alt="Delta">
        <div class="spinner"></div>
        <p style="font-weight: bold;">Delta Optics 3D</p>
        <p style="font-size: 0.8rem; opacity: 0.6; margin-top: 5px;">جاري تشغيل تجربة القياس الافتراضي...</p>
    </div>

    <div class="ui-layer">
        <div class="header">
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i></a>
            <div class="title-box">Delta AR Premium</div>
        </div>
        <div class="footer">
            <div class="controls-row">
                <button class="selector-btn" onclick="JEELIZGLASSESVTOWIDGET.load('rayban_aviator')"><i class="fas fa-glasses"></i></button>
                <button class="capture-btn" onclick="JEELIZGLASSESVTOWIDGET.take_snapshot()"><i class="fas fa-camera"></i> التقاط</button>
                <button class="selector-btn" onclick="JEELIZGLASSESVTOWIDGET.load('gucci_blue')"><i class="fas fa-glasses"></i></button>
            </div>
        </div>
    </div>

    <canvas id='jeeFaceFilterCanvas'></canvas>

    <script>
        // الذاكرة الذكية للوضع الليلي
        if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

        // تشغيل محرك Jeeliz البريميوم
        window.addEventListener('load', function(){
            JEELIZGLASSESVTOWIDGET.init({
                canvasId: 'jeeFaceFilterCanvas',
                // روابط الموديلات - Jeeliz بتدعم موديلات فخمة جداً
                models: [
                    {id: 'rayban_aviator', src: 'https://cdn.jsdelivr.net/gh/jeeliz/jeelizGlassesVTOWidget@master/models/shades1.json'},
                    {id: 'gucci_blue', src: 'https://cdn.jsdelivr.net/gh/jeeliz/jeelizGlassesVTOWidget@master/models/clear1.json'}
                ],
                // تفعيل انعكاسات الإضاءة الواقعية (هذا هو السر!)
                followLight: true,
                intensity_ambient: 0.8,
                intensity_directional: 0.6,
                // إخفاء الـ Loader القديم
                callbackReady: function(){
                    document.getElementById('delta-loader').style.opacity = '0';
                    setTimeout(() => { document.getElementById('delta-loader').style.display = 'none'; }, 500);
                }
            });
        });
    </script>
</body>
</html>
