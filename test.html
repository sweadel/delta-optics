<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Medical Test | Delta Optics</title>
    
    <link rel="icon" href="logo.jpg" type="image/jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --brand-color: #0E7490; --bg-body: #F8FAFC; 
            --white: #FFFFFF; --text-main: #1E293B; --text-light: #64748B;
            --success: #10B981; --error: #EF4444;
        }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background: var(--bg-body); color: var(--text-main); margin: 0; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        header { background: var(--white); height: 60px; padding: 0 20px; box-shadow: 0 2px 15px rgba(14, 116, 144, 0.08); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .header-center { position: absolute; left: 50%; transform: translateX(-50%); font-weight: 800; color: var(--brand-color); }
        .back-btn { width: 38px; height: 38px; border-radius: 50%; background: #F1F5F9; color: var(--text-main); display: flex; align-items: center; justify-content: center; text-decoration: none; }
        .container { flex: 1; padding: 20px; max-width: 500px; margin: 0 auto; width: 100%; }
        .screen { display: none; width: 100%; animation: fadeIn 0.4s ease-out; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card-box { background: var(--white); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; border: 1px solid #E2E8F0; }
        .login-input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #E2E8F0; font-size: 1.1rem; margin-bottom: 20px; text-align: center; outline: none; }
        .action-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; margin-bottom: 10px; display: flex; justify-content: center; gap: 8px; align-items: center; text-decoration: none; }
        .btn-primary { background: var(--brand-color); color: white; }
        .test-area { background: var(--white); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 20px; min-height: 240px; display: flex; align-items: center; justify-content: center; border: 1px solid #E2E8F0; }
        .e-char { font-weight: 900; transition: 0.2s; }
        .d-pad { display: grid; grid-template-columns: repeat(3, 60px); gap: 15px; justify-content: center; }
        .pad-btn { width: 60px; height: 60px; border-radius: 50%; border: none; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center;}
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal-box { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i></a>
        <div class="header-center">العيادة الذكية</div>
        <div style="width:38px"></div>
    </header>

    <div class="container">
        <div id="screen-login" class="screen active">
            <div class="card-box">
                <img src="logo.jpg" style="width:80px; margin-bottom:15px; border-radius:15px;" onerror="this.src='https://via.placeholder.com/80'">
                <h2 style="color:var(--brand-color);">تسجيل المراجع</h2>
                <input type="text" id="patientNameInput" class="login-input" placeholder="اسم المراجع الثنائي">
                <button class="action-btn btn-primary" onclick="startSession()">بدء الفحص</button>
            </div>
        </div>

        <div id="test-vision" class="screen">
            <div id="eye-title" style="text-align:center; margin-bottom:10px; font-weight:bold; color:var(--brand-color);">العين اليمنى</div>
            <div class="test-area">
                <div id="e-char" class="e-char" style="font-size:100px;">E</div>
            </div>
            <div class="d-pad">
                <div style="grid-column:2"><button class="pad-btn" onclick="nextStep(270)"><i class="fas fa-chevron-up"></i></button></div>
                <button class="pad-btn" style="grid-row:2" onclick="nextStep(180)"><i class="fas fa-chevron-left"></i></button>
                <button class="pad-btn" style="grid-row:2" onclick="nextStep(90)"><i class="fas fa-chevron-down"></i></button>
                <button class="pad-btn" style="grid-row:2" onclick="nextStep(0)"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>

        <div id="screen-report" class="screen">
            <div class="card-box">
                <i class="fas fa-check-circle" style="font-size: 3rem; color: var(--success); margin-bottom: 15px;"></i>
                <h2 style="color:var(--success);">تم الحفظ بنجاح!</h2>
                <p id="report-text" style="line-height: 1.6;"></p>
                <button class="action-btn btn-primary" onclick="location.reload()">مراجع جديد</button>
            </div>
        </div>
    </div>

    <div id="instructionModal" class="modal-overlay">
        <div class="modal-box">
            <h3 id="modalTitle"></h3>
            <p id="modalText"></p>
            <button class="action-btn btn-primary" onclick="closeModal()">فهمت</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB11C4GGgAyqeThs8a9cvDNN7frvAA1nqQ",
            authDomain: "delta-optics-system.firebaseapp.com",
            projectId: "delta-optics-system",
            storageBucket: "delta-optics-system.firebasestorage.app",
            messagingSenderId: "111176219224",
            appId: "1:111176219224:web:e0d8a5f26b84d57249a82d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let patientName = "";
        let currentEye = "right";

        window.startSession = function() {
            patientName = document.getElementById('patientNameInput').value.trim();
            if(!patientName) return alert("يرجى إدخال الاسم");
            showModal("تعليمات", "غطي عينك اليسرى لنبدأ فحص العين اليمنى", "العين اليمنى", () => {
                showScreen('test-vision');
            });
        }

        window.nextStep = function(dir) {
            if(currentEye === "right") {
                currentEye = "left";
                document.getElementById('eye-title').innerText = "العين اليسرى";
                showModal("تبديل", "الآن غطي العين اليمنى لفحص اليسرى", "العين اليسرى");
            } else {
                finishTest();
            }
        }

        async function finishTest() {
            showScreen('screen-report');
            document.getElementById('report-text').innerText = `شكراً ${patientName}، تم إرسال نتيجتك للإدارة بنجاح.`;

            // إرسال البيانات فوراً للقاعدة
            try {
                await addDoc(collection(db, "tests"), {
                    name: patientName,
                    result: "فحص حدة النظر (ناجح)",
                    timestamp: serverTimestamp()
                });
                console.log("Data Saved!");
            } catch (e) {
                console.error("Error: ", e);
            }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        let modalCb = null;
        function showModal(title, text, spoken, cb) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalText').innerText = text;
            document.getElementById('instructionModal').classList.add('active');
            modalCb = cb;
            // صوت مساعد بسيط
            let url = "https://translate.googleapis.com/translate_tts?client=gtx&ie=UTF-8&tl=ar&q=" + encodeURIComponent(spoken || text);
            new Audio(url).play();
        }

        window.closeModal = function() {
            document.getElementById('instructionModal').classList.remove('active');
            if(modalCb) modalCb();
        }
    </script>
</body>
</html>
