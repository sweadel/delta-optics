<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Medical Test | Delta Optics</title>
    
    <link rel="icon" href="logo.jpg" type="image/jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --brand-color: #0E7490; --gold: #D4AF37; --bg-body: #F8FAFC; 
            --white: #FFFFFF; --text-main: #1E293B; --text-light: #64748B;
            --success: #10B981; --error: #EF4444; --warning: #F59E0B;
        }

        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background: var(--bg-body); color: var(--text-main); margin: 0; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

        header { 
            background: var(--white); height: 60px; padding: 0 20px;
            box-shadow: 0 2px 15px rgba(14, 116, 144, 0.08); 
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .lang-btn { background: #F1F5F9; border: 1px solid #E2E8F0; border-radius: 8px; padding: 6px 12px; font-weight: 700; color: var(--brand-color); cursor: pointer; font-size: 0.9rem; z-index: 2; }
        .header-center { position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 8px; }
        .header-title { font-weight: 800; font-size: 1.1rem; color: var(--brand-color); margin: 0; }
        .back-btn { width: 38px; height: 38px; border-radius: 50%; background: #F1F5F9; color: var(--text-main); display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 1.1rem; z-index: 2; }

        .container { flex: 1; padding: 20px; max-width: 500px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .screen { display: none; width: 100%; animation: fadeIn 0.4s ease-out; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* شاشة البداية */
        .login-box { background: var(--white); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; width: 100%; border: 1px solid #E2E8F0; margin-top: 20px;}
        .login-box img { width: 80px; margin-bottom: 15px; border-radius:15px; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
        .login-input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #E2E8F0; font-size: 1.1rem; margin-bottom: 20px; text-align: center; outline: none; transition: 0.2s;}
        .login-input:focus { border-color: var(--brand-color); }

        /* القائمة */
        .welcome-box { text-align: center; margin-bottom: 15px; }
        .patient-badge { display: inline-block; background: #ECFEFF; color: var(--brand-color); padding: 6px 16px; border-radius: 20px; font-weight: 800; font-size: 0.9rem; border: 1px solid #CFFAFE;}
        
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .test-card { background: var(--white); padding: 15px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); cursor: pointer; display: flex; flex-direction: column; align-items: center; text-align: center; border: 1px solid #E2E8F0; transition: 0.2s; }
        .test-card:active { transform: scale(0.96); }
        .icon-wrap { width: 45px; height: 45px; background: #ECFEFF; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--brand-color); font-size: 1.3rem; margin-bottom: 8px; }
        .card-info h3 { margin: 0 0 4px; font-size: 0.95rem; color: var(--text-main); font-weight: 800; }
        .card-info p { margin: 0; font-size: 0.75rem; color: var(--text-light); }

        /* مناطق الفحص */
        .progress-container { width: 100%; background: #E2E8F0; border-radius: 10px; height: 6px; margin-bottom: 15px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--success); width: 0%; transition: width 0.3s ease; }
        .eye-indicator { background: var(--brand-color); color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; margin-bottom: 10px; text-align: center; display: inline-block; }

        .test-area { background: var(--white); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 20px; min-height: 240px; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 1px solid #E2E8F0; position: relative; overflow: hidden; }
        .test-area.dark-mode { background: #0F172A; border-color: #0F172A; }
        
        .e-char { font-weight: 900; line-height: 1; transition: transform 0.2s, font-size 0.2s; }
        
        /* ذراع التحكم (D-Pad) */
        .d-pad-container { direction: ltr; display: grid; grid-template-columns: 60px 60px 60px; grid-template-rows: 60px 60px; gap: 15px; justify-content: center; margin: 0 auto; }
        .pad-btn { width: 60px; height: 60px; border-radius: 50%; border: none; background: var(--white); color: var(--brand-color); font-size: 1.6rem; box-shadow: 0 5px 15px rgba(14, 116, 144, 0.15); cursor: pointer; transition: 0.1s; display: flex; align-items: center; justify-content: center; }
        .pad-btn:active { transform: scale(0.9) translateY(4px); box-shadow: none; background: #ECFEFF; }
        .btn-up { grid-column: 2; grid-row: 1; } .btn-left { grid-column: 1; grid-row: 2; } .btn-down { grid-column: 2; grid-row: 2; } .btn-right { grid-column: 3; grid-row: 2; }

        /* لوحة أرقام الألوان */
        .color-canvas { background: #fff; border-radius: 50%; width: 220px; height: 220px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .numpad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 260px; margin: 0 auto; direction: ltr; }
        .num-key { width: 70px; height: 70px; border-radius: 50%; border: none; background: #F8FAFC; color: var(--text-main); font-size: 1.5rem; font-weight: 800; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.05); transition: 0.1s; display: flex; align-items: center; justify-content: center; }
        .num-key:active { background: #E2E8F0; transform: scale(0.95); }
        .key-action { background: #ECFEFF; color: var(--brand-color); font-size: 1.2rem; }
        .key-submit { background: var(--brand-color); color: white; }

        /* فحص الأحمر والأخضر */
        .duo-split { display: flex; width: 100%; height: 200px; border-radius: 15px; overflow: hidden; box-shadow: inset 0 0 20px rgba(0,0,0,0.2); }
        .duo-red { flex: 1; background: #EF4444; display: flex; align-items: center; justify-content: center; }
        .duo-green { flex: 1; background: #10B981; display: flex; align-items: center; justify-content: center; }
        .duo-circle { width: 60px; height: 60px; border: 8px solid black; border-radius: 50%; }

        /* فحص الجفاف */
        .timer-circle { width: 150px; height: 150px; border-radius: 50%; border: 8px solid #E2E8F0; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: 900; color: var(--brand-color); margin: 20px auto; position: relative; }
        .timer-circle.active { border-color: var(--success); color: var(--success); animation: pulseTimer 1s infinite alternate; }

        /* التقرير الشامل */
        .report-card { background: var(--white); padding: 20px; border-radius: 20px; border: 1px solid #E2E8F0; margin-bottom: 15px; width: 100%; }
        .res-item { background: #F8FAFC; padding: 12px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #E2E8F0; }

        /* الأزرار العامة */
        .action-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 800; font-size: 1rem; cursor: pointer; margin-bottom: 10px; display: flex; justify-content: center; gap: 8px; align-items: center; text-decoration: none; transition: 0.2s;}
        .btn-primary { background: var(--brand-color); color: white; }
        .btn-outline { background: transparent; border: 2px solid #E2E8F0; color: var(--text-main); }
        .btn-success { background: var(--success); color: white; }

        /* النافذة المنبثقة (Modal) */
        .modal-overlay { position: fixed; inset:0; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal-box { background: var(--white); padding: 30px; border-radius: 24px; width: 90%; max-width: 350px; text-align: center; }

        #firebase-loader { display: none; margin-top: 15px; color: var(--brand-color); font-weight: bold; font-size: 0.9rem; text-align: center; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i></a>
        <div class="header-center"><h1 class="header-title">العيادة الذكية</h1></div>
        <button class="lang-btn">EN</button>
    </header>

    <div class="container">

        <div id="screen-login" class="screen active">
            <div class="login-box">
                <img src="logo.jpg" onerror="this.src='https://via.placeholder.com/80?text=Delta'">
                <h2 style="color:var(--brand-color); margin-bottom:10px;">تسجيل المراجع</h2>
                <input type="text" id="patientNameInput" class="login-input" placeholder="اسم المراجع الثلاثي">
                <button class="action-btn btn-primary" onclick="startSession()"><i class="fas fa-play"></i> بدء الفحوصات</button>
            </div>
        </div>

        <div id="menu" class="screen">
            <div class="welcome-box"><div class="patient-badge"><i class="fas fa-user"></i> المراجع: <span id="display-patient-name"></span></div></div>
            <div class="menu-grid">
                <div class="test-card" onclick="startTest('vision')"><div class="icon-wrap"><i class="fas fa-eye"></i></div><h3>حدة النظر</h3></div>
                <div class="test-card" onclick="startTest('duochrome')"><div class="icon-wrap" style="color:#EF4444;"><i class="fas fa-adjust"></i></div><h3>أحمر وأخضر</h3></div>
                <div class="test-card" onclick="startTest('contrast')"><div class="icon-wrap" style="color:#1E293B;"><i class="fas fa-moon"></i></div><h3>الرؤية الليلية</h3></div>
                <div class="test-card" onclick="startTest('dryeye')"><div class="icon-wrap" style="color:#F59E0B;"><i class="fas fa-tint"></i></div><h3>جفاف العين</h3></div>
                <div class="test-card" onclick="startTest('astigmatism')"><div class="icon-wrap"><i class="fas fa-certificate"></i></div><h3>انحراف النظر</h3></div>
                <div class="test-card" onclick="startTest('color')"><div class="icon-wrap"><i class="fas fa-palette"></i></div><h3>عمى الألوان</h3></div>
            </div>
            <button class="action-btn btn-success" style="margin-top:20px;" id="btn-finish" onclick="submitToFirebase()">إنهاء وحفظ النتائج</button>
            <div id="firebase-loader"><i class="fas fa-spinner fa-spin"></i> جاري مزامنة البيانات مع العيادة...</div>
        </div>

        <div id="test-vision" class="screen">
            <div class="progress-container"><div class="progress-bar" id="prog-vision"></div></div>
            <div class="eye-indicator" id="eye-ind-vision">العين اليمنى</div>
            <div class="test-area"><div id="e-char" class="e-char">E</div></div>
            <div class="d-pad-container">
                <button class="pad-btn btn-up" onclick="checkVision(270)"><i class="fas fa-chevron-up"></i></button>
                <button class="pad-btn btn-left" onclick="checkVision(180)"><i class="fas fa-chevron-left"></i></button>
                <button class="pad-btn btn-down" onclick="checkVision(90)"><i class="fas fa-chevron-down"></i></button>
                <button class="pad-btn btn-right" onclick="checkVision(0)"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>

        <div id="test-duochrome" class="screen">
            <div class="eye-indicator" id="eye-ind-duo">العين اليمنى</div>
            <div class="test-area" style="padding:15px;">
                <h4 style="margin-bottom:15px;">أين ترى الدائرة أوضح؟</h4>
                <div class="duo-split">
                    <div class="duo-green" onclick="saveDuochrome('green')"><div class="duo-circle"></div></div>
                    <div class="duo-red" onclick="saveDuochrome('red')"><div class="duo-circle"></div></div>
                </div>
            </div>
            <button class="action-btn" style="background:#E2E8F0;" onclick="saveDuochrome('equal')">نفس الوضوح في الطرفين</button>
        </div>

        <div id="test-dryeye" class="screen">
            <div class="eye-indicator">العينين معاً</div>
            <div class="test-area">
                <div class="timer-circle" id="dry-timer">0.0</div>
                <button class="action-btn btn-primary" id="btn-dry-start" onclick="startDryTimer()">ابدأ المؤقت</button>
                <button class="action-btn btn-danger" id="btn-dry-stop" style="display:none;" onclick="stopDryTimer()">لقد رمشت!</button>
            </div>
        </div>

        <div id="test-astigmatism" class="screen">
            <div class="eye-indicator" id="eye-ind-ast">العين اليمنى</div>
            <div class="test-area">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Astigmatism_chart.svg/240px-Astigmatism_chart.svg.png" style="width:190px;">
            </div>
            <button class="action-btn btn-danger" onclick="finishAstigmatism(true)">أرى بعض الخطوط أغمق</button>
            <button class="action-btn btn-outline" onclick="finishAstigmatism(false)">الخطوط متساوية تماماً</button>
        </div>

        <div id="test-color" class="screen">
            <div class="progress-container"><div class="progress-bar" id="prog-color"></div></div>
            <div style="text-align:center;"><canvas id="ishiharaCanvas" class="color-canvas"></canvas></div>
            <div id="color-display" style="text-align:center; height:40px; font-size:2.2rem; font-weight:900; color:var(--brand-color);"></div>
            <div class="numpad-grid">
                <button class="num-key" onclick="typeColor(1)">1</button><button class="num-key" onclick="typeColor(2)">2</button><button class="num-key" onclick="typeColor(3)">3</button>
                <button class="num-key" onclick="typeColor(4)">4</button><button class="num-key" onclick="typeColor(5)">5</button><button class="num-key" onclick="typeColor(6)">6</button>
                <button class="num-key key-action" onclick="clearColor()"><i class="fas fa-backspace"></i></button><button class="num-key" onclick="typeColor(0)">0</button><button class="num-key key-submit" onclick="checkColor()"><i class="fas fa-check"></i></button>
            </div>
        </div>

        <div id="screen-report" class="screen">
            <div class="report-card">
                <h2 style="color:var(--brand-color); text-align:center;">التقرير الطبي الأولي</h2>
                <h4 style="text-align:center;" id="report-patient-name"></h4>
                <div id="report-details"></div>
            </div>
            <a id="wa-btn" href="#" class="action-btn btn-success" target="_blank"><i class="fab fa-whatsapp"></i> حجز موعد للمراجعة</a>
            <button class="action-btn btn-outline" onclick="location.reload()">فحص مراجع جديد</button>
        </div>
    </div>

    <div id="instructionModal" class="modal-overlay">
        <div class="modal-box">
            <h2 id="modalTitle">تعليمات</h2>
            <p id="modalText" style="line-height:1.6;"></p>
            <button class="action-btn btn-primary" onclick="closeModal()">حسناً، ابدأ الفحص</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB11C4GGgAyqeThs8a9cvDNN7frvAA1nqQ",
            authDomain: "delta-optics-system.firebaseapp.com",
            projectId: "delta-optics-system",
            storageBucket: "delta-optics-system.firebasestorage.app",
            messagingSenderId: "111176219224",
            appId: "1:111176219224:web:e0d8a5f26b84d57249a82d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // دالة الإرسال لفايربيز
        window.sendToAdminPanel = async (pName, details) => {
            try { 
                await addDoc(collection(db, "tests"), { 
                    name: pName, 
                    details: details, 
                    timestamp: serverTimestamp() 
                }); 
                return true; 
            } catch (e) { 
                console.error("خطأ في Firebase:", e); 
                return false; 
            }
        };
    </script>

    <script>
        // --- منطق الفحوصات الكامل ---
        let currentPatient = ""; let currentResults = {}; let activeTest = ""; let currentEye = "rightEye"; 
        const i18n = { ar: { rightEye: "العين اليمنى", leftEye: "العين اليسرى", bothEyes: "العينين معاً" } };

        function startSession() {
            const name = document.getElementById('patientNameInput').value.trim();
            if(!name) return alert("يرجى كتابة اسم المراجع");
            currentPatient = name;
            document.getElementById('display-patient-name').innerText = name;
            show('menu');
        }

        async function submitToFirebase() {
            if(Object.keys(currentResults).length === 0) return alert("يرجى إكمال فحص واحد على الأقل");
            
            document.getElementById('btn-finish').style.display='none';
            document.getElementById('firebase-loader').style.display='block';

            // بناء نص التقرير (فقط النتائج الطبية بناءً على طلبك)
            let reportText = "";
            for (const [test, eyes] of Object.entries(currentResults)) {
                reportText += `\n[ ${test} ]\n`;
                for (const [eye, score] of Object.entries(eyes)) {
                    reportText += `- ${i18n.ar[eye] || eye}: ${score}\n`;
                }
            }

            if(window.sendToAdminPanel) {
                await window.sendToAdminPanel(currentPatient, reportText.trim());
            }
            
            renderFinalReport();
            show('screen-report');
            document.getElementById('firebase-loader').style.display='none';
        }

        function startTest(type) {
            activeTest = type;
            currentEye = (type === 'color' || type === 'dryeye') ? 'bothEyes' : 'rightEye';
            const instructions = {
                vision: "قف على مسافة 40 سم من الشاشة، غطِ العين اليسرى أولاً، ثم اتبع اتجاه فتحة حرف E.",
                duochrome: "انظر إلى الدوائر في القسمين الأحمر والأخضر، وأخبرنا أيهما يظهر بوضوح أكبر.",
                contrast: "فحص جودة الرؤية في الإضاءة المنخفضة، اتبع الحروف الباهتة.",
                dryeye: "افتح عينيك جيداً واضغط ابدأ، حاول الصمود لأطول فترة ممكنة دون أن ترمش.",
                astigmatism: "انظر إلى مروحة الخطوط، هل تظهر جميع الخطوط بنفس اللون والسمك؟",
                color: "ستظهر لك دوائر ملونة تحتوي على أرقام، اكتب الرقم الذي تراه بوضوح."
            };
            openModal("تعليمات الفحص", instructions[type]);
        }

        function closeModal() { document.getElementById('instructionModal').classList.remove('active'); runTestLogic(); }
        function openModal(t, txt) { document.getElementById('modalTitle').innerText = t; document.getElementById('modalText').innerText = txt; document.getElementById('instructionModal').classList.add('active'); }

        function runTestLogic() {
            if(activeTest === 'vision') startVision();
            else if(activeTest === 'color') startColor();
            else if(activeTest === 'dryeye') { document.getElementById('btn-dry-start').style.display='block'; document.getElementById('btn-dry-stop').style.display='none'; document.getElementById('dry-timer').innerText="0.0"; show('test-dryeye'); }
            else if(activeTest === 'astigmatism') { document.getElementById('eye-ind-ast').innerText = i18n.ar[currentEye]; show('test-astigmatism'); }
            else if(activeTest === 'duochrome') { document.getElementById('eye-ind-duo').innerText = i18n.ar[currentEye]; show('test-duochrome'); }
        }

        // --- فحص النظر (E) ---
        let vStep = 0, vRot = 0, vErrors = 0; const vLabels = ["6/60", "6/36", "6/24", "6/18", "6/12", "6/6"];
        function startVision() { vStep = 0; vErrors = 0; document.getElementById('eye-ind-vision').innerText = i18n.ar[currentEye]; updateVisionUI(); show('test-vision'); }
        function updateVisionUI() {
            if(vStep >= 6) { saveResult("6/6"); return; }
            vRot = [0, 90, 180, 270][Math.floor(Math.random()*4)];
            document.getElementById('e-char').style.fontSize = (130 - vStep*18) + "px";
            document.getElementById('e-char').style.transform = `rotate(${vRot}deg)`;
            document.getElementById('prog-vision').style.width = (vStep/6*100) + "%";
        }
        function checkVision(dir) { 
            if(dir === vRot) { vStep++; updateVisionUI(); } 
            else { vErrors++; if(vErrors > 1) saveResult(vStep > 0 ? vLabels[vStep-1] : "< 6/60"); else updateVisionUI(); }
        }

        // --- فحص الألوان (Ishihara) ---
        let colRound = 0, colScore = 0, colInput = ""; const colTests = [12, 5, 29, 74, 8, 45];
        function startColor() { colRound=0; colScore=0; nextColorPlate(); show('test-color'); }
        function nextColorPlate() {
            if(colRound >= colTests.length) { saveResult(`${colScore}/${colTests.length}`); return; }
            colInput = ""; document.getElementById('color-display').innerText = ""; generatePlate(colTests[colRound]);
            document.getElementById('prog-color').style.width = (colRound/colTests.length*100) + "%";
        }
        function generatePlate(num) {
            const ctx = document.getElementById('ishiharaCanvas').getContext('2d'); ctx.clearRect(0,0,220,220); ctx.font="bold 120px Arial"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(num, 110, 110);
            const data = ctx.getImageData(0,0,220,220).data; ctx.clearRect(0,0,220,220);
            for(let i=0; i<1200; i++){
                let x = Math.random()*220, y=Math.random()*220, r=Math.random()*4+1;
                if(Math.sqrt((x-110)**2 + (y-110)**2) > 105) continue;
                let isNum = data[(Math.floor(y)*220 + Math.floor(x))*4 + 3] > 100;
                ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
                ctx.fillStyle = isNum ? `rgb(${200+Math.random()*55}, 60, 60)` : `rgb(60, ${150+Math.random()*80}, 60)`;
                ctx.fill();
            }
        }
        function typeColor(n) { if(colInput.length<2) colInput+=n; document.getElementById('color-display').innerText = colInput; }
        function clearColor() { colInput=""; document.getElementById('color-display').innerText = ""; }
        function checkColor() { if(parseInt(colInput) === colTests[colRound]) colScore++; colRound++; nextColorPlate(); }

        // --- فحص جفاف العين ---
        let dryInterval, dryTime = 0;
        function startDryTimer() { 
            dryTime=0; document.getElementById('btn-dry-start').style.display='none'; document.getElementById('btn-dry-stop').style.display='block';
            document.getElementById('dry-timer').classList.add('active');
            dryInterval = setInterval(() => { dryTime+=0.1; document.getElementById('dry-timer').innerText = dryTime.toFixed(1); }, 100);
        }
        function stopDryTimer() { 
            clearInterval(dryInterval); document.getElementById('dry-timer').classList.remove('active');
            saveResult(dryTime > 10 ? "ترطيب طبيعي" : "احتمالية جفاف");
        }

        // --- حفظ وفلترة ---
        function saveResult(score) {
            if(!currentResults[activeTest]) currentResults[activeTest] = {};
            currentResults[activeTest][currentEye] = score;
            if(currentEye === 'rightEye' && activeTest !== 'color' && activeTest !== 'dryeye') {
                currentEye = 'leftEye';
                openModal("تبديل العين", "ممتاز، الآن غطِ العين اليمنى لكي نفحص اليسرى بنفس الطريقة.");
            } else { show('menu'); }
        }

        function saveDuochrome(res) { saveResult(res === 'equal' ? "توازن طبيعي" : "اشتباه طول/قصر"); }
        function finishAstigmatism(val) { saveResult(val ? "اشتباه انحراف" : "طبيعي"); }

        function renderFinalReport() {
            document.getElementById('report-patient-name').innerText = currentPatient;
            let h = ""; for (const [t, r] of Object.entries(currentResults)) {
                h += `<div class="res-item"><b>${t}</b>`;
                for (const [e, s] of Object.entries(r)) h += `<div>${i18n.ar[e] || e}: ${s}</div>`;
                h += `</div>`;
            }
            document.getElementById('report-details').innerHTML = h;
            document.getElementById('wa-btn').href = `https://wa.me/962775549700?text=مرحباً دلتا، تقرير فحص المراجع: ${currentPatient}`;
        }

        function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    </script>
</body>
</html>
