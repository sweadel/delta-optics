<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Delta 2D Test</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-face-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #overlay { position: fixed; inset: 0; background: #0f172a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .start-btn { background: #0ea5e9; color: white; border: none; padding: 15px 40px; border-radius: 10px; font-size: 1.2rem; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="overlay">
        <h2 style="margin-bottom: 20px;">فحص النظارة</h2>
        <button class="start-btn" id="start-btn">افتح الكاميرا</button>
    </div>

    <a-scene mindar-face="autoStart: false; uiLoading: no; uiError: no;" embedded color-space="sRGB" renderer="colorManagement: true;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <img id="testGlasses" src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Glasses_800.png/512px-Glasses_800.png" crossorigin="anonymous">
        </a-assets>
        
        <a-camera active="false" position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-face-target="anchorIndex: 168">
            <a-image rotation="0 0 0" position="0 0 0" scale="0.18 0.08 1" src="#testGlasses" transparent="true"></a-image>
        </a-entity>

    </a-scene>

    <script>
        const startBtn = document.querySelector('#start-btn');
        const overlay = document.querySelector('#overlay');
        const sceneEl = document.querySelector('a-scene');

        startBtn.addEventListener('click', () => {
            overlay.style.display = "none";
            const arSystem = sceneEl.systems['mindar-face-system'];
            arSystem.start();
        });
    </script>
</body>
</html>
