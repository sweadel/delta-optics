<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تشكيلات دلتا | Delta Optics</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --brand: #0E7490; 
            --brand-light: #ECFEFF;
            --bg: #F8FAFC; 
            --text-dark: #1E293B;
            --text-gray: #64748B;
            --white: #FFFFFF;
            --shadow: 0 4px 20px rgba(0,0,0,0.05);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); margin: 0; padding-bottom: 50px; color: var(--text-dark); }

        /* --- الهيدر الجديد (تصميم احترافي) --- */
        header { 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            height: 70px; padding: 0 20px;
            box-shadow: 0 2px 15px rgba(14, 116, 144, 0.08); 
            position: sticky; top: 0; z-index: 100; 
            display: flex; align-items: center; justify-content: space-between;
        }
        
        /* القسم الأيمن: السهم واللوجو */
        .header-right { display: flex; align-items: center; gap: 12px; }
        .back-btn { 
            width: 40px; height: 40px; border-radius: 50%; background: #F1F5F9; 
            color: var(--text-dark); display: flex; align-items: center; justify-content: center; 
            text-decoration: none; font-size: 1.2rem; transition: var(--transition);
        }
        .back-btn:active { background: #E2E8F0; transform: scale(0.9); }
        .header-logo { width: 42px; height: 42px; object-fit: contain; border-radius: 8px; }

        /* القسم الأوسط: العنوان */
        .header-center {
            position: absolute; left: 50%; transform: translateX(-50%);
            font-size: 1.15rem; font-weight: 800; color: var(--brand); margin: 0;
            white-space: nowrap;
        }

        /* حجز مساحة وهمية على اليسار لضمان توسيط العنوان بدقة */
        .header-left { width: 94px; } 

        /* --- شريط التصفية --- */
        .tabs-container { background: var(--white); padding: 15px 0; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .tabs { display: flex; justify-content: center; gap: 10px; }
        .tab-btn { 
            padding: 8px 24px; border-radius: 20px; border: 2px solid var(--brand-light); 
            background: var(--white); color: var(--text-gray); font-weight: 700; 
            cursor: pointer; transition: var(--transition); font-size: 0.95rem;
        }
        .tab-btn.active { background: var(--brand); color: var(--white); border-color: var(--brand); box-shadow: 0 4px 10px rgba(14, 116, 144, 0.2); }

        /* --- شبكة المعرض --- */
        .gallery-container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }

        /* --- كرت النظارة --- */
        .card { 
            background: var(--white); border-radius: 16px; overflow: hidden; 
            box-shadow: var(--shadow); border: 1px solid #E2E8F0; 
            transition: var(--transition); position: relative; cursor: pointer;
            opacity: 0; transform: translateY(20px); animation: fadeInUp 0.5s forwards;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(14, 116, 144, 0.15); border-color: var(--brand-light); }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        .img-wrap { width: 100%; height: 160px; background: #E2E8F0; position: relative; overflow: hidden; }
        .img-wrap::after { 
            content: ""; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: skeletonLoading 1.5s infinite;
        }
        @keyframes skeletonLoading { 100% { left: 100%; } }

        .card img { 
            width: 100%; height: 100%; object-fit: cover; display: block; 
            position: absolute; top: 0; left: 0; z-index: 1; opacity: 0; transition: opacity 0.3s;
        }
        .card img.loaded { opacity: 1; }

        .card-info { padding: 12px; text-align: center; background: var(--white); position: relative; z-index: 2;}
        .card-info h3 { margin: 0 0 4px; font-size: 0.95rem; font-weight: 800; color: var(--text-dark); }
        .card-info p { margin: 0; font-size: 0.75rem; color: var(--text-gray); }

        .badge { 
            position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.95); 
            padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; 
            color: var(--brand); z-index: 3; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* --- عارض الصور (Lightbox) للمعاينة عن قرب --- */
        .lightbox { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(8px); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 1000; opacity: 0; pointer-events: none; transition: var(--transition);
        }
        .lightbox.active { opacity: 1; pointer-events: all; }
        
        .lightbox-img-container { position: relative; max-width: 90%; max-height: 60vh; }
        .lightbox img { width: 100%; height: auto; max-height: 60vh; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); transform: scale(0.9); transition: var(--transition); object-fit: contain;}
        .lightbox.active img { transform: scale(1); }
        
        .lightbox-close { 
            position: absolute; top: 25px; right: 25px; background: rgba(255,255,255,0.2); 
            color: var(--white); width: 45px; height: 45px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem; 
            cursor: pointer; border: 1px solid rgba(255,255,255,0.3); transition: 0.2s;
        }
        .lightbox-close:active { background: rgba(255,255,255,0.4); transform: scale(0.9); }
        
        .lightbox-info { text-align: center; margin-top: 25px; width: 90%; }
        .lightbox-title { color: var(--white); font-size: 1.4rem; font-weight: 800; margin-bottom: 15px; }
        
        .wa-order-btn {
            background: var(--success); color: var(--white);
            padding: 14px 30px; border-radius: 30px; font-weight: 800; font-size: 1.1rem;
            text-decoration: none; display: inline-flex; align-items: center; gap: 10px;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4); transition: 0.2s;
        }
        .wa-order-btn:active { transform: scale(0.95); }

    </style>
</head>
<body>

<header>
    <div class="header-right">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i></a>
        <img src="logo.jpg" alt="لوجو دلتا" class="header-logo" onerror="this.src='https://via.placeholder.com/42?text=Delta'">
    </div>
    
    <h1 class="header-center">تشكيلات دلتا للبصريات المميزة</h1>
    
    <div class="header-left"></div> </header>

<div class="tabs-container">
    <div class="tabs" id="filter-tabs">
        <button class="tab-btn active" data-filter="all">الكل</button>
        <button class="tab-btn" data-filter="medical">طبّي</button>
        <button class="tab-btn" data-filter="sun">شمسي</button>
    </div>
</div>

<div class="gallery-container">
    <div class="grid" id="gallery">
        </div>
</div>

<div class="lightbox" id="lightbox">
    <button class="lightbox-close" onclick="closeLightbox()"><i class="fas fa-times"></i></button>
    
    <div class="lightbox-img-container">
        <img id="lb-img" src="" alt="تكبير النظارة">
    </div>
    
    <div class="lightbox-info">
        <div class="lightbox-title" id="lb-title"></div>
        <a id="lb-wa" href="#" class="wa-order-btn" target="_blank">
            <i class="fab fa-whatsapp"></i> استفسار عن هذا الموديل
        </a>
    </div>
</div>

<script>
    // 1. إعدادات الصور
    const config = {
        medicalImages: 60, // عدد صور الطبي (m1.jpg -> m60.jpg)
        sunImages: 20      // عدد صور الشمسي (s1.jpg -> s20.jpg)
    };

    const gallery = document.getElementById('gallery');
    
    // 2. بناء المعرض السريع
    function buildGallery() {
        const fragment = document.createDocumentFragment();
        
        for (let i = 1; i <= config.medicalImages; i++) {
            fragment.appendChild(createCardHTML('medical', `m${i}.jpg`, `موديل طبي #${i}`, i * 0.05));
        }

        for (let i = 1; i <= config.sunImages; i++) {
            fragment.appendChild(createCardHTML('sun', `s${i}.jpg`, `موديل شمسي #${i}`, i * 0.05));
        }

        gallery.appendChild(fragment);
    }

    // 3. بناء الكرت
    function createCardHTML(type, filename, title, delay) {
        const card = document.createElement('div');
        card.className = `card item-${type}`;
        card.style.animationDelay = `${delay}s`;
        
        card.innerHTML = `
            <div class="badge">${type === 'medical' ? 'طبي' : 'شمسي'}</div>
            <div class="img-wrap">
                <img src="${filename}" alt="${title}" loading="lazy" 
                     onload="this.classList.add('loaded')" 
                     onerror="this.parentElement.parentElement.remove()">
            </div>
            <div class="card-info">
                <h3>${title}</h3>
                <p>اضغط للمعاينة</p>
            </div>
        `;

        // تفعيل ميزة التكبير عند الضغط
        card.addEventListener('click', () => openLightbox(filename, title));
        return card;
    }

    // 4. نظام التصفية
    const filterBtns = document.querySelectorAll('.tab-btn');
    filterBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
            filterBtns.forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');

            const filterValue = e.target.getAttribute('data-filter');
            const allCards = document.querySelectorAll('.card');

            allCards.forEach(card => {
                if (filterValue === 'all') {
                    card.style.display = 'block';
                } else {
                    card.style.display = card.classList.contains(`item-${filterValue}`) ? 'block' : 'none';
                }
            });
        });
    });

    // 5. نظام التكبير (Lightbox) والاستفسار
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lb-img');
    const lbTitle = document.getElementById('lb-title');
    const lbWa = document.getElementById('lb-wa');

    function openLightbox(src, title) {
        lbImg.src = src;
        lbTitle.innerText = title;
        
        // رسالة الواتساب الجاهزة
        let waMsg = `مرحباً، أود الاستفسار عن ${title} (صورة: ${src}). هل هو متوفر؟`;
        lbWa.href = `https://wa.me/962775549700?text=${encodeURIComponent(waMsg)}`;
        
        lightbox.classList.add('active');
    }

    function closeLightbox() {
        lightbox.classList.remove('active');
        setTimeout(() => lbImg.src = "", 300);
    }

    lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('DOMContentLoaded', buildGallery);

</script>
</body>
</html>
