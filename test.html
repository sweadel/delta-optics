<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Medical Test | Delta Optics</title>
    
    <link rel="icon" href="logo.jpg" type="image/jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --brand-color: #0E7490; --gold: #D4AF37; --bg-body: #F8FAFC; 
            --white: #FFFFFF; --text-main: #1E293B; --text-light: #64748B;
            --success: #10B981; --error: #EF4444; --warning: #F59E0B;
        }

        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        body { background: var(--bg-body); color: var(--text-main); margin: 0; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

        header { 
            background: var(--white); height: 60px; padding: 0 20px;
            box-shadow: 0 2px 15px rgba(14, 116, 144, 0.08); 
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .lang-btn { background: #F1F5F9; border: 1px solid #E2E8F0; border-radius: 8px; padding: 6px 12px; font-weight: 700; color: var(--brand-color); cursor: pointer; font-size: 0.9rem; z-index: 2; }
        .header-center { position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 8px; }
        .header-title { font-weight: 800; font-size: 1.1rem; color: var(--brand-color); margin: 0; }
        .back-btn { width: 38px; height: 38px; border-radius: 50%; background: #F1F5F9; color: var(--text-main); display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 1.1rem; z-index: 2; }

        .container { flex: 1; padding: 20px; max-width: 500px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .screen { display: none; width: 100%; animation: fadeIn 0.4s ease-out; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* شاشة البداية */
        .login-box { background: var(--white); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; width: 100%; border: 1px solid #E2E8F0; margin-top: 20px;}
        .login-box img { width: 80px; margin-bottom: 15px; border-radius:15px; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
        .login-input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #E2E8F0; font-size: 1.1rem; margin-bottom: 20px; text-align: center; outline: none; transition: 0.2s;}
        .login-input:focus { border-color: var(--brand-color); }

        /* القائمة */
        .welcome-box { text-align: center; margin-bottom: 15px; }
        .patient-badge { display: inline-block; background: #ECFEFF; color: var(--brand-color); padding: 6px 16px; border-radius: 20px; font-weight: 800; font-size: 0.9rem; border: 1px solid #CFFAFE;}
        
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .test-card { background: var(--white); padding: 15px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); cursor: pointer; display: flex; flex-direction: column; align-items: center; text-align: center; border: 1px solid #E2E8F0; transition: 0.2s; }
        .test-card:active { transform: scale(0.96); }
        .icon-wrap { width: 45px; height: 45px; background: #ECFEFF; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--brand-color); font-size: 1.3rem; margin-bottom: 8px; }
        .card-info h3 { margin: 0 0 4px; font-size: 0.95rem; color: var(--text-main); font-weight: 800; }
        .card-info p { margin: 0; font-size: 0.75rem; color: var(--text-light); }

        /* مناطق الفحص */
        .progress-container { width: 100%; background: #E2E8F0; border-radius: 10px; height: 6px; margin-bottom: 15px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--success); width: 0%; transition: width 0.3s ease; }
        .eye-indicator { background: var(--brand-color); color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; margin-bottom: 10px; text-align: center; display: inline-block; }

        .test-area { background: var(--white); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 20px; min-height: 240px; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 1px solid #E2E8F0; position: relative; overflow: hidden; }
        .test-area.dark-mode { background: #0F172A; border-color: #0F172A; }
        
        .e-char { font-weight: 900; line-height: 1; transition: transform 0.2s, font-size 0.2s; }
        
        /* ذراع التحكم (D-Pad) */
        .d-pad-container { direction: ltr; display: grid; grid-template-columns: 60px 60px 60px; grid-template-rows: 60px 60px; gap: 15px; justify-content: center; margin: 0 auto; }
        .pad-btn { width: 60px; height: 60px; border-radius: 50%; border: none; background: var(--white); color: var(--brand-color); font-size: 1.6rem; box-shadow: 0 5px 15px rgba(14, 116, 144, 0.15); cursor: pointer; transition: 0.1s; display: flex; align-items: center; justify-content: center; }
        .pad-btn:active { transform: scale(0.9) translateY(4px); box-shadow: none; background: #ECFEFF; }
        .btn-up { grid-column: 2; grid-row: 1; } .btn-left { grid-column: 1; grid-row: 2; } .btn-down { grid-column: 2; grid-row: 2; } .btn-right { grid-column: 3; grid-row: 2; }

        /* لوحة أرقام الألوان */
        .color-canvas { background: #fff; border-radius: 50%; width: 220px; height: 220px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .numpad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 260px; margin: 0 auto; direction: ltr; }
        .num-key { width: 70px; height: 70px; border-radius: 50%; border: none; background: #F8FAFC; color: var(--text-main); font-size: 1.5rem; font-weight: 800; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.05); transition: 0.1s; display: flex; align-items: center; justify-content: center; }

        /* فحص الأحمر والأخضر */
        .duo-split { display: flex; width: 100%; height: 200px; border-radius: 15px; overflow: hidden; box-shadow: inset 0 0 20px rgba(0,0,0,0.2); }
        .duo-red { flex: 1; background: #EF4444; display: flex; align-items: center; justify-content: center; }
        .duo-green { flex: 1; background: #10B981; display: flex; align-items: center; justify-content: center; }
        .duo-circle { width: 60px; height: 60px; border: 8px solid black; border-radius: 50%; }

        /* فحص الجفاف */
        .timer-circle { width: 150px; height: 150px; border-radius: 50%; border: 8px solid #E2E8F0; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: 900; color: var(--brand-color); margin: 20px auto; position: relative; }
        .timer-circle.active { border-color: var(--success); color: var(--success); animation: pulseTimer 1s infinite alternate; }

        /* التقرير الشامل */
        .report-card { background: var(--white); padding: 20px; border-radius: 20px; border: 1px solid #E2E8F0; margin-bottom: 15px; width: 100%; }
        .res-item { background: #F8FAFC; padding: 12px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #E2E8F0; }

        /* الأزرار العامة */
        .action-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 800; font-size: 1rem; cursor: pointer; margin-bottom: 10px; display: flex; justify-content: center; gap: 8px; align-items: center; text-decoration: none; transition: 0.2s;}
        .btn-primary { background: var(--brand-color); color: white; }
        .btn-outline { background: transparent; border: 2px solid #E2E8F0; color: var(--text-main); }
        .btn-success { background: var(--success); color: white; }

        #firebase-loader { display: none; margin-top: 15px; color: var(--brand-color); font-weight: bold; font-size: 0.9rem; text-align: center; }

        /* النافذة المنبثقة (Modal) */
        .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal-box { background: var(--white); padding: 30px; border-radius: 24px; width: 90%; max-width: 350px; text-align: center; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i></a>
        <div class="header-center">
            <h1 class="header-title">العيادة الذكية</h1>
        </div>
        <button class="lang-btn">EN</button>
    </header>

    <div class="container">

        <div id="screen-login" class="screen active">
            <div class="login-box">
                <img src="logo.jpg" onerror="this.src='https://via.placeholder.com/80?text=Delta'">
                <h2 style="color:var(--brand-color); margin-bottom:10px;">تسجيل المراجع</h2>
                <input type="text" id="patientNameInput" class="login-input" placeholder="أدخل اسمك الكامل">
                <button class="action-btn btn-primary" onclick="startSession()">بدء الفحوصات</button>
            </div>
        </div>

        <div id="menu" class="screen">
            <div class="welcome-box">
                <div class="patient-badge"><i class="fas fa-user"></i> المراجع: <span id="display-patient-name"></span></div>
            </div>

            <div class="menu-grid">
                <div class="test-card" onclick="startTest('vision')"><div class="icon-wrap"><i class="fas fa-eye"></i></div><div class="card-info"><h3>حدة النظر</h3></div></div>
                <div class="test-card" onclick="startTest('duochrome')"><div class="icon-wrap" style="color:#EF4444;"><i class="fas fa-adjust"></i></div><div class="card-info"><h3>أحمر وأخضر</h3></div></div>
                <div class="test-card" onclick="startTest('contrast')"><div class="icon-wrap" style="color:#1E293B;"><i class="fas fa-moon"></i></div><div class="card-info"><h3>رؤية ليلية</h3></div></div>
                <div class="test-card" onclick="startTest('dryeye')"><div class="icon-wrap" style="color:#F59E0B;"><i class="fas fa-tint"></i></div><div class="card-info"><h3>جفاف العين</h3></div></div>
                <div class="test-card" onclick="startTest('astigmatism')"><div class="icon-wrap"><i class="fas fa-certificate"></i></div><div class="card-info"><h3>انحراف النظر</h3></div></div>
                <div class="test-card" onclick="startTest('color')"><div class="icon-wrap"><i class="fas fa-palette"></i></div><div class="card-info"><h3>عمى الألوان</h3></div></div>
            </div>
            <button class="action-btn btn-success" style="margin-top:20px;" id="btn-finish" onclick="submitToFirebase()">إنهاء وحفظ النتائج</button>
            <div id="firebase-loader"><i class="fas fa-spinner fa-spin"></i> جاري المزامنة...</div>
        </div>

        <div id="test-vision" class="screen">
            <div class="progress-container"><div class="progress-bar" id="prog-vision"></div></div>
            <div class="eye-indicator" id="eye-ind-vision">العين اليمنى</div>
            <div class="test-area"><div id="e-char" class="e-char">E</div></div>
            <div class="d-pad-container">
                <button class="pad-btn btn-up" onclick="checkVision(270)"><i class="fas fa-chevron-up"></i></button>
                <button class="pad-btn btn-left" onclick="checkVision(180)"><i class="fas fa-chevron-left"></i></button>
                <button class="pad-btn btn-down" onclick="checkVision(90)"><i class="fas fa-chevron-down"></i></button>
                <button class="pad-btn btn-right" onclick="checkVision(0)"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>

        <div id="screen-report" class="screen">
            <div class="report-card">
                <h2 style="color:var(--brand-color); text-align:center;">التقرير الطبي المبدئي</h2>
                <h4 style="text-align:center;" id="report-patient-name"></h4>
                <div id="report-details"></div>
            </div>
            <a id="wa-btn" href="#" class="action-btn btn-success" target="_blank"><i class="fab fa-whatsapp"></i> حجز موعد</a>
            <button class="action-btn btn-outline" onclick="location.reload()">فحص جديد</button>
        </div>

    </div>

    <div id="instructionModal" class="modal-overlay">
        <div class="modal-box">
            <h2 id="modalTitle">تعليمات</h2>
            <p id="modalText"></p>
            <button class="action-btn btn-primary" onclick="closeModal()">بدء</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB11C4GGgAyqeThs8a9cvDNN7frvAA1nqQ",
            authDomain: "delta-optics-system.firebaseapp.com",
            projectId: "delta-optics-system",
            storageBucket: "delta-optics-system.firebasestorage.app",
            messagingSenderId: "111176219224",
            appId: "1:111176219224:web:e0d8a5f26b84d57249a82d"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.sendToAdminPanel = async (pName, details) => {
            try { await addDoc(collection(db, "tests"), { name: pName, details: details, timestamp: serverTimestamp() }); return true; }
            catch (e) { return false; }
        };
    </script>

    <script>
        // --- المنطق الشامل الأصلي ---
        let currentPatient = ""; let currentResults = {}; let activeTest = ""; let currentEye = "rightEye";
        const i18n = { ar: { rightEye: "العين اليمنى", leftEye: "العين اليسرى" } };

        function startSession() {
            const name = document.getElementById('patientNameInput').value.trim();
            if(!name) return alert("يرجى كتابة الاسم");
            currentPatient = name; document.getElementById('display-patient-name').innerText = name;
            show('menu');
        }

        async function submitToFirebase() {
            if(Object.keys(currentResults).length === 0) return alert("أكمل فحصاً واحداً");
            document.getElementById('btn-finish').style.display='none';
            document.getElementById('firebase-loader').style.display='block';
            let report = "";
            for (const [t, eyes] of Object.entries(currentResults)) {
                report += `\n[ ${t} ]\n`;
                for (const [e, s] of Object.entries(eyes)) report += `- ${i18n.ar[e] || e}: ${s}\n`;
            }
            if(window.sendToAdminPanel) await window.sendToAdminPanel(currentPatient, report.trim());
            renderReport(); show('screen-report');
        }

        function startTest(type) {
            activeTest = type; currentEye = (type === 'color' || type === 'dryeye') ? 'both' : 'rightEye';
            openModal("تعليمات", "يرجى اتباع الإرشادات والتركيز على الشاشة.");
        }

        function closeModal() { document.getElementById('instructionModal').classList.remove('active'); runTest(); }
        function openModal(t, txt) { document.getElementById('modalTitle').innerText = t; document.getElementById('modalText').innerText = txt; document.getElementById('instructionModal').classList.add('active'); }

        function runTest() { if(activeTest === 'vision') startVision(); }

        // فحص النظر
        let vStep = 0, vRot = 0; const vLabels = ["6/60", "6/36", "6/24", "6/18", "6/12", "6/6"];
        function startVision() { vStep = 0; updateVUI(); show('test-vision'); }
        function updateVUI() {
            if(vStep >= 6) { saveRes("6/6"); return; }
            vRot = [0, 90, 180, 270][Math.floor(Math.random()*4)];
            document.getElementById('e-char').style.cssText = `font-size:${130 - vStep*18}px; transform:rotate(${vRot}deg);`;
            document.getElementById('prog-vision').style.width = (vStep/6*100) + "%";
        }
        function checkVision(dir) { if(dir === vRot) { vStep++; updateVUI(); } else { saveRes(vStep > 0 ? vLabels[vStep-1] : "< 6/60"); } }

        function saveRes(score) {
            if(!currentResults[activeTest]) currentResults[activeTest] = {};
            currentResults[activeTest][currentEye] = score;
            if(currentEye === 'rightEye') { currentEye = 'leftEye'; openModal("تبديل", "الآن غطِ العين اليمنى."); }
            else { show('menu'); }
        }

        function renderReport() {
            document.getElementById('report-patient-name').innerText = currentPatient;
            let h = ""; for (const [t, r] of Object.entries(currentResults)) {
                h += `<div class="res-item"><b>${t}</b>`;
                for (const [e, s] of Object.entries(r)) h += `<div>${i18n.ar[e] || e}: ${s}</div>`;
                h += `</div>`;
            }
            document.getElementById('report-details').innerHTML = h;
        }

        function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    </script>
</body>
</html>
