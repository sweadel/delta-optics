<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تشكيلات دلتا | Delta Optics</title>
    <link rel="icon" href="logo.jpg" type="image/jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --brand: #0E7490; --brand-light: #ECFEFF; --bg: #F8FAFC; --text-dark: #1E293B; --text-gray: #64748B; --white: #FFFFFF; --shadow: 0 4px 20px rgba(0,0,0,0.05); --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: var(--bg); margin: 0; padding-bottom: 50px; }
        header { background: rgba(255, 255, 255, 0.95); padding: 15px 20px; box-shadow: 0 2px 15px rgba(14, 116, 144, 0.08); position: sticky; top: 0; z-index: 100; text-align: center; }
        .tab-btn { padding: 8px 24px; border-radius: 20px; border: 2px solid var(--brand-light); background: var(--white); cursor: pointer; transition: 0.3s; font-weight: 700; }
        .tab-btn.active { background: var(--brand); color: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: white; border-radius: 16px; overflow: hidden; box-shadow: var(--shadow); border: 1px solid #E2E8F0; cursor: pointer; }
        .card img { width: 100%; height: 160px; object-fit: cover; opacity: 0; transition: 0.3s; }
        .card img.loaded { opacity: 1; }
        .badge { position: absolute; top: 10px; right: 10px; background: white; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; color: var(--brand); z-index: 5; }
        .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; flex-direction: column; }
    </style>
</head>
<body>

<header>
    <a href="index.html" style="float:right; text-decoration:none; color:black;"><i class="fas fa-arrow-right"></i></a>
    <h1 style="font-size:1.2rem; color:var(--brand); margin:0;">تشكيلات دلتا المميزة</h1>
</header>

<div style="display:flex; justify-content:center; gap:10px; padding:15px; background:white;">
    <button class="tab-btn active" onclick="filterItems('all', this)">الكل</button>
    <button class="tab-btn" onclick="filterItems('medical', this)">طبّي</button>
    <button class="tab-btn" onclick="filterItems('sun', this)">شمسي</button>
</div>

<div class="grid" id="gallery"></div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lb-img" style="max-width:90%; max-height:70%; border-radius:15px;">
    <h3 id="lb-title" style="color:white; margin-top:20px;"></h3>
    <a id="lb-wa" href="#" target="_blank" style="background:#25D366; color:white; padding:15px 30px; border-radius:30px; text-decoration:none; font-weight:bold; margin-top:20px;"><i class="fab fa-whatsapp"></i> استفسار</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB11C4GGgAyqeThs8a9cvDNN7frvAA1nqQ",
        authDomain: "delta-optics-system.firebaseapp.com",
        projectId: "delta-optics-system",
        storageBucket: "delta-optics-system.firebasestorage.app",
        messagingSenderId: "111176219224",
        appId: "1:111176219224:web:e0d8a5f26b84d57249a82d"
    };

    initializeApp(firebaseConfig);
    const db = getFirestore();

    onSnapshot(query(collection(db, "brands"), orderBy("timestamp", "desc")), (snap) => {
        const gal = document.getElementById('gallery'); gal.innerHTML = "";
        snap.forEach(d => {
            const b = d.data();
            gal.innerHTML += `<div class="card item-${b.type}" onclick="openLightbox('${b.imageUrl}', '${b.name}')">
                <div class="badge">${b.type === 'sun' ? 'شمسي' : 'طبي'}</div>
                <img src="${b.imageUrl}" onload="this.classList.add('loaded')">
                <div style="padding:10px; text-align:center;"><h3>${b.name}</h3></div>
            </div>`;
        });
    });

    window.filterItems = (type, btn) => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.card').forEach(c => c.style.display = (type === 'all' || c.classList.contains(`item-${type}`)) ? 'block' : 'none');
    }

    window.openLightbox = (src, title) => {
        document.getElementById('lb-img').src = src;
        document.getElementById('lb-title').innerText = title;
        document.getElementById('lb-wa').href = `https://wa.me/962775549700?text=استفسار عن: ${title} - ${src}`;
        document.getElementById('lightbox').style.display = 'flex';
    }
    window.closeLightbox = () => document.getElementById('lightbox').style.display = 'none';
</script>
</body>
</html>
