<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>القياس الافتراضي 3D | Delta Optics</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-face-aframe.prod.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0f172a; }
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; pointer-events: auto; }
        .back-btn { background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 1.2rem; border: 1px solid rgba(255,255,255,0.3); }
        .title-box { background: rgba(14, 116, 144, 0.7); backdrop-filter: blur(10px); color: white; padding: 10px 20px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; }
        .footer { text-align: center; pointer-events: auto; padding-bottom: 20px; }
        .capture-btn { background: #0ea5e9; color: white; border: none; padding: 15px 35px; border-radius: 30px; font-size: 1.1rem; font-weight: bold; box-shadow: 0 10px 20px rgba(14, 165, 233, 0.4); cursor: pointer; }
    </style>
</head>
<body>

    <div class="ui-layer">
        <div class="header">
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i></a>
            <div class="title-box">Delta Optics - تجربة 3D</div>
        </div>
        <div class="footer">
            <button class="capture-btn" onclick="alert('سيتم تفعيل حفظ الصورة قريباً!')">التقط صورة</button>
        </div>
    </div>

    <a-scene mindar-face embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-assets>
            <a-asset-item id="glassesModel" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/examples/face-tracking/assets/glasses/scene.gltf"></a-asset-item>
        </a-assets>
        
        <a-camera active="false" position="0 0 0"></a-camera>
        
        <a-entity mindar-face-target="anchorIndex: 168">
            <a-gltf-model rotation="0 0 0" position="0 -0.1 0" scale="0.009 0.009 0.009" src="#glassesModel"></a-gltf-model>
        </a-entity>
    </a-scene>

</body>
</html>
