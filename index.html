<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Optics | دلتا للبصريات</title>
    
    <link rel="icon" href="logo.jpg" type="image/jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #0891b2; 
            --primary-hover: #0e7490;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --text-light: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --radius: 16px;
        }

        [data-theme="dark"] {
            --primary: #06b6d4;
            --primary-hover: #22d3ee;
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --text-light: #94a3b8;
            --border: #334155;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }
        
        body { background: var(--bg); color: var(--text); line-height: 1.6; transition: background-color 0.3s, color 0.3s; }
        
        /* الحاوية الرئيسية تضمن تجاوب الموقع مع الشاشات الكبيرة */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        
        /* الشريط العلوي */
        header { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; padding: 15px 0; transition: 0.3s; }
        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .brand img { width: 45px; height: 45px; border-radius: 10px; object-fit: cover; border: 1px solid var(--border); }
        .brand h2 { font-size: 1.5rem; color: var(--primary); font-weight: 900; letter-spacing: 1px; }
        
        .controls { display: flex; gap: 10px; }
        .btn-icon { background: var(--bg); border: 1px solid var(--border); color: var(--text); width: 40px; height: 40px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: 0.2s; }
        .btn-icon:hover { background: var(--primary); color: white; border-color: var(--primary); }

        /* قسم الترحيب (Hero) */
        .hero { text-align: center; padding: 80px 20px; background: linear-gradient(to bottom, var(--surface), var(--bg)); border-bottom: 1px solid var(--border); }
        .hero h1 { font-size: clamp(2.2rem, 5vw, 3.5rem); font-weight: 900; margin-bottom: 15px; color: var(--text); }
        .hero p { font-size: clamp(1rem, 2vw, 1.2rem); color: var(--text-light); max-width: 600px; margin: 0 auto 30px; }
        
        .status-badge { display: inline-flex; align-items: center; gap: 8px; background: var(--surface); padding: 10px 25px; border-radius: 50px; border: 1px solid var(--border); font-weight: 700; box-shadow: var(--shadow); color: var(--text); }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot.open { background: #10b981; box-shadow: 0 0 8px #10b981; }
        .dot.closed { background: #ef4444; box-shadow: 0 0 8px #ef4444; }

        /* شبكة الخدمات المتجاوبة (Responsive Grid) */
        main { padding: 60px 0; }
        .section-title { text-align: center; font-size: 2rem; margin-bottom: 40px; font-weight: 900; color: var(--text); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; }
        
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px 20px; text-align: center; transition: all 0.3s ease; box-shadow: var(--shadow); text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 10px 25px rgba(8, 145, 178, 0.15); }
        .card-icon { font-size: 3.5rem; color: var(--primary); margin-bottom: 10px; }
        .card-title { font-size: 1.4rem; font-weight: 800; color: var(--text); }
        .card-desc { font-size: 1rem; color: var(--text-light); }

        /* زر الواتساب العائم */
        .fab { position: fixed; bottom: 30px; right: 30px; background: #25D366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4); transition: 0.3s; z-index: 1000; text-decoration: none; }
        .fab:hover { transform: scale(1.1); }

        /* تعديلات الموبايل */
        @media (max-width: 768px) {
            .hero { padding: 50px 15px; }
            .card { padding: 30px 15px; }
            .fab { bottom: 20px; right: 20px; width: 50px; height: 50px; font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="container header-content">
            <a href="index.html" class="brand">
                <img src="logo.jpg" alt="Delta">
                <h2>DELTA</h2>
            </a>
            <div class="controls">
                <button class="btn-icon" onclick="toggleTheme()" id="theme-btn"><i class="fas fa-moon"></i></button>
                <button class="btn-icon" onclick="toggleLang()" id="lang-btn">EN</button>
            </div>
        </div>
    </header>

    <div class="hero">
        <div class="container">
            <h1 id="txt-hero">دلتا للبصريات</h1>
            <p id="txt-sub">خبراء العناية بالعين وأحدث الماركات العالمية، دقة في الفحص وجودة في الاختيار.</p>
            <div class="status-badge">
                <div class="dot" id="status-dot"></div>
                <span id="status-text">...</span>
            </div>
        </div>
    </div>

    <main class="container">
        <h2 class="section-title" id="txt-section">خدماتنا</h2>
        
        <div class="grid">
            <a href="test.html" class="card">
                <i class="fas fa-microscope card-icon"></i>
                <h3 class="card-title" id="txt-test">الفحص الذكي</h3>
                <p class="card-desc" id="desc-test">أحدث الأجهزة لضمان دقة قياس النظر وصحة العين.</p>
            </a>
            
            <a href="collection.html" class="card">
                <i class="fas fa-glasses card-icon"></i>
                <h3 class="card-title" id="txt-coll">التشكيلات</h3>
                <p class="card-desc" id="desc-coll">استعرض أحدث الإطارات والنظارات الشمسية العالمية.</p>
            </a>
            
            <a href="https://wa.me/962775549700" target="_blank" class="card">
                <i class="fas fa-calendar-check card-icon"></i>
                <h3 class="card-title" id="txt-book">حجز موعد</h3>
                <p class="card-desc" id="desc-book">تواصل معنا لحجز موعد فحص بكل سهولة عبر الواتساب.</p>
            </a>
        </div>
    </main>

    <a href="https://wa.me/962775549700" target="_blank" class="fab"><i class="fab fa-whatsapp"></i></a>

    <script>
        // إدارة الوضع الليلي
        let isDark = localStorage.getItem('theme') === 'dark';
        const applyTheme = (dark) => {
            document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
            document.getElementById('theme-btn').innerHTML = dark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            localStorage.setItem('theme', dark ? 'dark' : 'light');
        }
        applyTheme(isDark);
        window.toggleTheme = () => { isDark = !isDark; applyTheme(isDark); }

        // إدارة اللغات
        let curLang = 'ar';
        const i18n = {
            ar: { 
                hero: "دلتا للبصريات", sub: "خبراء العناية بالعين وأحدث الماركات العالمية، دقة في الفحص وجودة في الاختيار.", 
                section: "خدماتنا", test: "الفحص الذكي", descTest: "أحدث الأجهزة لضمان دقة قياس النظر وصحة العين.",
                coll: "التشكيلات", descColl: "استعرض أحدث الإطارات والنظارات الشمسية العالمية.",
                book: "حجز موعد", descBook: "تواصل معنا لحجز موعد فحص بكل سهولة عبر الواتساب.",
                open: "مفتوح الآن", closed: "مغلق الآن"
            },
            en: { 
                hero: "DELTA OPTICS", sub: "Eye care experts and premium brands, precision in examination and quality in selection.", 
                section: "Our Services", test: "Smart Test", descTest: "Latest equipment to ensure accurate vision measurement.",
                coll: "Collections", descColl: "Browse the latest global frames and sunglasses.",
                book: "Book Appointment", descBook: "Contact us to easily book an eye test via WhatsApp.",
                open: "Open Now", closed: "Closed Now"
            }
        };

        window.toggleLang = () => {
            curLang = curLang === 'ar' ? 'en' : 'ar';
            const t = i18n[curLang];
            document.documentElement.lang = curLang;
            document.documentElement.dir = curLang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('lang-btn').innerText = curLang === 'ar' ? 'EN' : 'عربي';
            
            document.getElementById('txt-hero').innerText = t.hero;
            document.getElementById('txt-sub').innerText = t.sub;
            document.getElementById('txt-section').innerText = t.section;
            document.getElementById('txt-test').innerText = t.test;
            document.getElementById('desc-test').innerText = t.descTest;
            document.getElementById('txt-coll').innerText = t.coll;
            document.getElementById('desc-coll').innerText = t.descColl;
            document.getElementById('txt-book').innerText = t.book;
            document.getElementById('desc-book').innerText = t.descBook;
            checkStatus();
        }

        // إدارة حالة الدوام
        function checkStatus() {
            const now = new Date(); const hour = now.getHours(); const day = now.getDay();
            let isOpen = (day === 5) ? (hour >= 16 && hour < 22) : (hour >= 10 && hour < 22);
            
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            
            dot.className = 'dot ' + (isOpen ? 'open' : 'closed');
            text.innerText = isOpen ? i18n[curLang].open : i18n[curLang].closed;
        }
        checkStatus();
    </script>
</body>
</html>
