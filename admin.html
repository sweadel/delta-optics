<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الإدارة المتقدم | Delta</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0E7490; --bg: #F8FAFC; --text: #1E293B; --danger: #EF4444; --success: #10B981; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        
        /* شاشة تسجيل الدخول */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        .login-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        .input-field { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 10px; border: 2px solid #E2E8F0; font-size: 1rem; text-align: center; outline: none; box-sizing: border-box; font-family: sans-serif;}
        .input-field:focus { border-color: var(--primary); }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        .btn-danger { background: var(--danger); width: auto; padding: 10px 20px; }
        .btn-success { background: var(--success); }

        /* لوحة التحكم */
        #dashboard-screen { display: none; max-width: 1000px; margin: 0 auto; }
        header { background: white; padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #E2E8F0; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid #E2E8F0; vertical-align: top; }
        th { background: #F1F5F9; color: var(--primary); }
        
        .report-box { background: #F8FAFC; padding: 15px; border-radius: 10px; font-size: 0.9rem; line-height: 1.8; white-space: pre-wrap; border: 1px solid #E2E8F0; }
        
        /* أقسام عادل الخاصة */
        #audit-section, #users-management-section { display: none; border: 2px solid var(--primary); }
        .log-badge { background: #FEF2F2; color: var(--danger); padding: 4px 8px; border-radius: 5px; font-size: 0.8rem; font-weight: bold; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <i class="fas fa-lock" style="font-size: 3rem; color: var(--primary); margin-bottom: 20px;"></i>
            <h2>بوابة الدخول</h2>
            <input type="text" id="username" class="input-field" placeholder="اسم المستخدم">
            <input type="password" id="password" class="input-field" placeholder="كلمة المرور">
            <button class="btn" id="login-btn" onclick="attemptLogin()">دخول النظام</button>
            <p id="error-msg" style="color: red; display: none; font-size: 0.9rem; margin-top: 10px;">بيانات الدخول خاطئة أو غير موجودة!</p>
        </div>
    </div>

    <div id="dashboard-screen">
        <header>
            <h1 style="margin:0; font-size:1.5rem; color:var(--primary);"><i class="fas fa-chart-line"></i> نظام دلتا</h1>
            <div style="display:flex; align-items:center; gap:15px;">
                <span id="welcome-text" style="font-weight:bold; font-size:1.1rem;"></span>
                <button class="btn btn-danger" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
            </div>
        </header>

        <div class="card" id="users-management-section">
            <h2 style="margin-top:0; color:var(--primary);"><i class="fas fa-users-cog"></i> إدارة حسابات النظام</h2>
            <div style="background: #F1F5F9; padding: 15px; border-radius: 10px; margin-bottom: 15px;">
                <label style="font-weight:bold; margin-bottom:10px; display:block;">اختر الحساب لتعديله:</label>
                <select id="user-select" class="input-field" onchange="fillUserData()" style="margin:0;">
                    <option value="manager">حساب مدير العيادة</option>
                    <option value="superadmin">حساب المهندس عادل (الإدارة العليا)</option>
                </select>
            </div>
            <div class="grid-2">
                <div>
                    <label style="font-size:0.9rem; font-weight:bold;">الاسم المعروض للمستخدم:</label>
                    <input type="text" id="edit-name" class="input-field" placeholder="مثال: د. أحمد">
                </div>
                <div>
                    <label style="font-size:0.9rem; font-weight:bold;">اسم الدخول (Username):</label>
                    <input type="text" id="edit-username" class="input-field" placeholder="username" dir="ltr">
                </div>
            </div>
            <div style="margin-bottom: 15px;">
                <label style="font-size:0.9rem; font-weight:bold;">كلمة المرور:</label>
                <input type="text" id="edit-password" class="input-field" placeholder="كلمة المرور الجديدة" dir="ltr">
            </div>
            <button class="btn btn-success" onclick="saveUserChanges()"><i class="fas fa-save"></i> حفظ التعديلات</button>
            <p id="save-msg" style="color: var(--success); display: none; font-weight:bold; margin-top: 10px; text-align:center;">تم تحديث بيانات الحساب بنجاح!</p>
        </div>

        <div class="card" id="audit-section">
            <h2 style="margin-top:0; color:var(--danger);"><i class="fas fa-user-secret"></i> سجل المراقبة السري (Black Box)</h2>
            <table>
                <thead>
                    <tr>
                        <th>المستخدم</th>
                        <th>الحدث / الإجراء</th>
                        <th>التوقيت</th>
                    </tr>
                </thead>
                <tbody id="logs-body">
                    <tr><td colspan="3" style="text-align:center;">جاري تحميل السجلات...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="card">
            <h2 style="margin-top:0;"><i class="fas fa-notes-medical"></i> التقارير الطبية للمراجعين</h2>
            <table>
                <thead>
                    <tr>
                        <th style="width:20%;">المراجع</th>
                        <th style="width:60%;">التقرير</th>
                        <th style="width:20%;">التوقيت</th>
                    </tr>
                </thead>
                <tbody id="reports-body">
                    <tr><td colspan="3" style="text-align:center;">جاري تحميل التقارير...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, getDocs, where, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB11C4GGgAyqeThs8a9cvDNN7frvAA1nqQ",
            authDomain: "delta-optics-system.firebaseapp.com",
            projectId: "delta-optics-system",
            storageBucket: "delta-optics-system.firebasestorage.app",
            messagingSenderId: "111176219224",
            appId: "1:111176219224:web:e0d8a5f26b84d57249a82d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentUser = null;
        let systemUsersList = {}; // للاحتفاظ ببيانات المستخدمين عند التعديل

        // 1. توليد الحسابات الافتراضية لأول مرة في قاعدة البيانات
        async function setupInitialUsers() {
            const adminRef = doc(db, "system_users", "superadmin");
            const adminSnap = await getDoc(adminRef);
            if(!adminSnap.exists()) {
                // إذا القاعدة فاضية، بنعمل حسابات مبدئية
                await setDoc(adminRef, { username: "adel", pass: "123123", role: "superadmin", name: "المهندس عادل" });
                await setDoc(doc(db, "system_users", "manager"), { username: "manager", pass: "admin123", role: "manager", name: "مدير العيادة" });
            }
        }
        setupInitialUsers();

        // 2. تسجيل الدخول بالبحث في قاعدة البيانات
        window.attemptLogin = async function() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            const btn = document.getElementById('login-btn');
            
            if(!u || !p) return;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحقق...';

            try {
                const q = query(collection(db, "system_users"), where("username", "==", u), where("pass", "==", p));
                const snap = await getDocs(q);

                if(!snap.empty) {
                    currentUser = snap.docs[0].data();
                    currentUser.docId = snap.docs[0].id; // "superadmin" أو "manager"
                    
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('dashboard-screen').style.display = 'block';
                    document.getElementById('welcome-text').innerText = `أهلاً بك، ${currentUser.name}`;

                    await logAction(`تم تسجيل الدخول للنظام`);
                    
                    if(currentUser.role === 'superadmin') {
                        document.getElementById('audit-section').style.display = 'block';
                        document.getElementById('users-management-section').style.display = 'block';
                        loadLogs();
                        loadUsersForEdit();
                    }
                    loadReports();
                } else {
                    document.getElementById('error-msg').style.display = 'block';
                }
            } catch (e) {
                console.error(e);
                alert("خطأ في الاتصال بقاعدة البيانات");
            }
            btn.innerHTML = 'دخول النظام';
        }

        // 3. جلب المستخدمين لشاشة التعديل (لعادل)
        async function loadUsersForEdit() {
            const snap = await getDocs(collection(db, "system_users"));
            snap.forEach(doc => { systemUsersList[doc.id] = doc.data(); });
            window.fillUserData();
        }

        // 4. تعبئة الخانات عند اختيار يوزر
        window.fillUserData = function() {
            const selectedId = document.getElementById('user-select').value;
            const uData = systemUsersList[selectedId];
            if(uData) {
                document.getElementById('edit-name').value = uData.name;
                document.getElementById('edit-username').value = uData.username;
                document.getElementById('edit-password').value = uData.pass;
            }
        }

        // 5. حفظ التعديلات في فايربيز
        window.saveUserChanges = async function() {
            const selectedId = document.getElementById('user-select').value;
            const newName = document.getElementById('edit-name').value.trim();
            const newUsername = document.getElementById('edit-username').value.trim();
            const newPass = document.getElementById('edit-password').value.trim();

            if(!newName || !newUsername || !newPass) return alert("يجب تعبئة جميع الحقول!");

            try {
                await updateDoc(doc(db, "system_users", selectedId), {
                    name: newName,
                    username: newUsername,
                    pass: newPass
                });

                // تحديث القائمة المحلية
                systemUsersList[selectedId].name = newName;
                systemUsersList[selectedId].username = newUsername;
                systemUsersList[selectedId].pass = newPass;

                await logAction(`قام بتعديل بيانات حساب: ${newName}`);

                document.getElementById('save-msg').style.display = 'block';
                setTimeout(() => document.getElementById('save-msg').style.display = 'none', 3000);
            } catch (error) {
                console.error("Error updating user: ", error);
            }
        }

        // 6. تسجيل الخروج
        window.logout = async function() {
            await logAction(`تسجيل خروج من النظام`);
            location.reload(); 
        }

        // وظائف المراقبة والتقارير
        async function logAction(actionText) {
            if(!currentUser) return;
            try { await addDoc(collection(db, "system_logs"), { user: currentUser.name, action: actionText, timestamp: serverTimestamp() }); } catch (e) { console.log(e); }
        }

        function loadReports() {
            const q = query(collection(db, "tests"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snapshot) => {
                const tbody = document.getElementById('reports-body');
                tbody.innerHTML = "";
                snapshot.forEach(doc => {
                    const d = doc.data();
                    const time = d.timestamp ? d.timestamp.toDate().toLocaleString('ar-EG') : '...';
                    tbody.innerHTML += `<tr><td><strong>${d.name}</strong></td><td><div class="report-box">${d.details}</div></td><td>${time}</td></tr>`;
                });
            });
        }

        function loadLogs() {
            const qLogs = query(collection(db, "system_logs"), orderBy("timestamp", "desc"));
            onSnapshot(qLogs, (snapshot) => {
                const tbody = document.getElementById('logs-body');
                tbody.innerHTML = "";
                snapshot.forEach(doc => {
                    const l = doc.data();
                    const time = l.timestamp ? l.timestamp.toDate().toLocaleString('ar-EG') : '...';
                    tbody.innerHTML += `<tr><td><strong><i class="fas fa-user"></i> ${l.user}</strong></td><td><span class="log-badge">${l.action}</span></td><td>${time}</td></tr>`;
                });
            });
        }
    </script>
</body>
</html>
