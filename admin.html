<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <title>Delta ERP | إدارة النظام</title>
</head>
<body>

    <aside class="sidebar">
        <div style="padding:30px; text-align:center; border-bottom:1px solid #334155;">
            <h2 style="margin:0; font-weight:900; letter-spacing:1px;">DELTA OPTICS</h2>
        </div>
        <nav style="padding:20px;">
            <div class="nav-item active" onclick="showView('dash')"><i class="fas fa-home"></i> الرئيسية</div>
            <div class="nav-item" onclick="showView('pos')"><i class="fas fa-cash-register"></i> نقطة البيع (POS)</div>
            <div class="nav-item" onclick="showView('rx')"><i class="fas fa-eye"></i> فحص المراجعين</div>
            <div class="nav-item" onclick="showView('inv')"><i class="fas fa-boxes"></i> المخزون</div>
            
            <div class="admin-only" style="margin-top:20px; border-top:1px solid #334155; padding-top:20px;">
                <p style="font-size:12px; color:#64748b; margin-bottom:10px;">إدارة عليا</p>
                <div class="nav-item" onclick="showView('staff')"><i class="fas fa-users-cog"></i> الموظفين</div>
                <div class="nav-item" onclick="showView('logs')"><i class="fas fa-shield-alt"></i> السجل الأمني</div>
            </div>
        </nav>
    </aside>

    <div class="main-layout">
        <header style="height:70px; background:white; display:flex; align-items:center; justify-content:space-between; padding:0 30px; border-bottom:1px solid var(--border);">
            <h3 id="view-title">لوحة التحكم</h3>
            <div id="user-info" style="font-weight:700; color:var(--primary);"></div>
        </header>

        <main style="padding:30px;">
            <section id="view-dash" class="view">
                <div class="card">
                    <h2>أهلاً بك يا بشمهندس</h2>
                    <p>هون بتشوف ملخص المبيعات، المراجعين لليوم، وحالة المختبر.</p>
                </div>
            </section>
            
            <section id="view-pos" class="view" style="display:none;">
                <div class="card">
                    <h2>إصدار فاتورة جديدة</h2>
                    </div>
            </section>
        </main>
    </div>

    <script type="module">
        import { db } from './config.js';
        import { checkAccess } from './auth.js';
        
        // محاكاة دخول الموظف عادل
        const user = { name: "المهندس عادل", role: "superadmin" };
        document.getElementById('user-info').innerText = user.name;
        checkAccess(user);

        window.showView = (id) => {
            document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
            document.getElementById('view-' + id).style.display = 'block';
        }
    </script>
</body>
</html>
