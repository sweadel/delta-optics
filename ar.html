<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Delta AR Premium | تجربة النظارات</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-face-aframe.prod.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* واجهة المستخدم */
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        .header, .footer { pointer-events: auto; }
        
        .back-btn { background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; border: 1px solid rgba(255,255,255,0.2); }
        .title-box { background: #0e7490; color: white; padding: 8px 20px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        /* شاشة التحميل الذكية */
        #loading-screen { position: fixed; inset: 0; background: #0f172a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; color: white; transition: opacity 0.5s; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.1); border-top-color: #0ea5e9; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .footer { text-align: center; padding-bottom: 30px; }
        .capture-btn { background: linear-gradient(135deg, #0e7490, #0ea5e9); color: white; border: none; padding: 15px 40px; border-radius: 30px; font-size: 1.1rem; font-weight: bold; box-shadow: 0 10px 25px rgba(14, 116, 144, 0.4); cursor: pointer; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p>جاري تجهيز الكاميرا والذكاء الاصطناعي...</p>
        <small style="opacity: 0.6; margin-top: 10px;">يرجى السماح بالوصول للكاميرا</small>
    </div>

    <div class="ui-layer">
        <div class="header" style="display: flex; justify-content: space-between; align-items: center;">
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i></a>
            <div class="title-box">DELTA OPTICS 3D</div>
        </div>
        <div class="footer">
            <button class="capture-btn" onclick="location.reload()"><i class="fas fa-sync"></i> تبديل الموديل</button>
        </div>
    </div>

    <a-scene mindar-face="uiLoading: no; uiError: no; filterMinCF:0.001; filterBeta: 0.1;" embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="glassesModel" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/examples/face-tracking/assets/glasses/scene.gltf"></a-asset-item>
        </a-assets>
        
        <a-camera active="false" position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-face-target="anchorIndex: 168">
            <a-gltf-model rotation="0 0 0" position="0 -0.1 0" scale="0.01 0.01 0.01" src="#glassesModel"></a-gltf-model>
        </a-entity>
        
        <a-entity light="type: ambient; intensity: 1.2"></a-entity>
        <a-entity light="type: directional; intensity: 0.8" position="1 2 1"></a-entity>

    </a-scene>

    <script>
        // إخفاء التحميل فور تشغيل الكاميرا
        document.addEventListener("DOMContentLoaded", () => {
            const sceneEl = document.querySelector('a-scene');
            sceneEl.addEventListener("ready", () => {
                console.log("MindAR is ready");
                const loader = document.getElementById('loading-screen');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            });

            // إذا فشل التحميل خلال 12 ثانية (مشكلة تصاريح)
            setTimeout(() => {
                if (document.getElementById('loading-screen').style.display !== 'none') {
                    alert("عذراً، يرجى التأكد من إعطاء صلاحية الكاميرا وتحديث الصفحة.");
                }
            }, 12000);
        });
    </script>

</body>
</html>
