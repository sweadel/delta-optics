<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تشكيلات دلتا | Delta Optics</title>
    <link rel="icon" href="logo.jpg" type="image/jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --brand: #0E7490; --brand-light: #ECFEFF; --bg: #F8FAFC; 
            --text-dark: #1E293B; --text-gray: #64748B; --white: #FFFFFF; 
            --shadow: 0 4px 20px rgba(0,0,0,0.05); --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); margin: 0; padding-bottom: 50px; overflow-x: hidden; }

        /* الهيدر الرئيسي */
        header { 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); 
            padding: 15px 20px; box-shadow: 0 2px 15px rgba(14, 116, 144, 0.08); 
            position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; 
        }
        .back-main { width: 40px; height: 40px; border-radius: 50%; background: #F1F5F9; color: var(--text-dark); display: flex; align-items: center; justify-content: center; text-decoration: none; }
        
        /* شريط التبويبات */
        .tabs-container { display: flex; justify-content: center; gap: 10px; padding: 15px; background: white; border-bottom: 1px solid #E2E8F0; }
        .tab-btn { padding: 8px 24px; border-radius: 20px; border: 2px solid var(--brand-light); background: var(--white); cursor: pointer; transition: 0.3s; font-weight: 700; color: var(--text-gray); }
        .tab-btn.active { background: var(--brand); color: white; border-color: var(--brand); }

        /* شبكة المعرض */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 16px; overflow: hidden; box-shadow: var(--shadow); border: 1px solid #E2E8F0; cursor: pointer; position: relative; transition: 0.3s; animation: fadeInUp 0.4s forwards; }
        .card:hover { transform: translateY(-5px); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .img-wrap { width: 100%; height: 170px; background: #F1F5F9; position: relative; }
        .card img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: 0.3s; }
        .card img.loaded { opacity: 1; }
        .badge { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.9); padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; color: var(--brand); z-index: 5; }

        /* نافذة العرض (Lightbox) مع سهم الرجوع */
        .lightbox { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(10px); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .lightbox-header { position: absolute; top: 0; right: 0; width: 100%; padding: 20px; display: flex; align-items: center; justify-content: flex-start; }
        .btn-back-light { background: rgba(255,255,255,0.1); border: none; color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.5rem; transition: 0.2s; }
        .btn-back-light:active { transform: scale(0.9); background: var(--brand); }

        .lightbox img { max-width: 100%; max-height: 60vh; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); object-fit: contain; background: #fff; padding: 5px;}
        .wa-order-btn { background: #25D366; color: white; padding: 16px 35px; border-radius: 35px; text-decoration: none; font-weight: 800; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; margin-top: 30px; box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3); }

        @media (max-width: 600px) { .grid { grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; } }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 12px;">
        <a href="index.html" class="back-main"><i class="fas fa-arrow-right"></i></a>
        <img src="logo.jpg" style="height: 40px; border-radius: 8px;">
    </div>
    <h1 style="font-size: 1.1rem; font-weight: 800; color: var(--brand); margin: 0;">تشكيلات دلتا</h1>
</header>

<div class="tabs-container">
    <button class="tab-btn active" onclick="filterItems('all', this)">الكل</button>
    <button class="tab-btn" onclick="filterItems('medical', this)">طبي</button>
    <button class="tab-btn" onclick="filterItems('sun', this)">شمسي</button>
</div>

<div class="grid" id="gallery">
    <div style="grid-column: 1/-1; text-align: center; padding: 50px; color: var(--brand);">
        <i class="fas fa-circle-notch fa-spin fa-2x"></i>
    </div>
</div>

<div class="lightbox" id="lightbox">
    <div class="lightbox-header">
        <button class="btn-back-light" onclick="closeLightbox()"><i class="fas fa-arrow-right"></i></button>
        <span style="color: white; margin-right: 15px; font-weight: bold;">العودة للمعرض</span>
    </div>
    
    <img id="lb-img" src="">
    <h3 id="lb-title" style="color: white; margin-top: 20px; text-align: center; font-weight: 800;"></h3>
    
    <a id="lb-wa" href="#" target="_blank" class="wa-order-btn">
        <i class="fab fa-whatsapp"></i> استفسار عن هذا الموديل
    </a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB11C4GGgAyqeThs8a9cvDNN7frvAA1nqQ",
        authDomain: "delta-optics-system.firebaseapp.com",
        projectId: "delta-optics-system",
        storageBucket: "delta-optics-system.firebasestorage.app",
        messagingSenderId: "111176219224",
        appId: "1:111176219224:web:e0d8a5f26b84d57249a82d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // دالة جلب البيانات مع ميزة الحذف التلقائي للعناصر بدون صور
    onSnapshot(query(collection(db, "brands"), orderBy("timestamp", "desc")), (snap) => {
        const gal = document.getElementById('gallery'); 
        gal.innerHTML = "";
        
        if(snap.empty) {
            gal.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:50px; color:gray;">المعرض فارغ حالياً</div>';
            return;
        }

        snap.forEach(d => {
            const b = d.data();
            const card = document.createElement('div');
            card.className = `card item-${b.type}`;
            card.onclick = () => openLightbox(b.imageUrl, b.name);
            
            card.innerHTML = `
                <div class="badge">${b.type === 'sun' ? 'شمسي' : 'طبي'}</div>
                <div class="img-wrap">
                    <img src="${b.imageUrl}" alt="${b.name}" 
                         onload="this.classList.add('loaded')" 
                         onerror="this.closest('.card').remove()"> 
                </div>
                <div style="padding:12px; text-align:center;">
                    <h3 style="font-size:0.9rem; margin:0; color:var(--text-dark); font-weight:800;">${b.name}</h3>
                </div>
            `;
            gal.appendChild(card);
        });
    });

    window.filterItems = (type, btn) => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.card').forEach(c => {
            c.style.display = (type === 'all' || c.classList.contains(`item-${type}`)) ? 'block' : 'none';
        });
    }

    window.openLightbox = (src, title) => {
        const lb = document.getElementById('lightbox');
        document.getElementById('lb-img').src = src;
        document.getElementById('lb-title').innerText = title;
        const msg = encodeURIComponent(`مرحباً دلتا للبصريات، أود الاستفسار عن الموديل: ${title}\nرابط الصورة: ${src}`);
        document.getElementById('lb-wa').href = `https://wa.me/962775549700?text=${msg}`;
        lb.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    window.closeLightbox = () => {
        document.getElementById('lightbox').style.display = 'none';
        document.body.style.overflow = 'auto';
    }
</script>
</body>
</html>
