<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Delta Optics ERP | Admin Panel</title>
</head>
<body>
    <aside class="sidebar">
        <h2 style="color:var(--primary)">Delta Optics</h2>
        <p style="font-size:12px; color:gray">المهندس عادل جعاروة</p>
        <hr style="width:100%; border:0.5px solid var(--border); margin:20px 0;">
        <button class="nav-btn active" onclick="view('dash')">لوحة البيانات</button>
        <button class="nav-btn" onclick="view('pos')">نقطة البيع (POS)</button>
        <button class="nav-btn" onclick="view('rx')">فحص المراجعين (Rx)</button>
        <button class="nav-btn" onclick="view('inv')">إدارة المخزون</button>
        <button class="nav-btn" onclick="view('logs')">سجل النظام</button>
    </aside>

    <main class="main-content">
        <section id="dash">
            <div class="grid-4">
                <div class="card"><h3>مبيعات اليوم</h3><p id="today-sales">0 JOD</p></div>
                <div class="card"><h3>المراجعين</h3><p>12 اليوم</p></div>
                <div class="card"><h3>المخزون</h3><p>45 إطار</p></div>
                <div class="card"><h3>تنبيهات</h3><p>3 طلبات مختبر</p></div>
            </div>
        </section>

        <section id="rx" style="display:none;">
            <div class="card">
                <h2>إضافة فحص نظر جديد</h2>
                <div class="grid-4">
                    <input type="text" id="p_name" placeholder="اسم المراجع">
                    <input type="text" id="p_phone" placeholder="رقم الهاتف">
                </div>
                <table>
                    <tr><th>العين</th><th>SPH</th><th>CYL</th><th>AXIS</th><th>ADD</th></tr>
                    <tr><td>اليمين</td><td><input type="text" id="r_sph"></td><td><input type="text" id="r_cyl"></td><td><input type="text" id="r_axis"></td><td><input type="text" id="r_add"></td></tr>
                    <tr><td>اليسار</td><td><input type="text" id="l_sph"></td><td><input type="text" id="l_cyl"></td><td><input type="text" id="l_axis"></td><td><input type="text" id="l_add"></td></tr>
                </table>
                <button class="btn-save" onclick="saveRxData()" style="margin-top:20px;">حفظ الفحص</button>
            </div>
        </section>
    </main>

    <script type="module">
        import { Inventory, POS, Optometry, Security } from './app.js';

        window.view = (id) => {
            document.querySelectorAll('section').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        };

        window.saveRxData = async () => {
            const data = {
                name: document.getElementById('p_name').value,
                r: { sph: document.getElementById('r_sph').value },
                // ... باقي البيانات
            };
            await Optometry.saveRx(data);
            await Security.log("Adel", "قام بإضافة فحص جديد للمراجع: " + data.name);
            alert("تم الحفظ بنجاح!");
        };
    </script>
</body>
</html>
