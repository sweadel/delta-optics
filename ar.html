<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Delta HD - 2D Experience | دلتا للبصريات</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-face-aframe.prod.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Tajawal', sans-serif; }
        #overlay { position: fixed; inset: 0; background: #0f172a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; transition: 0.5s; }
        .start-btn { background: #0ea5e9; color: white; border: none; padding: 20px 50px; border-radius: 15px; font-size: 1.3rem; font-weight: 900; cursor: pointer; box-shadow: 0 10px 30px rgba(14, 165, 233, 0.4); }
        .ui-header { position: fixed; top: 0; width: 100%; padding: 20px; z-index: 100; pointer-events: none; display: flex; justify-content: space-between; align-items: center; }
        .back-btn { background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); color: white; padding: 12px 25px; border-radius: 12px; text-decoration: none; pointer-events: auto; font-weight: bold; border: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div id="overlay">
        <h2 style="margin-bottom: 25px;">Delta Optics 2D</h2>
        <button class="start-btn" id="start-btn">ابدأ تجربة القياس الافتراضي</button>
        <p style="margin-top: 15px; opacity: 0.6; font-size: 0.8rem;">يرجى الوقوف في مكان بإضاءة جيدة</p>
    </div>

    <div class="ui-header">
        <a href="index.html" class="back-btn"><i class="fas fa-chevron-right"></i> رجوع</a>
        <div style="background: rgba(14, 116, 144, 0.9); color: white; padding: 10px 25px; border-radius: 50px; font-weight: 900; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">LIVE HD MODE</div>
    </div>

    <a-scene mindar-face="autoStart: false; uiLoading: no; uiError: no;" 
             embedded 
             color-space="sRGB" 
             renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true;" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <img id="glassesPNG" src="image.png" crossorigin="anonymous">
        </a-assets>
        
        <a-camera active="false" position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity light="type: ambient; intensity: 1.2"></a-entity>

        <a-entity mindar-face-target="anchorIndex: 168">
            <a-image id="model-entity" 
                     rotation="0 0 0" 
                     position="0 -0.05 0" 
                     scale="0.15 0.1 1" 
                     src="#glassesPNG" 
                     transparent="true">
            </a-image>
        </a-entity>

    </a-scene>

    <script>
        const startBtn = document.querySelector('#start-btn');
        const overlay = document.querySelector('#overlay');
        const sceneEl = document.querySelector('a-scene');

        startBtn.addEventListener('click', () => {
            overlay.style.opacity = "0";
            setTimeout(() => overlay.style.display = "none", 500);
            
            // تفعيل المحرك
            const arSystem = sceneEl.systems['mindar-face-system'];
            arSystem.start();
        });
    </script>
</body>
</html>
