<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الكاشير | Delta Optics</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="main">
        <header class="header" id="main-header"></header>
        <div class="content" style="padding: 40px;">
            <div class="clean-card">
                <div class="clean-card-header"><i class="fas fa-shopping-cart"></i> الكاشير</div>
                <div class="clean-card-body">
                    <div class="grid-2">
                        <div class="input-group"><input type="text" id="pos-patient" class="clean-input" placeholder="اسم الزبون"></div>
                        <div class="input-group"><select id="pos-product" class="clean-input" onchange="updatePrice()"><option value="">-- اختر المنتج --</option></select></div>
                    </div>
                    <div class="calc-wrapper">
                        <div class="calc-item"><span>السعر</span><input type="text" id="pos-price" class="en-num" style="background:none; border:none; color:#fff;" readonly value="0"></div>
                        <div class="calc-item"><span>الإجمالي</span><input type="text" id="pos-total" class="en-num" style="background:none; border:none; color:#34d399; font-size:2rem;" readonly value="0"></div>
                        <div class="calc-item"><span>المدفوع</span><input type="number" id="pos-paid" class="clean-input en-num" placeholder="0" oninput="calcDue()" style="width:150px; background:#fff; color:#000;"></div>
                        <div class="calc-item"><span>الباقي</span><div id="pos-due" class="en-num" style="color:#ef4444;">0.00</div></div>
                        <button class="btn-massive" style="margin-top:20px;" onclick="savePos()">إصدار فاتورة</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, onSnapshot, addDoc, updateDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { loadLayout } from './layout.js';

        loadLayout('الكاشير السريع', 'pos');

        onSnapshot(collection(db, "products"), (s) => {
            let html = "<option value=''>-- اختر المنتج --</option>";
            s.forEach(d => { if(d.data().qty > 0) html += `<option value="${d.id}" data-price="${d.data().price}" data-qty="${d.data().qty}">${d.data().name}</option>`; });
            document.getElementById('pos-product').innerHTML = html;
        });

        window.updatePrice = () => {
            const sel = document.getElementById('pos-product');
            document.getElementById('pos-price').value = sel.options[sel.selectedIndex]?.dataset.price || 0;
            window.calcDue();
        };

        window.calcDue = () => {
            const total = parseFloat(document.getElementById('pos-price').value) || 0;
            const paid = parseFloat(document.getElementById('pos-paid').value) || 0;
            document.getElementById('pos-total').value = total;
            document.getElementById('pos-due').innerText = (total - paid > 0 ? total - paid : 0).toFixed(2);
        };

        window.savePos = async () => {
            const pName = document.getElementById('pos-patient').value;
            const sel = document.getElementById('pos-product');
            if(!pName || !sel.value) return Swal.fire('خطأ', 'أكمل البيانات', 'error');
            
            const qty = Number(sel.options[sel.selectedIndex].dataset.qty);
            await updateDoc(doc(db, "products", sel.value), { qty: qty - 1 });
            await addDoc(collection(db, "invoices"), {
                pName, prodName: sel.options[sel.selectedIndex].text,
                total: document.getElementById('pos-total').value, paid: document.getElementById('pos-paid').value,
                due: document.getElementById('pos-due').innerText, isUnified: false, time: serverTimestamp()
            });
            Swal.fire('تم', '', 'success');
        };
    </script>
</body>
</html>
