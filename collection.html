<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تشكيلات دلتا | Delta Optics</title>
    
    <link rel="icon" href="logo.jpg" type="image/jpeg">
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --brand: #0E7490; 
            --brand-light: #ECFEFF;
            --bg: #F8FAFC; 
            --text-dark: #1E293B;
            --text-gray: #64748B;
            --white: #FFFFFF;
            --shadow: 0 4px 20px rgba(0,0,0,0.05);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); margin: 0; padding-bottom: 50px; color: var(--text-dark); transition: var(--transition); }

        /* --- الهيدر --- */
        header { 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            padding: 15px 20px;
            box-shadow: 0 2px 15px rgba(14, 116, 144, 0.08); 
            position: sticky; top: 0; z-index: 100; 
            display: flex; flex-direction: column; gap: 12px;
        }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .header-right { display: flex; align-items: center; gap: 12px; }
        
        .back-btn { 
            width: 40px; height: 40px; border-radius: 50%; background: #F1F5F9; 
            color: var(--text-dark); display: flex; align-items: center; justify-content: center; 
            text-decoration: none; font-size: 1.2rem; transition: var(--transition);
        }
        .back-btn:active { background: #E2E8F0; transform: scale(0.9); }
        
        .header-logo { width: 42px; height: 42px; object-fit: contain; border-radius: 8px; }
        
        .header-title { 
            font-size: 1.2rem; font-weight: 800; color: var(--brand); 
            margin: 0; text-align: center; width: 100%;
        }

        /* --- شريط التصفية --- */
        .tabs-container { background: var(--white); padding: 15px 0; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .tabs { display: flex; justify-content: center; gap: 10px; }
        .tab-btn { 
            padding: 8px 24px; border-radius: 20px; border: 2px solid var(--brand-light); 
            background: var(--white); color: var(--text-gray); font-weight: 700; 
            cursor: pointer; transition: var(--transition); font-size: 0.95rem;
        }
        .tab-btn.active { background: var(--brand); color: var(--white); border-color: var(--brand); box-shadow: 0 4px 10px rgba(14, 116, 144, 0.2); }

        /* --- شبكة المعرض --- */
        .gallery-container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }

        /* --- كرت النظارة --- */
        .card { 
            background: var(--white); border-radius: 16px; overflow: hidden; 
            box-shadow: var(--shadow); border: 1px solid #E2E8F0; 
            transition: var(--transition); position: relative; cursor: pointer;
            animation: fadeInUp 0.4s forwards;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(14, 116, 144, 0.15); border-color: var(--brand-light); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .img-wrap { width: 100%; height: 160px; background: #E2E8F0; position: relative; overflow: hidden; }
        .card img { 
            width: 100%; height: 100%; object-fit: cover; display: block; 
            opacity: 0; transition: opacity 0.3s;
        }
        .card img.loaded { opacity: 1; }

        .card-info { padding: 12px; text-align: center; background: var(--white); }
        .card-info h3 { margin: 0 0 4px; font-size: 0.95rem; font-weight: 800; color: var(--text-dark); }
        .card-info p { margin: 0; font-size: 0.75rem; color: var(--text-gray); }

        .badge { 
            position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.95); 
            padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; 
            color: var(--brand); z-index: 3; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* --- عارض الصور (Lightbox) --- */
        .lightbox { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(8px); 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 1000; transition: var(--transition);
        }
        .lightbox.active { display: flex; }
        
        .lightbox img { max-width: 90%; max-height: 60vh; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); object-fit: contain;}
        
        .lightbox-close { 
            position: absolute; top: 25px; right: 25px; color: var(--white); font-size: 2rem; cursor: pointer;
        }
        
        .wa-order-btn {
            background: #25D366; color: white;
            padding: 14px 30px; border-radius: 30px; font-weight: 800; font-size: 1.1rem;
            text-decoration: none; display: inline-flex; align-items: center; gap: 10px;
            margin-top: 20px; box-shadow: 0 10px 25px rgba(37, 211, 102, 0.4);
        }

    </style>
</head>
<body>

<header>
    <div class="header-top">
        <div class="header-right">
            <a href="index.html" class="back-btn" aria-label="عودة"><i class="fas fa-arrow-right"></i></a>
            <img src="logo.jpg" alt="Delta Logo" class="header-logo" onerror="this.src='https://via.placeholder.com/42?text=Delta'">
        </div>
        <button class="tab-btn" style="padding: 5px 15px; font-size: 0.8rem;">EN</button>
    </div>
    <h1 class="header-title">تشكيلات دلتا للبصريات المميزة</h1>
</header>

<div class="tabs-container">
    <div class="tabs">
        <button class="tab-btn active" onclick="filterItems('all', this)">الكل</button>
        <button class="tab-btn" onclick="filterItems('medical', this)">طبّي</button>
        <button class="tab-btn" onclick="filterItems('sun', this)">شمسي</button>
    </div>
</div>

<div class="gallery-container">
    <div class="grid" id="gallery">
        </div>
</div>

<div class="lightbox" id="lightbox">
    <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
    <img id="lb-img" src="" alt="View">
    <div style="text-align: center; width: 90%;">
        <h3 id="lb-title" style="color: white; margin-top: 15px;"></h3>
        <a id="lb-wa" href="#" class="wa-order-btn" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-whatsapp"></i> استفسار عن هذا الموديل
        </a>
    </div>
</div>

<script>
    // --- الإعدادات ---
    const config = {
        medical: 58,        // الطبي الجديد (m1.jpg)
        medicalOld: 10,     // الطبي القديم (m1.jpg.jpg)
        sun: 0,             // الشمسي الجديد (s1.jpg)
        sunOld: 10          // الشمسي القديم (s1.jpg.jpg)
    };

    function buildGallery() {
        const gallery = document.getElementById('gallery');
        let html = '';

        // 1. بناء الطبي القديم (.jpg.jpg)
        for (let i = 1; i <= config.medicalOld; i++) {
            html += createCardHTML('medical', `m${i}.jpg.jpg`, `موديل طبي #${i} (كلاسيك)`);
        }

        // 2. بناء الطبي الجديد (.jpg)
        for (let i = 1; i <= config.medical; i++) {
            html += createCardHTML('medical', `m${i}.jpg`, `موديل طبي #${i}`);
        }

        // 3. بناء الشمسي القديم (.jpg.jpg)
        for (let i = 1; i <= config.sunOld; i++) {
            html += createCardHTML('sun', `s${i}.jpg.jpg`, `موديل شمسي #${i} (كلاسيك)`);
        }

        // 4. بناء الشمسي الجديد (.jpg)
        for (let i = 1; i <= config.sun; i++) {
            html += createCardHTML('sun', `s${i}.jpg`, `موديل شمسي #${i}`);
        }

        gallery.innerHTML = html;
    }

    function createCardHTML(type, filename, title) {
        const badge = type === 'medical' ? 'طبي' : 'شمسي';
        return `
            <div class="card item-${type}" onclick="openLightbox('${filename}', '${title}')">
                <div class="badge">${badge}</div>
                <div class="img-wrap">
                    <img src="${filename}" alt="${title}" loading="lazy" 
                         onload="this.classList.add('loaded')" 
                         onerror="this.closest('.card').style.display='none'">
                </div>
                <div class="card-info">
                    <h3>${title}</h3>
                    <p>اضغط للمعاينة</p>
                </div>
            </div>
        `;
    }

    function filterItems(type, btn) {
        // تغيير حالة الأزرار
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // فلترة الكروت
        document.querySelectorAll('.card').forEach(card => {
            if (type === 'all' || card.classList.contains(`item-${type}`)) {
                card.style.display = 'block';
            } else {
                card.style.display = 'none';
            }
        });
    }

    function openLightbox(src, title) {
        const lb = document.getElementById('lightbox');
        document.getElementById('lb-img').src = src;
        document.getElementById('lb-title').innerText = title;
        
        // رابط واتساب
        const msg = encodeURIComponent(`مرحباً دلتا، أود الاستفسار عن موديل: ${title}`);
        document.getElementById('lb-wa').href = `https://wa.me/962775549700?text=${msg}`;
        
        lb.style.display = 'flex';
        setTimeout(() => lb.classList.add('active'), 10);
    }

    function closeLightbox() {
        const lb = document.getElementById('lightbox');
        lb.classList.remove('active');
        setTimeout(() => {
            lb.style.display = 'none';
            document.getElementById('lb-img').src = '';
        }, 300);
    }

    // إغلاق عند الضغط خارج الصورة
    document.getElementById('lightbox').onclick = function(e) {
        if (e.target.id === 'lightbox') closeLightbox();
    };

    // تشغيل البناء فور التحميل
    window.onload = buildGallery;
</script>
</body>
</html>
