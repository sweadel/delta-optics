<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المعرض | Delta Optics</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="main">
        <header class="header" id="main-header"></header>
        
        <div class="content" style="padding: 40px;">
            <div class="clean-card">
                <div class="clean-card-header"><i class="fas fa-images text-primary"></i> إضافة تشكيلة جديدة</div>
                <div class="clean-card-body">
                    <div class="grid-2">
                        <div class="input-group"><label class="input-label">اسم الموديل/الماركة</label><input type="text" id="ext-col-name" class="clean-input" placeholder="مثال: RayBan 2026"></div>
                        <div class="input-group"><label class="input-label">النوع</label><select id="ext-col-type" class="clean-input"><option value="medical">طبي</option><option value="sun">شمسي</option></select></div>
                    </div>
                    <div class="input-group">
                        <label class="input-label">رفع الصورة</label>
                        <input type="file" accept="image/*" class="clean-input" onchange="handleImageUpload(event)" style="padding:12px;">
                        <input type="hidden" id="ext-col-base64">
                        <img id="img-preview" src="" style="display:none; margin-top:15px; width:150px; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.1);">
                    </div>
                    <button class="btn-massive" style="margin-top:20px;" onclick="saveExtCollection()"><i class="fas fa-cloud-upload-alt"></i> نشر المعرض للموقع الخارجي</button>
                </div>
            </div>

            <div class="clean-card">
                <div class="clean-card-header">الموديلات المرفوعة (تظهر للزبائن)</div>
                <div style="padding:20px; overflow-x:auto;">
                    <table class="data-table">
                        <thead><tr><th>الصورة</th><th>الاسم</th><th>النوع</th><th>خيارات</th></tr></thead>
                        <tbody id="tb-ext-collections"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="./gallery.js"></script>
</body>
</html>
