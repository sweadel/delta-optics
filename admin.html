<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة | Delta Optics</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0E7490; --bg: #F8FAFC; --text: #1E293B; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        .container { max-width: 1000px; margin: 0 auto; }
        header { background: white; padding: 20px 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border: 1px solid #E2E8F0; }
        h1 { color: var(--primary); margin: 0; font-size: 1.6rem; display: flex; align-items: center; gap: 10px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #E2E8F0; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid #E2E8F0; vertical-align: top; }
        th { color: var(--primary); font-weight: 900; background: #F1F5F9; font-size: 1.1rem; }
        
        /* هذا الجزء السحري لترتيب التقرير الطبي */
        .report-box { 
            background: #F8FAFC; 
            padding: 15px; 
            border-radius: 10px; 
            font-size: 0.9rem; 
            line-height: 1.8; 
            white-space: pre-wrap; /* أهم سطر عشان يحافظ على التقسيم والأسطر */
            border: 1px solid #E2E8F0;
            color: #334155;
            font-weight: 500;
        }
        
        .patient-name { font-size: 1.2rem; font-weight: 800; color: var(--primary); }
        .time-badge { background: #ECFEFF; color: #0891B2; padding: 5px 10px; border-radius: 8px; font-size: 0.85rem; font-weight: bold; display: inline-block; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1><i class="fas fa-user-shield"></i> غرفة عمليات دلتا</h1>
            <div>
                <span style="font-weight: bold; color: #64748B;">مرحباً، د. عادل</span>
            </div>
        </header>

        <div class="card">
            <h2 style="margin-top:0; color:var(--text);"><i class="fas fa-clipboard-list"></i> أحدث التقارير الطبية</h2>
            <table>
                <thead>
                    <tr>
                        <th style="width: 25%;">اسم المراجع</th>
                        <th style="width: 55%;">التقرير الطبي المفصل</th>
                        <th style="width: 20%;">وقت الفحص</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr><td colspan="3" style="text-align:center; padding: 30px;">جاري جلب البيانات...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // نفس إعدادات قاعدة بياناتك
        const firebaseConfig = {
            apiKey: "AIzaSyB11C4GGgAyqeThs8a9cvDNN7frvAA1nqQ",
            authDomain: "delta-optics-system.firebaseapp.com",
            projectId: "delta-optics-system",
            storageBucket: "delta-optics-system.firebasestorage.app",
            messagingSenderId: "111176219224",
            appId: "1:111176219224:web:e0d8a5f26b84d57249a82d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // جلب البيانات لايف وعرضها
        const q = query(collection(db, "tests"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = "";
            
            if(snapshot.empty) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;">لا يوجد فحوصات حتى الآن.</td></tr>';
                return;
            }

            snapshot.forEach(doc => {
                const d = doc.data();
                const time = d.timestamp ? d.timestamp.toDate().toLocaleString('ar-EG') : 'الآن';
                
                tbody.innerHTML += `
                    <tr>
                        <td><div class="patient-name">${d.name}</div></td>
                        <td><div class="report-box">${d.details}</div></td>
                        <td><div class="time-badge"><i class="far fa-clock"></i> ${time}</div></td>
                    </tr>
                `;
            });
        });
    </script>
</body>
</html>
