<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Medical Test | Delta Optics</title>
    
    <link rel="icon" href="logo.jpg" type="image/jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --brand-color: #0E7490; --gold: #D4AF37; --bg-body: #F8FAFC; 
            --white: #FFFFFF; --text-main: #1E293B; --text-light: #64748B;
            --success: #10B981; --error: #EF4444; --warning: #F59E0B;
        }

        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background: var(--bg-body); color: var(--text-main); margin: 0; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

        header { 
            background: var(--white); height: 60px; padding: 0 20px;
            box-shadow: 0 2px 15px rgba(14, 116, 144, 0.08); 
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .lang-btn { background: #F1F5F9; border: 1px solid #E2E8F0; border-radius: 8px; padding: 6px 12px; font-weight: 700; color: var(--brand-color); cursor: pointer; font-size: 0.9rem; }
        .header-center { position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 8px; }
        .header-title { font-weight: 800; font-size: 1.1rem; color: var(--brand-color); margin: 0; }
        .back-btn { width: 38px; height: 38px; border-radius: 50%; background: #F1F5F9; color: var(--text-main); display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 1.1rem; }

        .container { flex: 1; padding: 20px; max-width: 500px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .screen { display: none; width: 100%; animation: fadeIn 0.4s ease-out; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .login-box { background: var(--white); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; width: 100%; border: 1px solid #E2E8F0; margin-top: 20px;}
        .login-input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #E2E8F0; font-size: 1.1rem; margin-bottom: 20px; text-align: center; outline: none; transition: 0.2s;}

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .test-card { background: var(--white); padding: 15px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); cursor: pointer; display: flex; flex-direction: column; align-items: center; text-align: center; border: 1px solid #E2E8F0; transition: 0.2s; }
        .test-card:active { transform: scale(0.96); }
        .icon-wrap { width: 45px; height: 45px; background: #ECFEFF; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--brand-color); font-size: 1.3rem; margin-bottom: 8px; }

        .test-area { background: var(--white); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 20px; min-height: 240px; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 1px solid #E2E8F0; position: relative; }
        .test-area.dark-mode { background: #0F172A; border-color: #0F172A; }
        .e-char { font-weight: 900; line-height: 1; transition: transform 0.2s; }

        .d-pad-container { direction: ltr; display: grid; grid-template-columns: 60px 60px 60px; gap: 15px; justify-content: center; }
        .pad-btn { width: 60px; height: 60px; border-radius: 50%; border: none; background: var(--white); color: var(--brand-color); font-size: 1.6rem; box-shadow: 0 5px 15px rgba(0,0,0,0.15); cursor: pointer; }

        .color-canvas { border-radius: 50%; width: 220px; height: 220px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .duo-split { display: flex; width: 100%; height: 200px; border-radius: 15px; overflow: hidden; }
        .duo-red { flex: 1; background: #EF4444; display: flex; align-items: center; justify-content: center; }
        .duo-green { flex: 1; background: #10B981; display: flex; align-items: center; justify-content: center; }
        .duo-circle { width: 60px; height: 60px; border: 8px solid black; border-radius: 50%; }

        .timer-circle { width: 150px; height: 150px; border-radius: 50%; border: 8px solid #E2E8F0; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: 900; color: var(--brand-color); margin: 20px auto; }

        .action-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 800; font-size: 1rem; cursor: pointer; margin-bottom: 10px; display: flex; justify-content: center; gap: 8px; align-items: center; text-decoration: none; }
        .btn-primary { background: var(--brand-color); color: white; }
        .btn-outline { background: transparent; border: 2px solid #E2E8F0; color: var(--text-main); }
        .btn-success { background: var(--success); color: white; }

        .history-item { background: white; border: 1px solid #E2E8F0; border-radius: 15px; padding: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .report-card { background: white; padding: 20px; border-radius: 20px; border: 1px solid #E2E8F0; margin-bottom: 15px; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal-box { background: var(--white); padding: 30px; border-radius: 24px; width: 90%; max-width: 350px; text-align: center; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i></a>
        <div class="header-center"><h1 class="header-title">العيادة الذكية</h1></div>
        <button class="lang-btn" onclick="toggleLang()">EN</button>
    </header>

    <div class="container">

        <div id="screen-login" class="screen active">
            <div class="login-box">
                <img src="logo.jpg" style="width:80px; border-radius:15px; margin-bottom:15px;">
                <h2 style="color:var(--brand-color);">تسجيل المراجع</h2>
                <input type="text" id="patientNameInput" class="login-input" placeholder="أدخل الاسم الثلاثي">
                <button class="action-btn btn-primary" onclick="startSession()">بدء الفحص</button>
                <button class="action-btn btn-outline" onclick="show('screen-records')">سجل المراجعين</button>
            </div>
        </div>

        <div id="menu" class="screen">
            <div style="text-align:center; margin-bottom:15px;">
                <div style="background:#ECFEFF; color:var(--brand-color); padding:8px; border-radius:20px; font-weight:800;">
                    المراجع: <span id="display-patient-name"></span>
                </div>
            </div>
            <div class="menu-grid">
                <div class="test-card" onclick="startTest('vision')"><div class="icon-wrap"><i class="fas fa-eye"></i></div><h3>حدة النظر</h3></div>
                <div class="test-card" onclick="startTest('duochrome')"><div class="icon-wrap" style="color:#EF4444;"><i class="fas fa-adjust"></i></div><h3>أحمر وأخضر</h3></div>
                <div class="test-card" onclick="startTest('contrast')"><div class="icon-wrap" style="color:#1E293B;"><i class="fas fa-moon"></i></div><h3>رؤية ليلية</h3></div>
                <div class="test-card" onclick="startTest('dryeye')"><div class="icon-wrap" style="color:#F59E0B;"><i class="fas fa-tint"></i></div><h3>جفاف العين</h3></div>
                <div class="test-card" onclick="startTest('astigmatism')"><div class="icon-wrap"><i class="fas fa-certificate"></i></div><h3>انحراف النظر</h3></div>
                <div class="test-card" onclick="startTest('color')"><div class="icon-wrap"><i class="fas fa-palette"></i></div><h3>عمى الألوان</h3></div>
            </div>
            <button class="action-btn btn-success" style="margin-top:20px;" onclick="submitToFirebase()">إرسال التقرير النهائي</button>
        </div>

        <div id="test-vision" class="screen">
            <div class="eye-indicator" id="eye-ind-vision">العين اليمنى</div>
            <div class="test-area"><div id="e-char" class="e-char">E</div></div>
            <div class="d-pad-container">
                <button class="pad-btn" style="grid-column:2" onclick="checkVision(270)"><i class="fas fa-chevron-up"></i></button>
                <button class="pad-btn" onclick="checkVision(180)"><i class="fas fa-chevron-left"></i></button>
                <button class="pad-btn" onclick="checkVision(90)"><i class="fas fa-chevron-down"></i></button>
                <button class="pad-btn" onclick="checkVision(0)"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>

        <div id="screen-records" class="screen">
            <h2 style="text-align:center;">المراجعين السابقين</h2>
            <div id="records-list"></div>
            <button class="action-btn btn-outline" onclick="show('screen-login')">العودة</button>
        </div>

        <div id="screen-report" class="screen">
            <div class="report-card">
                <h2 style="text-align:center; color:var(--brand-color);">التقرير الطبي</h2>
                <div id="report-details"></div>
            </div>
            <button class="action-btn btn-success" id="wa-btn">واتساب</button>
            <button class="action-btn btn-outline" onclick="location.reload()">فحص جديد</button>
        </div>

    </div>

    <div id="instructionModal" class="modal-overlay">
        <div class="modal-box">
            <h2 id="modalTitle"></h2>
            <p id="modalText"></p>
            <button class="action-btn btn-primary" onclick="closeModal()">ابدأ</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyB11C4GGgAyqeThs8a9cvDNN7frvAA1nqQ", authDomain: "delta-optics-system.firebaseapp.com", projectId: "delta-optics-system", storageBucket: "delta-optics-system.firebasestorage.app", messagingSenderId: "111176219224", appId: "1:111176219224:web:e0d8a5f26b84d57249a82d" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        window.sendToAdmin = async (n, d) => { await addDoc(collection(db, "tests"), { name: n, details: d, timestamp: serverTimestamp() }); };
    </script>

    <script>
        let currentPatient = ""; let currentResults = {}; let activeTest = ""; let currentEye = "rightEye";
        const i18n = { ar: { rightEye: "العين اليمنى", leftEye: "العين اليسرى", both: "العينين معاً" } };

        function startSession() {
            const name = document.getElementById('patientNameInput').value.trim();
            if(!name) return alert("اكتب الاسم");
            currentPatient = name; document.getElementById('display-patient-name').innerText = name;
            show('menu');
        }

        function show(id) { 
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); 
            if(id === 'screen-records') loadRecords();
        }

        function loadRecords() {
            const records = JSON.parse(localStorage.getItem('delta_patients')) || [];
            const list = document.getElementById('records-list'); list.innerHTML = "";
            records.reverse().forEach(r => {
                list.innerHTML += `<div class="history-item"><b>${r.name}</b><span>${r.date}</span></div>`;
            });
        }

        function startTest(type) {
            activeTest = type; currentEye = (type==='color'||type==='dryeye')?'both':'rightEye';
            openModal("تعليمات", "يرجى التركيز على الشاشة واتباع الخطوات.");
        }

        function openModal(t, txt) { document.getElementById('modalTitle').innerText = t; document.getElementById('modalText').innerText = txt; document.getElementById('instructionModal').classList.add('active'); }
        function closeModal() { document.getElementById('instructionModal').classList.remove('active'); runLogic(); }

        function runLogic() {
            if(activeTest === 'vision') startVision();
            // هنا تضاف بقية منطق الفحوصات (الأحمر والأخضر، الخ)
        }

        // --- مثال فحص النظر ---
        let vStep = 0, vRot = 0; const vLabels = ["6/60", "6/36", "6/24", "6/18", "6/12", "6/6"];
        function startVision() { vStep=0; updateV(); show('test-vision'); }
        function updateV() {
            if(vStep >= 6) return saveRes("6/6");
            vRot = [0,90,180,270][Math.floor(Math.random()*4)];
            document.getElementById('e-char').style.cssText = `font-size:${130-vStep*18}px; transform:rotate(${vRot}deg);`;
        }
        function checkVision(d) { if(d===vRot) { vStep++; updateV(); } else { saveRes(vStep>0?vLabels[vStep-1]:"ضعيف"); } }

        function saveRes(val) {
            if(!currentResults[activeTest]) currentResults[activeTest] = {};
            currentResults[activeTest][currentEye] = val;
            if(currentEye === 'rightEye') { currentEye = 'leftEye'; openModal("تبديل", "غطِ العين اليمنى الآن."); }
            else show('menu');
        }

        async function submitToFirebase() {
            let report = ""; let html = "";
            for(let [t, eyes] of Object.entries(currentResults)) {
                report += `[${t}]\n`; html += `<b>${t}:</b><br>`;
                for(let [e, v] of Object.entries(eyes)) { report += `- ${i18n.ar[e]}: ${v}\n`; html += `${i18n.ar[e]}: ${v}<br>`; }
            }
            await window.sendToAdmin(currentPatient, report);
            let records = JSON.parse(localStorage.getItem('delta_patients')) || [];
            records.push({name: currentPatient, date: new Date().toLocaleDateString()});
            localStorage.setItem('delta_patients', JSON.stringify(records));
            document.getElementById('report-details').innerHTML = html;
            show('screen-report');
        }
    </script>
</body>
</html>
